<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐아 이유식 식단표</title>
<style>
:root {
  --pink: #ff6eb4;
  --sky: #29aaee;
  --yellow: #f5c800;
  --green: #2eaa55;
  --black: #111;
  --gray: #888;
  --purple: #9933cc;
  --bg: #f7f5f2;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-sub: #666;
  --border: #e8e4df;
  --done: #bbb;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* VERSION TOGGLE */
.version-toggle {
  position: fixed;
  bottom: 20px;
  right: 16px;
  z-index: 100;
  display: flex;
  gap: 6px;
}
.ver-btn {
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.ver-btn.active { opacity: 1; }

/* HEADER */
.header {
  background: #fff;
  padding: 16px 16px 0;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header-title { font-size: 18px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.month-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}
.month-nav button {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-sub);
  padding: 4px;
}
.month-nav span { font-size: 15px; font-weight: 600; min-width: 40px; text-align: center; }

/* WEEK BAR */
.week-bar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
  padding: 8px 0 0;
}
.week-day-label {
  text-align: center;
  font-size: 10px;
  color: var(--text-sub);
  padding-bottom: 4px;
}
.week-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 2px 10px;
  cursor: pointer;
  border-radius: 10px;
  transition: background 0.15s;
  position: relative;
}
.week-day .day-num {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.week-day .day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  margin-top: 4px;
  background: transparent;
}
.week-day.has-data .day-dot { background: var(--green); }
.week-day.done .day-dot { background: var(--done); }
.week-day.selected {
  background: var(--text);
}
.week-day.selected .day-num { color: #fff; }
.week-day.selected .day-dot { background: rgba(255,255,255,0.5); }
.week-day.today .day-num { color: var(--pink); font-weight: 700; }
.week-day.selected.today .day-num { color: #fff; }

/* MAIN CONTENT */
.main { padding: 16px; }

/* DAY HEADER */
.day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.day-header-left .day-date { font-size: 20px; font-weight: 700; }
.day-header-left .day-dday { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.day-status {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 20px;
}
.day-status.done { background: #e8f5e9; color: var(--green); }
.day-status.pending { background: #fff3e0; color: #e65100; }
.day-status.future { background: #f5f5f5; color: var(--gray); }

/* MEAL CARD */
.meal-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.meal-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.meal-items { display: flex; flex-direction: column; gap: 6px; }
.meal-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.meal-item-name { font-size: 15px; font-weight: 500; }
.meal-item-amount { font-size: 14px; color: var(--text-sub); }
.meal-note {
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}

/* BADGES */
.badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
}
.b-new { background: var(--pink); color: #fff; }
.b-직접 { background: var(--sky); color: #fff; }
.b-시판 { background: var(--yellow); color: #fff; }
.b-혼합 { background: var(--green); color: #fff; }
.b-warn { background: var(--black); color: #fff; }
.b-rep { background: var(--gray); color: #fff; }
.b-kit { background: var(--purple); color: #fff; }

/* MEMO CARD */
.memo-card {
  background: #fffbf0;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 12px;
  border: 1px solid #f0e8c0;
}
.memo-card-title { font-size: 12px; font-weight: 600; color: #a07820; margin-bottom: 6px; }
.memo-text { font-size: 13px; color: #5a4010; line-height: 1.6; }

/* NEW INGREDIENT CARD */
.new-card {
  background: #fff0f6;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 12px;
  border: 1px solid #ffd0e8;
}
.new-card-title { font-size: 12px; font-weight: 600; color: #c03060; margin-bottom: 8px; }
.new-items { display: flex; flex-wrap: wrap; gap: 6px; }
.new-item {
  background: var(--pink);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}

/* ACCORDION */
.accordion {
  background: var(--card);
  border-radius: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}
.accordion-title { font-size: 14px; font-weight: 600; }
.accordion-arrow {
  font-size: 12px;
  color: var(--text-sub);
  transition: transform 0.2s;
}
.accordion.open .accordion-arrow { transform: rotate(180deg); }
.accordion-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}
.accordion.open .accordion-body { display: block; }
.stock-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stock-item:last-child { border-bottom: none; }
.stock-amount { font-weight: 600; color: var(--sky); }
.stock-low { color: #e65100; }
.shop-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.shop-item:last-child { border-bottom: none; }
.shop-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); flex-shrink: 0; }

/* DONE OVERLAY */
.done-overlay {
  opacity: 0.5;
}

/* ==================== VERSION 2 ==================== */
#v2 { display: none; }

.v2-header {
  background: #fff;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}
.v2-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.v2-title { font-size: 18px; font-weight: 700; }
.v2-week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.v2-week-nav button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
}
.v2-week-label { font-size: 13px; font-weight: 600; color: var(--text-sub); }

.v2-main { padding: 12px 16px; }

.v2-day-card {
  background: var(--card);
  border-radius: 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.v2-day-card.today-card {
  border-color: var(--pink);
  box-shadow: 0 0 0 2px rgba(255,110,180,0.15);
}
.v2-day-card.done-card { opacity: 0.6; }

.v2-day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  cursor: pointer;
}
.v2-day-left { display: flex; align-items: center; gap: 10px; }
.v2-day-num {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
  min-width: 32px;
}
.v2-day-info .v2-dow { font-size: 11px; color: var(--text-sub); }
.v2-day-info .v2-dday { font-size: 11px; color: var(--text-sub); }
.v2-day-right { display: flex; align-items: center; gap: 8px; }
.v2-day-preview { font-size: 11px; color: var(--text-sub); max-width: 130px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
.v2-chevron { font-size: 12px; color: var(--text-sub); transition: transform 0.2s; }
.v2-day-card.open .v2-chevron { transform: rotate(180deg); }

.v2-day-body {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
}
.v2-day-card.open .v2-day-body { display: block; }

.v2-meal-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.v2-meal-row:last-child { border-bottom: none; }
.v2-meal-name { font-weight: 500; }
.v2-meal-amt { color: var(--text-sub); font-size: 12px; }
.v2-memo {
  margin-top: 8px;
  padding: 8px 10px;
  background: #fffbf0;
  border-radius: 8px;
  font-size: 12px;
  color: #a07820;
}
.v2-done-mark { font-size: 11px; color: var(--green); font-weight: 600; }

/* TODAY HIGHLIGHT in v2 */
.v2-day-num.today-num { color: var(--pink); }
</style>
</head>

    </div>
    <div class="week-bar" id="week-bar"></div>
  </div>
  <div class="main" id="v1-main"></div>
</div>

<!-- VERSION 2: 주간 카드형 -->
<div id="v2">

</div>

<div class="version-toggle">
  <button class="ver-btn active" id="btn-v1" onclick="switchVersion(1)">V1</button>

</div>

  "6/24": { items:[{name:"쌀",amt:"30g"},{name:"밀가루","amt":"소량"},{name:"한우",amt:"15g"}], badges:["NEW","키트"], done:false },

  "6/28": { items:[{name:"쌀",amt:"30g"},{name:"땅콩",amt:"5g"},{name:"한우",amt:"15g"}], badges:["반복","직접"], done:false },
  "6/29": { items:[{name:"쌀",amt:"30g"},{name:"두부",amt:"15g"},{name:"단호박",amt:"15g"}], badges:["직접"], done:false },
  "6/30": { items:[{name:"쌀",amt:"30g"},{name:"양배추",amt:"15g"},{name:"한우",amt:"15g"}], badges:["직접"], done:false },
};

const START_DATE = new Date(2025, 4, 9); // 5/9 이유식 시작
const TODAY = new Date(2025, 4, 14); // 오늘 5/14

const DOW = ["월","화","수","목","금","토","일"];
const DOW_EN = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function dateKey(date) {
  return `${date.getMonth()+1}/${date.getDate()}`;
}
function getDDay(date) {
  const diff = Math.floor((date - START_DATE) / 86400000);
  return `D+${diff + 1}`;
}
function getDow(date) {
  const d = date.getDay();
  return DOW[d === 0 ? 6 : d - 1];
}

function badgeClass(b) {
  const map = {"NEW":"b-new","직접":"b-직접","시판":"b-시판","시판+직접":"b-혼합","주의":"b-warn","반복":"b-rep","키트":"b-kit"};
  return map[b] || "b-직접";
}

// 재고 데이터
const stockData = [
  { name:"한우 큐브 (15g)", amount:"11개 (165g)", low: false },
  { name:"브로콜리미음", amount:"140g (5/16 도착)", low: false },
  { name:"감자미음", amount:"140g (5/16 도착)", low: false },
  { name:"고구마미음", amount:"100g", low: false },
  { name:"쌀가루 (아이보리)", amount:"구매 필요", low: true },
  { name:"오트밀 파우더 (아이보리)", amount:"구매 필요", low: true },
];

const shopData = [
  "아이보리 쌀가루 초기 1단계",
  "아이보리 오트밀 파우더 200g",
  "한우 우둔살 350g (5/24 전 구매)",
];

// ========== VERSION 1 ==========
let currentMonth = TODAY.getMonth(); // 0-indexed
let selectedDate = new Date(TODAY);

function getWeekDates(date) {
  const day = date.getDay();
  const mon = new Date(date);
  mon.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    days.push(d);
  }
  return days;
}

function renderWeekBar() {
  const bar = document.getElementById('week-bar');
  const ml = document.getElementById('month-label');
  ml.textContent = `${currentMonth+1}월`;
  
  const weekDays = getWeekDates(selectedDate);
  bar.innerHTML = weekDays.map(d => {
    const key = dateKey(d);
    const data = mealData[key];
    const isToday = d.toDateString() === TODAY.toDateString();
    const isSelected = d.toDateString() === selectedDate.toDateString();
    const hasDone = data && data.done;
    const hasData = !!data;
    
    let cls = 'week-day';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (hasDone) cls += ' done';
    else if (hasData) cls += ' has-data';
    
    return `<div class="${cls}" onclick="selectDate(new Date(${d.getFullYear()},${d.getMonth()},${d.getDate()}))">
      <div class="day-num">${d.getDate()}</div>
      <div class="day-dot"></div>
    </div>`;
  }).join('');
}

function selectDate(date) {
  selectedDate = date;
  currentMonth = date.getMonth();
  renderWeekBar();
  renderDayContent();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) currentMonth = 0;
  if (currentMonth > 11) currentMonth = 11;
  // 해당 월의 첫 날로 이동
  const newDate = new Date(2025, currentMonth, 1);
  // 이유식 데이터 있는 첫 날 찾기
  for (let i = 1; i <= 31; i++) {
    const d = new Date(2025, currentMonth, i);
    if (d.getMonth() !== currentMonth) break;
    if (mealData[dateKey(d)]) { selectedDate = d; break; }
  }
  renderWeekBar();
  renderDayContent();
}

function getNewIngredientsThisWeek(date) {
  const weekDays = getWeekDates(date);
  const newItems = [];
  weekDays.forEach(d => {
    const key = dateKey(d);
    const data = mealData[key];
    if (data && data.badges && data.badges.includes('NEW')) {
      data.items.forEach(item => {
        if (!newItems.includes(item.name)) newItems.push(item.name);
      });
    }
  });
  return newItems;
}

function renderDayContent() {
  const key = dateKey(selectedDate);
  const data = mealData[key];
  const dow = getDow(selectedDate);
  const dday = getDDay(selectedDate);
  const main = document.getElementById('v1-main');
  const sub = document.getElementById('v1-dday-sub');
  sub.textContent = `${getDDay(TODAY)} · ${TODAY.getMonth()+1}/${TODAY.getDate()} 기준`;

  let html = '';

  // Day header
  const isToday = selectedDate.toDateString() === TODAY.toDateString();
  const statusText = !data ? '식단 없음' : data.done ? '섭취 완료 ✓' : isToday ? '오늘 예정' : selectedDate < TODAY ? '기록 없음' : '예정';
  const statusClass = !data ? 'future' : data.done ? 'done' : 'pending';

  html += `<div class="day-header">
    <div class="day-header-left">
      <div class="day-date">${selectedDate.getMonth()+1}월 ${selectedDate.getDate()}일 (${dow})</div>
      <div class="day-dday">${dday}</div>
    </div>
    <div class="day-status ${statusClass}">${statusText}</div>
  </div>`;

  if (!data) {
    html += `<div class="meal-card" style="text-align:center;color:#aaa;padding:30px;">
      이날은 이유식 기록이 없어요
    </div>`;
  } else {
    // Meal card
    const badgeHtml = data.badges ? data.badges.map(b => `<span class="badge ${badgeClass(b)}">${b}</span>`).join('') : '';
    const doneStyle = data.done ? 'class="done-overlay"' : '';
    
    html += `<div class="meal-card" ${doneStyle}>
      <div class="meal-card-title">🥣 오늘의 이유식 ${badgeHtml}</div>
      <div class="meal-items">
        ${data.items.map(item => `<div class="meal-item">
          <span class="meal-item-name">${item.name}</span>
          <span class="meal-item-amount">${item.amt || ''}</span>
        </div>`).join('')}
      </div>
      ${data.note ? `<div class="meal-note">💧 ${data.note}</div>` : ''}
    </div>`;

    // Memo
    if (data.memo) {
      html += `<div class="memo-card">
        <div class="memo-card-title">📝 섭취 기록</div>
        <div class="memo-text">${data.memo}</div>
      </div>`;
    }
  }

  // 이번주 NEW 재료
  const newItems = getNewIngredientsThisWeek(selectedDate);
  if (newItems.length > 0) {
    html += `<div class="new-card">
      <div class="new-card-title">✨ 이번 주 새 식재료</div>
      <div class="new-items">${newItems.map(i => `<span class="new-item">${i}</span>`).join('')}</div>
    </div>`;
  }

  // 재고 현황 (아코디언)
  html += `<div class="accordion" id="acc-stock">
    <div class="accordion-header" onclick="toggleAccordion('acc-stock')">
      <span class="accordion-title">📦 재고 현황</span>
      <span class="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body">
      ${stockData.map(s => `<div class="stock-item">
        <span>${s.name}</span>
        <span class="stock-amount ${s.low ? 'stock-low' : ''}">${s.amount}</span>
      </div>`).join('')}
    </div>
  </div>`;

  // 장봐야 할 재료 (아코디언)
  html += `<div class="accordion" id="acc-shop">
    <div class="accordion-header" onclick="toggleAccordion('acc-shop')">
      <span class="accordion-title">🛒 장봐야 할 재료</span>
      <span class="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body">
      ${shopData.map(s => `<div class="shop-item">
        <div class="shop-dot"></div>
        <span>${s}</span>
      </div>`).join('')}
    </div>
  </div>`;

  html += '<div style="height:80px;"></div>';
  main.innerHTML = html;
}

function toggleAccordion(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

// ========== VERSION 2 ==========
let currentWeekStart = new Date(TODAY);
// 월요일로 맞추기
const todayDay = TODAY.getDay();
currentWeekStart.setDate(TODAY.getDate() - (todayDay === 0 ? 6 : todayDay - 1));

function changeWeek(dir) {
  currentWeekStart.setDate(currentWeekStart.getDate() + dir * 7);
  renderV2();
}

function renderV2() {
  const dday = document.getElementById('v2-dday');
  dday.textContent = `${getDDay(TODAY)} · ${TODAY.getMonth()+1}/${TODAY.getDate()} 기준`;

  const weekLabel = document.getElementById('v2-week-label');
  const end = new Date(currentWeekStart);
  end.setDate(currentWeekStart.getDate() + 6);
  weekLabel.textContent = `${currentWeekStart.getMonth()+1}/${currentWeekStart.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;

  const main = document.getElementById('v2-main');
  let html = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(currentWeekStart);
    d.setDate(currentWeekStart.getDate() + i);
    const key = dateKey(d);
    const data = mealData[key];
    const isToday = d.toDateString() === TODAY.toDateString();
    const dow = getDow(d);
    const dday = getDDay(d);

    let cardCls = 'v2-day-card';
    if (isToday) cardCls += ' today-card open';
    if (data && data.done) cardCls += ' done-card';

    const preview = data ? data.items.map(i => i.name).join(' + ') : '식단 없음';
    const numCls = isToday ? 'v2-day-num today-num' : 'v2-day-num';

    html += `<div class="${cardCls}" id="v2-card-${i}">
      <div class="v2-day-header" onclick="toggleV2Card('v2-card-${i}')">
        <div class="v2-day-left">
          <div class="${numCls}">${d.getDate()}</div>
          <div class="v2-day-info">
            <div class="v2-dow">${d.getMonth()+1}/${d.getDate()} (${dow})</div>
            <div class="v2-dday">${dday}</div>
          </div>
        </div>
        <div class="v2-day-right">
          <div class="v2-day-preview">${preview}</div>
          <div class="v2-chevron">▼</div>
        </div>
      </div>`;

    if (data) {
      const badgeHtml = data.badges ? data.badges.map(b => `<span class="badge ${badgeClass(b)}">${b}</span>`).join('') : '';
      html += `<div class="v2-day-body">
        <div style="padding-top:10px;">
          ${badgeHtml ? `<div style="margin-bottom:8px;">${badgeHtml}</div>` : ''}
          ${data.items.map(item => `<div class="v2-meal-row">
            <span class="v2-meal-name">${item.name}</span>
            <span class="v2-meal-amt">${item.amt || ''}</span>
          </div>`).join('')}
          ${data.note ? `<div class="v2-memo">💧 ${data.note}</div>` : ''}
          ${data.memo ? `<div class="v2-memo" style="margin-top:6px;background:#e8f5e9;color:#2e7d32;">📝 ${data.memo}</div>` : ''}
          ${data.done ? `<div style="text-align:right;margin-top:8px;"><span class="v2-done-mark">✓ 섭취 완료</span></div>` : ''}
        </div>
      </div>`;
    } else {
      html += `<div class="v2-day-body"><div style="padding:10px 0;color:#aaa;font-size:13px;">이날은 이유식 기록이 없어요</div></div>`;
    }
    html += '</div>';
  }

  // 재고/장보기 아코디언
  html += `<div class="accordion" id="v2-acc-stock">
    <div class="accordion-header" onclick="toggleAccordion('v2-acc-stock')">
      <span class="accordion-title">📦 재고 현황</span>
      <span class="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body">
      ${stockData.map(s => `<div class="stock-item">
        <span>${s.name}</span>
        <span class="stock-amount ${s.low ? 'stock-low' : ''}">${s.amount}</span>
      </div>`).join('')}
    </div>
  </div>
  <div class="accordion" id="v2-acc-shop">
    <div class="accordion-header" onclick="toggleAccordion('v2-acc-shop')">
      <span class="accordion-title">🛒 장봐야 할 재료</span>
      <span class="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body">
      ${shopData.map(s => `<div class="shop-item"><div class="shop-dot"></div><span>${s}</span></div>`).join('')}
    </div>
  </div>
  <div style="height:80px;"></div>`;

  main.innerHTML = html;
}

function toggleV2Card(id) {
  document.getElementById(id).classList.toggle('open');
}

// ========== VERSION SWITCH ==========
function switchVersion(v) {
  document.getElementById('v1').style.display = v === 1 ? 'block' : 'none';
  document.getElementById('v2').style.display = v === 2 ? 'block' : 'none';
  document.getElementById('btn-v1').classList.toggle('active', v === 1);
  document.getElementById('btn-v2').classList.toggle('active', v === 2);
}

// ========== INIT ==========
renderWeekBar();
renderDayContent();
renderV2();
</script>
