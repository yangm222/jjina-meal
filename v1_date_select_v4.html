<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data:;">
<title>기특한 찐아의 이유식</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ===== 폰트 ===== */
/* Pretendard */
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2'); font-weight:800; font-display:swap; }
/* Paperlogy (Freesentation 공식 저장소) */
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-5Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-6SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-7Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-8ExtraBold.woff2') format('woff2'); font-weight:800; font-display:swap; }

/* ===== 컬러 변수 ===== */
:root {
  --coral: #F97070;
  --orange: #ff7a4d;
  --sky: #29aaee;
  --green: #2eaa55;
  --gray: #888;
  --bg: #f6f4f1;
  --text: #2b2422;
  --text-sub: #9a938f;
  --border: #ece8e4;
  --card: #ffffff;
}

/* ===== 기본 리셋 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
button { font-family: 'Pretendard', sans-serif; cursor: pointer; }
textarea, input { font-family: 'Pretendard', sans-serif; }

/* ===== 헤더 ===== */
.header { background: #f0ede9; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
.header-top { padding: 16px 18px 4px; }
.title { font-family:'Paperlogy',sans-serif; font-size: 22px; font-weight: 800; color: #1f1a18; letter-spacing: -0.3px; }
.sub { font-size: 12px; color: #8a827d; margin-top: 5px; }

/* 월 네비게이션 + Today 버튼 */
.month-nav { display: flex; align-items: center; gap: 16px; padding: 10px 18px 4px; }
.month-nav .nav-arrow { background: transparent; border: none; padding: 2px 4px; font-size: 17px; color: #5a534e; }
.month-nav span#month-lbl { font-family:'Paperlogy',sans-serif; font-size: 15px; font-weight: 700; color: #1f1a18; }
.month-nav-right { margin-left: auto; }
.today-btn { background: var(--coral); border: none; padding: 7px 18px; font-size: 12px; font-weight: 700; color: #fff; border-radius: 20px; box-shadow: 0 2px 8px rgba(249,112,112,0.35); }

/* ===== 날짜 스트립 ===== */
.strip-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 8px 14px 14px; scrollbar-width: none; }
.strip-wrap::-webkit-scrollbar { display: none; }
.strip { display: flex; gap: 4px; width: max-content; }
.day-item { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; transition: background 0.15s; }
.day-item .dn { font-family:'Paperlogy',sans-serif; font-size: 15px; font-weight: 600; color: #9a938f; line-height: 1; }
.day-item.done-day .dn { color: #cfc9c4; }
.day-item.today { border: 1.5px solid var(--coral); }
.day-item.today .dn { color: var(--coral); font-weight: 800; }
.day-item.selected { background: #1f1a18; }
.day-item.selected .dn { color: #fff; }
.day-item.selected.done-day .dn { color: #fff; }
.day-item.selected.today { background: var(--coral); border: none; }
.day-item.selected.today .dn { color: #fff; font-weight: 800; }

/* ===== 뷰 전환 ===== */
#main-view { display: block; padding-bottom: 64px; min-height: 100vh; }
#cal-view { display: none; padding-bottom: 64px; min-height: 100vh; background:#fff; }

/* ===== 날짜 헤더 (D-day) ===== */
.day-hd { padding: 20px 18px 6px; }
.dday-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.dday { font-family:'Paperlogy',sans-serif; font-size: 34px; font-weight: 800; line-height: 1; color: #1f1a18; letter-spacing: -1px; }
.dday-date { font-family:'Paperlogy',sans-serif; font-size: 14px; color: #6e6661; font-weight: 500; }
.dday-mid { color:#764ba2; font-weight: 700; }

/* 오늘 식단 / 지난 식단 타이틀 */
.sec-title { font-family:'Paperlogy',sans-serif; display:flex; align-items:center; gap:8px; padding: 14px 18px 6px; font-size: 16px; font-weight: 600; color:#1f1a18; }
.sec-title .accent { color: var(--coral); }
.stock-warn { font-size: 11px; font-weight: 600; color: var(--coral); white-space: nowrap; }

/* ===== 중기 전환 배너 ===== */
.mid-banner { margin: 6px 16px 0; background: linear-gradient(135deg,#667eea,#764ba2); padding: 14px 16px; border-radius: 16px; }
.mid-banner-title { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.mid-banner-sub { font-size: 11px; color: rgba(255,255,255,0.88); line-height: 1.5; }

/* ===== 식단 카드 (아침/저녁) ===== */
.meal-card { margin: 8px 16px 0; background: var(--card); border-radius: 18px; padding: 18px 18px 16px; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.meal-card.evening { background: var(--card); box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.meal-card.dimmed { opacity: 0.5; }
.meal-card-head { display:flex; align-items:center; gap:8px; margin-bottom: 14px; flex-wrap: wrap; }
.meal-lbl { font-size: 13px; font-weight: 700; color: #6e6661; }
.day-badge { display:inline-block; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; }
.db-new   { background:var(--coral); color:#fff; }
.db-trans { background:#1f1a18; color:#fff; }
.db-grain { background:#b6aea8; color:#fff; }

.meal-rows { display:flex; flex-direction:column; gap: 14px; }
.meal-row { display:flex; align-items:center; gap: 13px; }
.ic-tile { width:38px; height:38px; border-radius:11px; background:#f4f1ed; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.ic-tile img { width:28px; height:28px; object-fit:contain; }
.ic-tile .emoji { font-size:18px; }
.mr-name { font-size:15px; font-weight:700; color:#1f1a18; flex:1; }
.mr-name.repeat { color:var(--coral); }
.mr-amt { font-size:13px; color:#9a938f; margin-right:14px; font-weight:500; }
.mr-cube { font-size:13px; font-weight:700; color:var(--orange); white-space:nowrap; min-width:42px; text-align:right; }
.mr-cube .num { font-weight:800; }
.meal-note { margin-top:14px; padding-top:12px; border-top:1px dashed #e6e1dc; font-size:12px; color:#b06a4a; line-height:1.5; }

/* ===== 섭취 메모 / 완료 ===== */
.memo-block { margin-top: 16px; }
.memo-input-lbl { font-size: 12px; font-weight: 700; color: #6e6661; margin-bottom: 8px; }
.memo-input-lbl span { color:#b3aca7; font-weight:500; font-size:11px; }
.memo-input { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 13px; resize: none; outline: none; color: #2b2422; background:#faf8f6; }
.memo-input:focus { border-color: var(--coral); }
.check-btn { width: 100%; margin-top: 14px; padding: 15px; background: var(--coral); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; box-shadow:0 4px 14px rgba(249,112,112,0.3); }

/* 완료 기록 */
.memo-done { margin-top:16px; }
.memo-done-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.memo-done-lbl { font-size:12px; font-weight:700; color:#6e6661; }
.memo-edit-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:11px; color:#9a938f; }
.memo-txt { font-size:12px; color:#3a3330; line-height:1.6; background:#f4f8f4; border-radius:10px; padding:10px 12px; }
.memo-edit-wrap { margin-top:10px; display:none; }
.memo-save-btn { margin-top:8px; width:100%; padding:11px; background:#9a938f; color:#fff; border:none; border-radius:10px; font-size:12px; font-weight:700; }

/* ===== 아침 건너뜀 / 저녁 잠금 ===== */
.skip-badge { background:#c4bfbb; color:#fff; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; }
/* 아침 카드 내 보조 버튼 (섭취완료 아래) */
.skip-am-btn { margin-top:10px; width:100%; padding:10px; background:none; border:none; font-size:12px; font-weight:600; color:#6e6661; text-align:center; }
.skip-am-btn:active { opacity:0.6; }
.undo-skip-btn { margin-top:10px; width:100%; padding:10px; background:none; border:none; font-size:12px; font-weight:600; color:#6e6661; }
.meal-card.am-skipped { opacity:0.5; }
/* 저녁 잠금 래퍼 */
.evening-wrap { margin: 8px 16px 0; }
.pm-locked-card { background:var(--card); border-radius:18px; padding:18px 18px 16px; opacity:0.35; box-shadow:0 4px 18px rgba(60,45,40,0.06); pointer-events:none; }
.pm-locked-card .meal-card-head { margin-bottom:10px; }
/* 저녁 활성 카드 완료 버튼 — 아침과 동일 */
.check-btn.pm-btn { background: var(--coral); box-shadow:0 4px 14px rgba(249,112,112,0.3); }
/* 저녁 완료 배지 */
.pm-done-badge { background:#fef1f1; color:var(--coral); font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
.pm-done-lbl { font-size:12px; font-weight:700; color:var(--coral); }
.done-badge { background:#fef1f1; color:var(--coral); font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; margin-left:auto; }

.empty-card { margin: 10px 16px; background:#fff; border-radius:16px; text-align: center; color: #bbb; padding: 32px 0; font-size: 13px; }

/* ===== 새 식재료 카드 ===== */
.new-card { margin: 8px 16px 0; background: var(--card); border-radius: 18px; padding: 18px; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.new-lbl { font-family:'Paperlogy',sans-serif; font-size: 13px; font-weight: 600; color: var(--coral); margin-bottom: 10px; }
.new-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.new-chip { background: var(--coral); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }

/* ===== 아코디언 (카드 형태) ===== */
.acc { margin: 8px 16px 0; background: var(--card); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.acc-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 18px; user-select: none; cursor: pointer; }
.acc-title { font-family:'Paperlogy',sans-serif; font-size: 14px; font-weight: 600; color: #1f1a18; }
.acc-arrow { font-size: 12px; color: #9a938f; font-weight: 700; transition: transform 0.2s; }
.acc.open .acc-arrow { transform: rotate(180deg); }
.acc-body { display: none; padding: 0 18px 16px; border-top: 1px solid var(--border); }
.acc.open .acc-body { display: block; }

/* ===== 재고/장보기 ===== */
.stock-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: #2b2422; }
.stock-row:last-of-type { border-bottom: none; }
.stock-name { flex: 1; }
.stock-val { font-weight: 700; }
.stock-low { color: #fd0c0c !important; }
.stock-edit-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
.stock-edit-row:last-of-type { border-bottom: none; }
.stock-input { width: 60px; border: 1px solid var(--border); border-radius: 6px; padding: 5px 6px; font-size: 12px; text-align: center; outline: none; }
.stock-input:focus { border-color: var(--sky); }
.stock-unit { font-size: 11px; color: var(--text-sub); }
.stock-edit-btn { width: 100%; margin-top: 10px; padding: 10px; background: #f5f2ef; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: #6e6661; }
.stock-save-all-btn { width: 100%; margin-top: 10px; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; }
.stock-cancel-btn { width: 100%; margin-top: 6px; padding: 9px; background: #f5f2ef; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--gray); }
.add-divider { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.add-stock-btn { width: 100%; padding: 10px; background: #f5f2ef; border: 1px dashed var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--gray); }
.add-form { margin-top: 10px; padding: 12px; background: #faf8f6; border-radius: 8px; border: 1px solid var(--border); }
.add-form input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12px; margin-bottom: 6px; outline: none; }
.add-form input:focus { border-color: var(--coral); }
.add-form-row { display: flex; gap: 6px; margin-bottom: 6px; }
.add-form-row input { margin-bottom: 0; flex: 1; }
.add-confirm-btn { width: 100%; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; }
.shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding: 4px 0 16px; }
.shop-chip { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--border); border-radius:12px; padding:11px 13px; font-size:13px; color:#2b2422; font-weight:500; min-width:0; }
.shop-chip-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.shop-chip-x { background:none; border:none; font-size:15px; color:#cfc9c4; padding:0 0 0 6px; flex-shrink:0; line-height:1; }
.shop-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.shop-row:last-of-type { border-bottom: none; }
.shop-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--coral); flex-shrink: 0; }
/* 재고 편집행 정렬 */
.stock-edit-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; gap:0; }
.stock-edit-row:last-of-type { border-bottom:none; }
.stock-edit-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.stock-order-btns { display:flex; flex-direction:column; gap:2px; margin-right:8px; }
.stock-order-btn { background:#f5f2ef; border:1px solid var(--border); border-radius:5px; padding:2px 7px; font-size:10px; color:#777; line-height:1.4; cursor:pointer; }
.stock-order-btn:disabled { opacity:0.3; cursor:default; }
.stock-edit-x { background:none; border:none; font-size:16px; color:#cfc9c4; padding:0 0 0 8px; cursor:pointer; flex-shrink:0; line-height:1; }
.notice-list li { font-size: 13px; color: #4a433f; line-height: 1.4; list-style: none; padding: 10px 0; border-bottom: 1px solid var(--border); }
.notice-list li:last-child { border-bottom: none; }

/* ===== 인라인 편집 ===== */
.edit-row { display:flex; align-items:center; gap:10px; }
.edit-amt-input { width:70px; border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:13px; text-align:center; outline:none; font-family:'Pretendard',sans-serif; background:#faf8f6; flex-shrink:0; }
.edit-amt-input:focus { border-color:var(--coral); }
.edit-del-btn { background:none; border:none; font-size:16px; color:#cfc9c4; padding:0 2px; flex-shrink:0; }
.edit-add-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
.edit-add-name { flex:1; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; outline:none; font-family:'Pretendard',sans-serif; background:#faf8f6; }
.edit-add-amt { width:80px; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; outline:none; text-align:center; font-family:'Pretendard',sans-serif; background:#faf8f6; }
.edit-add-name:focus, .edit-add-amt:focus { border-color:var(--coral); }
.edit-actions { display:flex; gap:8px; margin-top:12px; }
.edit-save-btn { flex:1; padding:10px; background:var(--coral); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:700; font-family:'Pretendard',sans-serif; }
.edit-cancel-btn { flex:1; padding:10px; background:#f5f2ef; color:#6e6661; border:none; border-radius:10px; font-size:13px; font-weight:600; font-family:'Pretendard',sans-serif; }
/* 카드 헤더 편집 버튼 */
.card-edit-btn { margin-left:auto; background:none; border:none; font-size:12px; font-weight:600; color:#9a938f; padding:0; letter-spacing:0; }

/* ===== 하단 탭 ===== */
.bottom-tabs { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; display: flex; z-index: 300; border-top:1px solid var(--border); }
.btab { font-family:'Paperlogy',sans-serif; flex: 1; background: none; border: none; color: #b3aca7; font-size: 12px; font-weight: 700; padding: 14px 4px 16px; transition: color 0.2s; border-top:2px solid transparent; }
.btab.active { color: #1f1a18; border-top: 2px solid #1f1a18; }

/* =====================================================
   ===== 월간 달력 (제공된 플래너 디자인, .mcal 스코프) =====
   ===================================================== */
.mcal { font-family: 'Paperlogy', sans-serif; color: #3B3333; padding: 24px 18px 20px; }
.mcal .month-top { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.mcal .month-title { font-size: 28px; font-weight: 700; color: #000; line-height: 1.15; }
.mcal .checklist-box { border: 1px solid #CACACA; border-radius: 8px; padding: 12px 16px; }
.mcal .checklist-title { font-size: 11px; font-weight: 700; color: #F97070; margin-bottom: 8px; letter-spacing: 0.2px; }
.mcal .checklist-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 5px 10px; margin-bottom: 12px; }
.mcal .checklist-item { display: flex; align-items: flex-start; gap: 5px; cursor: pointer; user-select: none; }
.mcal .checklist-item input[type="checkbox"] { appearance:none; -webkit-appearance:none; width:13px; height:13px; min-width:13px; border:1px solid #CACACA; border-radius:3px; flex-shrink:0; cursor:pointer; position:relative; margin-top:1px; }
.mcal .checklist-item input[type="checkbox"]:checked { background:#F97070; border-color:#F97070; }
.mcal .checklist-item input[type="checkbox"]:checked::after { content:''; position:absolute; left:3px; top:0px; width:4px; height:8px; border:1.5px solid #fff; border-top:none; border-left:none; transform:rotate(45deg); }
.mcal .checklist-item label { font-size:10.5px; color:#3B3333; cursor:pointer; line-height:1.35; }
.mcal .checklist-item.checked label { text-decoration:line-through; color:#CACACA; }
.mcal .repeat-memo { border-top:1px solid #F0ECEA; padding-top:10px; margin-top:2px; }
.mcal .repeat-memo-title { font-size:10px; font-weight:700; color:#F97070; margin-bottom:6px; }
.mcal .repeat-memo-grid { display:grid; grid-template-columns:1fr; gap:4px; }
.mcal .repeat-memo-item { font-size:10px; color:#9D9D9D; line-height:1.4; }
.mcal .repeat-memo-item strong { color:#3B3333; font-weight:600; }
.mcal .weekdays { display:grid; grid-template-columns:repeat(7,1fr); border:1px solid #CACACA; border-bottom:none; background:#F1F1F1; }
.mcal .wd { text-align:center; padding:8px 0; font-size:13px; font-weight:500; color:#3B3333; }
.mcal .days-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); border-left:1px solid #CACACA; border-top:1px solid #CACACA; }
.mcal .dc { min-height:118px; padding:6px 5px 6px; border-right:1px solid #CACACA; border-bottom:1px solid #CACACA; background:#fff; }
.mcal .dc.empty { background:transparent; }
.mcal .month-section { margin-bottom:40px; }
.mcal .day-row { display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-bottom:5px; }
.mcal .dn { font-size:14px; font-weight:700; line-height:1; color:#3B3333; }
.mcal .dc.today .dn { color:#F97070; }
.mcal .dc.done .dn { color:#BBBBBB; }
.mcal .meal-day-count { font-size:8px; color:#CACACA; font-weight:400; white-space:nowrap; }
.mcal .badge { display:inline-block; font-size:9px; font-weight:500; padding:2px 7px; border-radius:20px; line-height:1.4; white-space:nowrap; }
.mcal .b-new { background:#F97070; color:#fff; }
.mcal .b-trans { background:#000; color:#fff; }
.mcal .b-grain { background:#BBBBBB; color:#fff; }
.mcal .time-badge { display:inline-block; font-size:8px; font-weight:500; padding:1px 5px; border-radius:20px; line-height:1.4; white-space:nowrap; background:transparent; color:#9D9D9D; border:0.5px solid #C7C2BF; }
.mcal .meal-block { margin-bottom:3px; }
.mcal .meal-header { margin-bottom:2px; }
.mcal .meal-sep { border:none; border-top:1px solid #E8E0DC; margin:4px 0; }
.mcal .meal-items { display:flex; flex-direction:column; gap:1px; }
.mcal .meal-item { font-size:9.5px; font-weight:400; color:#3B3333; line-height:1.45; }
.mcal .meal-item.repeat { color:#F97070; }
.mcal .dc.done .meal-item { color:#BBBBBB; text-decoration:line-through; }
.mcal .print-btn-wrap { padding: 4px 0 12px; }
.mcal .print-btn { width:100%; background:#1f1a18; color:#fff; border:none; padding:13px; font-size:13px; font-weight:700; border-radius:10px; }

@media print {
  body { max-width: none; background: #fff; }
  .bottom-tabs, .mcal .print-btn-wrap, .header { display: none !important; }
  #cal-view .header { display:none; }
}
</style>
</head>

/* ================================================
   유틸
================================================ */
const DOW = ["월","화","수","목","금","토","일"];
let curMonth = TODAY.getMonth();
let sel = new Date(TODAY);

function dk(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function dds(d) { return `D+${Math.floor((d - START) / 86400000) + 1}`; }
function dows(d) { const x = d.getDay(); return DOW[x === 0 ? 6 : x - 1]; }
function isToday(d) { return d.toDateString() === TODAY.toDateString(); }
function isPast(d) { return d < TODAY && !isToday(d); }
function isMidPhase(d) { return d >= MID_START; }

function weekStart(d) {
  const x = d.getDay(); const m = new Date(d);
  m.setDate(d.getDate() - (x === 0 ? 6 : x - 1)); return m;
}
function weekDays(s) {
  return Array.from({length:7}, (_,i) => { const d=new Date(s); d.setDate(s.getDate()+i); return d; });
}
function weekNumber(d) {
  const f = new Date(2026, d.getMonth(), 1);
  return Math.ceil((d.getDate() + ((f.getDay() || 7) - 1)) / 7);
}
function esc(v) {
  return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function ageStr(d) {
  const by=BIRTH.getFullYear(),bm=BIRTH.getMonth(),bd=BIRTH.getDate();
  const dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
  let totalM=(dy-by)*12+(dm-bm); if(dd<bd) totalM--;
  const lastB=new Date(BIRTH); lastB.setMonth(lastB.getMonth()+totalM);
  return `생후 ${totalM}개월 ${Math.floor((d-lastB)/86400000)+1}일`;
}

/* item 문자열 파싱 → {name, amount, cube, repeat} */
function parseItem(raw) {
  let repeat=false, s=raw;
  if (s.startsWith('반복:')) { repeat=true; s=s.slice(3); }
  const m = s.match(/^(.*?)\s+(\d+\s*g|\d+\s*팩|\d+\s*개|소량|반복노출|반복)$/);
  let name, amount;
  if (m) { name=m[1]; amount=m[2]; } else { name=s; amount=''; }
  let cube=0; const g=parseInt(amount);
  if (/g$/.test(amount) && !isNaN(g)) cube=Math.round(g/15);
  return { name, amount, cube, repeat };
}

/* 재료 → 아이콘 매핑 */
function iconFor(name) {
  const n = name;
  if (n.includes('쌀')) return ICONS['쌀'];
  if (n.includes('한우') || n.includes('소고기')) return ICONS['소고기'];
  if (n.includes('노른자')) return ICONS['노른자'];
  if (n.includes('흰자')) return ICONS['흰자'];
  if (n.includes('오트밀')) return ICONS['오트밀'];
  if (n.includes('브로콜리')) return ICONS['브로콜리'];
  if (n.includes('고구마')) return ICONS['고구마'];
  if (n.includes('감자')) return ICONS['감자'];
  if (n.includes('애호박')) return ICONS['애호박'];
  if (n.includes('단호박')) return ICONS['단호박'];
  if (n.includes('양배추')) return ICONS['양배추'];
  if (n.includes('당근')) return ICONS['당근'];
  if (n.includes('닭')) return ICONS['닭고기'];
  if (n.includes('돼지')) return ICONS['돼지고기'];
  if (n.includes('땅콩')) return ICONS['땅콩'];
  if (n.includes('청경채')) return ICONS['청경채'];
  return null;
}
/* 아이콘 없는 재료 이모지 폴백 */
function emojiFor(name) {
  if (name.includes('두부')) return '⬜';
  if (name.includes('밀')) return '🌾';
  if (name.includes('새우')) return '🦐';
  if (name.includes('생선')) return '🐟';
  if (name.includes('대게')) return '🦀';
  if (name.includes('조개')) return '🐚';
  if (name.includes('참깨')) return '🌰';
  if (name.includes('호두')) return '🌰';
  if (name.includes('메밀')) return '🌾';
  return '🥣';
}

/* ================================================
   날짜 스트립
================================================ */
function renderStrip() {
  document.getElementById('month-lbl').textContent = `${curMonth + 1}월`;
  document.getElementById('sub').textContent = ageStr(TODAY);
  let html = "";
  for (let day = 1; day <= 31; day++) {
    const d = new Date(2026, curMonth, day);
    if (d.getMonth() !== curMonth) break;
    const data = meals[dk(d)];
    let cls = "day-item";
    if (isToday(d)) cls += " today";
    if (d.toDateString() === sel.toDateString()) cls += " selected";
    if (data && isDayDone(data)) cls += " done-day";
    html += `<div class="${cls}" onclick="pick(${d.getFullYear()},${d.getMonth()},${d.getDate()})"><div class="dn">${day}</div></div>`;
  }
  document.getElementById('strip').innerHTML = html;
  setTimeout(() => {
    const wrap = document.getElementById('strip-wrap');
    const items = document.getElementById('strip').querySelectorAll('.day-item');
    const idx = sel.getDate() - 1;
    if (items[idx]) {
      const il = items[idx].getBoundingClientRect().left;
      const wl = wrap.getBoundingClientRect().left;
      wrap.scrollTo({ left: wrap.scrollLeft + il - wl - wrap.clientWidth/2 + items[idx].clientWidth/2, behavior:'smooth' });
    }
  }, 50);
}

      h += `<div class="edit-row">${tile}
        <span class="mr-name" style="flex:1;">${esc(name)}</span>
        <input class="edit-amt-input" value="${esc(amount)}" id="ea-${dateKey}-${slot}-${idx}" placeholder="30g">
        <button class="edit-del-btn" onclick="deleteEditRow('${dateKey}','${slot}',${idx})">✕</button>
      </div>`;
    });
    h += `<div class="edit-add-row">
      <input class="edit-add-name" id="ean-${dateKey}-${slot}" placeholder="재료명">
      <input class="edit-add-amt" id="eaa-${dateKey}-${slot}" placeholder="양 (예: 30g)">
      <button onclick="addEditRow('${dateKey}','${slot}')" style="background:var(--coral);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;">+</button>
    </div>`;
    h += `<div class="edit-actions">
      <button class="edit-save-btn" onclick="saveEdit('${dateKey}','${slot}')">확인</button>
      <button class="edit-cancel-btn" onclick="cancelEdit('${dateKey}','${slot}')">취소</button>
    </div>`;
    return h;
  }

  /* 표시 모드 */
  const displayItems = (data && data[editedKey]) ? data[editedKey] : items;
  return displayItems.map((raw, idx) => {
    const { name, amount, cube, repeat } = parseItem(raw);
    const icon = iconFor(name);
    const tile = icon
      ? `<div class="ic-tile"><img src="${icon}" alt=""></div>`
      : `<div class="ic-tile"><span class="emoji">${emojiFor(name)}</span></div>`;
    const amtHtml = amount ? `<span class="mr-amt">${esc(amount)}</span>` : '';
    const cubeHtml = cube > 0 ? `<span class="mr-cube"><span class="num">${cube}</span> 큐브</span>` : `<span class="mr-cube"></span>`;
    /* 완료 전이고 편집 가능한 슬롯이면 큐브 표시만 */
    return `<div class="meal-row">${tile}<span class="mr-name${repeat?' repeat':''}">${esc(name)}</span>${amtHtml}${cubeHtml}</div>`;
  }).join('');
}

function dayBadgesHtml(data) {
  let h = '';
  if (data.badge)    h += `<span class="day-badge db-${data.badge.t}">${esc(data.badge.x)}</span>`;
  if (data.newBadge) h += `<span class="day-badge db-${data.newBadge.t}">${esc(data.newBadge.x)}</span>`;
  return h;
}

/* ================================================
   메인 콘텐츠
================================================ */
function renderContent() {
  const key = dk(sel);
  const data = meals[key];
  const todaySelected = isToday(sel);
  const midPhase = isMidPhase(sel);
  const twoMeal = sel >= TWO_MEAL_START && data && data.pm;

  let html = `
    <div class="day-hd">
      <div class="dday-row">
        <span class="dday">${dds(sel)}</span>
        <span class="dday-date">${sel.getMonth()+1}월 ${sel.getDate()}일 ${dows(sel)}요일${midPhase ? ' · <span class="dday-mid">중기</span>' : ''}</span>
      </div>
    </div>`;

  if (data && data.midStart) {
    html += `
      <div class="mid-banner">
        <div class="mid-banner-title">🎉 중기 이유식 전환! (생후 약 210일)</div>
        <div class="mid-banner-sub">농도 쌀:물 = 1:5 · 1회 목표 60~120g · 2회식 유지 · 오트밀 → 퀵오트 교체</div>
      </div>`;
  }

  if (!data) {
    html += `<div class="empty-card">이날은 식단이 없어요</div>`;
  } else {
    const sectionLbl = todaySelected ? `<span class="accent">오늘</span> 식단`
                     : isPast(sel) ? `지난 식단` : `예정 식단`;

    /* 오늘 식단일 때만 재고 경고 체크 */
    let warnHtml = '';
    if (todaySelected && dbStocks.length > 0) {
      const todayItems = [...(data.amEdited || data.am || []), ...(data.pmEdited || data.pm || [])];
      const lowNames = [];
      todayItems.forEach(raw => {
        const { name } = parseItem(raw);
        const stock = dbStocks.find(s => s.name === name);
        if (stock && stock.amount <= stock.low_alert && !lowNames.includes(name)) lowNames.push(name);
      });
      if (lowNames.length > 0) {
        warnHtml = `<span class="stock-warn">⚠️ ${lowNames.join(' · ')} 부족</span>`;
      }
    }
    html += `<div class="sec-title">${sectionLbl}${warnHtml}</div>`;

    const isTwomeal = !!data.pm;
    const amSkipped  = !!data.amSkipped;
    const amDone     = !!data.done;
    const pmDone     = !!data.pmDone;
    const pmUnlocked = amDone || amSkipped; // 저녁 활성 조건

    const amEditMode = !!(data.amEditMode);
    const amEditBtn = (!amDone && !amSkipped && !amEditMode)
      ? `<button class="card-edit-btn" onclick="startEdit('${key}','am')">편집</button>` : '';

    /* ── 아침(오전) 카드 ── */
    const amCardCls = amSkipped ? ' am-skipped' : (amDone ? ' dimmed' : '');
    html += `<div class="meal-card${amCardCls}">
      <div class="meal-card-head">
        <span class="meal-lbl">${isTwomeal ? '아침' : '이유식'}</span>
        ${amSkipped ? `<span class="skip-badge">건너뜀</span>` : ''}
        ${dayBadgesHtml(data)}
        ${amDone ? `<span class="done-badge">✓ 완료</span>` : amEditBtn}
      </div>
      <div class="meal-rows">${mealRowsHtml(data.am || [], key, 'am')}</div>
      ${data.note ? `<div class="meal-note">💧 ${esc(data.note)}</div>` : ''}`;

    if (amSkipped) {
      /* 건너뜀 상태 — 취소 버튼만 */
      html += `<button class="undo-skip-btn" onclick="skipAm('${key}')">↩ 아침 건너뜀 취소</button>`;
    } else if (!amDone) {
      /* 미완료 — 섭취완료 + 아침 건너뜀 보조버튼 */
      html += `
        <div class="memo-block">
          <div class="memo-input-lbl">📝 섭취 메모 <span>(선택)</span></div>
          <textarea id="memo-input" class="memo-input" rows="2" placeholder="예) 잘 먹음, 조금 남김, 발진 없음..."></textarea>
          <button class="check-btn" onclick="checkDone('${key}')">섭취 완료</button>
          ${isTwomeal ? `<button class="skip-am-btn" onclick="skipAm('${key}')">아침 건너뜀</button>` : ''}
        </div>`;
    } else {
      /* 아침 완료 — 기록 표시 */
      html += `
        <div class="memo-done">
          <div class="memo-done-head">
            <div class="memo-done-lbl">📝 아침 기록</div>
            <div style="display:flex;gap:6px;">
              <button class="memo-edit-btn" onclick="showMemoEdit()">수정</button>
              <button class="memo-edit-btn" style="color:#e65100;border-color:#ffccbc;" onclick="cancelDone('${key}')">취소</button>
            </div>
          </div>
          <div class="memo-txt" id="memo-display-txt">${esc(data.memo || '섭취완료')}</div>
          <div class="memo-edit-wrap" id="memo-edit-wrap">
            <textarea id="memo-input" class="memo-input" rows="2">${esc(data.memo || '')}</textarea>
            <button class="memo-save-btn" onclick="updateMemo('${key}')">저장</button>
          </div>
        </div>`;
    }
    html += `</div>`; /* /meal-card 아침 */

    /* ── 저녁(오후) 카드 — 2끼일 때만 ── */
    if (isTwomeal) {
      if (!pmUnlocked) {
        /* 잠김: 아침 미완료 + 미건너뜀 */
        html += `<div class="evening-wrap">
          <div class="pm-locked-card">
            <div class="meal-card-head"><span class="meal-lbl">저녁</span><span style="margin-left:auto;font-size:16px;opacity:0.5;">🔒</span></div>
            <div class="meal-rows">${mealRowsHtml(data.pm)}</div>
          </div>
        </div>`;
      } else if (pmDone) {
        /* 저녁 완료 */
        html += `<div class="meal-card dimmed">
          <div class="meal-card-head">
            <span class="meal-lbl">저녁</span>
            <span class="pm-done-badge">✓ 완료</span>
          </div>
          <div class="meal-rows">${mealRowsHtml(data.pm, key, 'pm')}</div>
          <div class="memo-done" style="margin-top:14px;">
            <div class="memo-done-head">
              <div class="pm-done-lbl">📝 섭취 기록</div>
              <div style="display:flex;gap:6px;">
                <button class="memo-edit-btn" onclick="showPmMemoEdit()">수정</button>
                <button class="memo-edit-btn" style="color:#e65100;border-color:#ffccbc;" onclick="cancelPmDone('${key}')">취소</button>
              </div>
            </div>
            <div class="memo-txt" id="pm-memo-display-txt">${esc(data.pmMemo || '섭취완료')}</div>
            <div class="memo-edit-wrap" id="pm-memo-edit-wrap">
              <textarea id="pm-memo-input" class="memo-input" rows="2">${esc(data.pmMemo || '')}</textarea>
              <button class="memo-save-btn" onclick="updatePmMemo('${key}')">저장</button>
            </div>
          </div>
        </div>`;
      } else {
        /* 저녁 활성(아침 완료 or 건너뜀) */
        const pmEditMode = !!(data.pmEditMode);
        const pmEditBtn = !pmEditMode ? `<button class="card-edit-btn" onclick="startEdit('${key}','pm')">편집</button>` : '';
        html += `<div class="meal-card">
          <div class="meal-card-head"><span class="meal-lbl">저녁</span>${pmEditBtn}</div>
          <div class="meal-rows">${mealRowsHtml(data.pm, key, 'pm')}</div>
          <div class="memo-block">
            <div class="memo-input-lbl">📝 섭취 메모 <span>(선택)</span></div>
            <textarea id="pm-memo-input" class="memo-input" rows="2" placeholder="예) 잘 먹음, 조금 남김, 발진 없음..."></textarea>
            <button class="check-btn pm-btn" onclick="checkPmDone('${key}')">섭취 완료</button>
          </div>
        </div>`;
      }
    }
  }

  /* 이번 주 새 식재료 */
  const newItems = [];
  weekDays(weekStart(sel)).forEach(d => {
    const m = meals[dk(d)];
    if (!m) return;
    [m.badge, m.newBadge].forEach(b => {
      if (b && b.t === 'new') {
        const nm = b.x.replace(/^New\s*/, '').trim();
        if (nm && !newItems.includes(nm)) newItems.push(nm);
      }
    });
  });
  if (newItems.length > 0) {
    html += `<div class="new-card">
      <div class="new-lbl">${sel.getMonth()+1}월 ${weekNumber(sel)}주차 새 식재료</div>
      <div class="new-chips">${newItems.map(i => `<span class="new-chip">${esc(i)}</span>`).join('')}</div>
    </div>`;
  }

  html += accHtml("a-s", "재고 현황", stockHtml());
  html += accHtml("a-h", "장볼 재료", shopHtml());
  html += accHtml("a-n", "알러지 유의사항", noticeHtml());
  html += `<div style="height:80px;"></div>`;
  document.getElementById('content').innerHTML = html;
}

   아코디언

function accHtml(id, title, body) {
  return `<div class="acc" id="${id}"><div class="acc-header" onclick="toggleAcc('${id}')"><span class="acc-title">${title}</span><span class="acc-arrow">▼</span></div><div class="acc-body">${body}</div></div>`;
}
function toggleAcc(id) { document.getElementById(id).classList.toggle('open'); }

/* ================================================
   재고 현황 (기존 로직 유지)
================================================ */
function stockHtml() {
  if (dbStocks.length === 0) return '<div style="padding:8px 0;color:#aaa;font-size:12px;">재고 정보를 불러오는 중...</div>';
  let html = '';
  if (!stockEditMode) {
    html += dbStocks.map(s => {
      const isLow = s.amount <= s.low_alert;
      const icon = iconFor(s.name);
      const iconEl = icon
        ? `<img src="${icon}" alt="" style="width:22px;height:22px;object-fit:contain;flex-shrink:0;">`
        : `<span style="font-size:16px;flex-shrink:0;">${emojiFor(s.name)}</span>`;
      return `<div class="stock-row" style="gap:14px;">${iconEl}<span class="stock-name">${esc(s.name)}</span><span class="stock-val${isLow ? ' stock-low' : ''}">${s.amount}${esc(s.unit)} ${isLow ? '❗' : ''}</span></div>`;
    }).join('');
    html += `<button class="stock-edit-btn" onclick="startStockEdit()">재고 수정하기</button>`;
  } else {
    html += dbStocks.map((s, idx) => `
  <div class="stock-edit-row">
    <div class="stock-order-btns">
      <button class="stock-order-btn" onclick="moveStock(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
      <button class="stock-order-btn" onclick="moveStock(${idx},1)" ${idx===dbStocks.length-1?'disabled':''}>▼</button>
    </div>
    <span class="stock-edit-name">${esc(s.name)}</span>
    <input type="number" class="stock-input" id="si-${s.id}" value="${s.amount}" min="0" style="margin-right:4px;" />
    <span class="stock-unit">${esc(s.unit)}</span>
    <button class="stock-edit-x" onclick="deleteStock(${s.id})">✕</button>
  </div>`).join('');
    html += `<button class="stock-save-all-btn" onclick="saveAllStocks()">전체 저장</button>`;
    html += `<button class="stock-cancel-btn" onclick="cancelStockEdit()">취소</button>`;
  }
  html += `<div class="add-divider"><button class="add-stock-btn" onclick="toggleAddForm()">+ 새 재료 추가</button>`;
  if (showAddForm) {
    html += `<div class="add-form">
        <input type="text" id="ns-name" placeholder="재료 이름 (예: 당근)" />
        <div class="add-form-row"><input type="number" id="ns-amt" placeholder="수량" min="0" /><input type="text" id="ns-unit" placeholder="단위 (개/g/봉)" /></div>
        <input type="number" id="ns-alert" placeholder="알림 기준 수량 (예: 2)" min="0" />
        <button class="add-confirm-btn" onclick="addStock()">추가하기</button>
      </div>`;
  }
  html += `</div>`;
  return html;
}
function startStockEdit() { stockEditMode = true; refreshStockBody(); }
function cancelStockEdit() { stockEditMode = false; refreshStockBody(); }
function refreshStockBody() { const b=document.querySelector('#a-s .acc-body'); if(b) b.innerHTML=stockHtml(); }
function toggleAddForm() { showAddForm=!showAddForm; refreshStockBody(); }

/* ================================================
   장볼 재료 (기존 로직 유지)
================================================ */
function shopHtml() {
  const autoShopNames = dbStocks.filter(s => s.amount <= s.low_alert).map(s => s.name);
  const manualShops = shops.filter(s => !autoShopNames.includes(s.name));
  const allItems = [
    ...autoShopNames.map(n => ({ name: n, id: null })),
    ...manualShops.map(s => ({ name: s.name, id: s.id })),
  ];

  let html = '';
  if (allItems.length === 0) {
    html += `<div style="padding:8px 0;font-size:12px;color:#aaa;text-align:center;">장볼 재료가 없어요 👍</div>`;
  } else {
    html += `<div class="shop-grid">`;
    allItems.forEach(item => {
      const xBtn = item.id !== null
        ? `<button class="shop-chip-x" onclick="removeShopItem(${item.id})">✕</button>` : '';
      html += `<div class="shop-chip"><span class="shop-chip-name">${esc(item.name)}</span>${xBtn}</div>`;
    });
    html += `</div>`;
  }
  html += `<div style="padding-top:4px;"><button class="add-stock-btn" style="color:var(--coral);border-color:#fde0e0;background:#fff5f5;" onclick="toggleShopAddForm()">+ 장볼 재료 추가</button>`;
  if (showShopAddForm) html += `<div class="add-form" style="margin-top:8px;"><input type="text" id="new-shop-item" placeholder="예) 한우 우둔살 350g" /><button class="add-confirm-btn" onclick="addShopItem()">추가하기</button></div>`;
  html += `</div>`;
  return html;
}
function toggleShopAddForm() { showShopAddForm=!showShopAddForm; refreshShopBody(); }
function refreshShopBody() { const b=document.querySelector('#a-h .acc-body'); if(b) b.innerHTML=shopHtml(); }

function noticeHtml() { return `<ul class="notice-list">${notices.map(n => `<li>${esc(n)}</li>`).join('')}</ul>`; }
function showMemoEdit() { const w=document.getElementById('memo-edit-wrap'); if(w) w.style.display='block'; }

function moveStock(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= dbStocks.length) return;
  dbStocks.forEach(s => { const i=document.getElementById(`si-${s.id}`); if(i) s._tempAmount=parseInt(i.value); });
  [dbStocks[idx], dbStocks[newIdx]] = [dbStocks[newIdx], dbStocks[idx]];
  refreshStockBody();
}

/* ================================================
   Supabase (기존 로직 그대로)
================================================ */
async function saveAllStocks() {
  for (let i=0; i<dbStocks.length; i++) {
    const s = dbStocks[i];
    const input = document.getElementById(`si-${s.id}`);
    const newAmt = input ? parseInt(input.value) : (s._tempAmount ?? s.amount);
    if (isNaN(newAmt) || newAmt < 0) continue;
    const { error } = await sb.from('inventory').update({ amount: newAmt, sort_order: i }).eq('id', s.id);
    if (error) { alert(`${s.name} 저장 실패: ${error.message}`); return; }
  }
  stockEditMode = false; await loadStocks();
  const acc = document.getElementById('a-s'); if (acc) acc.classList.add('open');
}
async function deleteStock(id) {
  const stock = dbStocks.find(s => s.id === id); if (!stock) return;
  if (!confirm(`'${stock.name}'을(를) 삭제할까요?`)) return;
  const { error } = await sb.from('inventory').delete().eq('id', id);
  if (error) { alert('삭제 실패: ' + error.message); return; }
  stockEditMode = true; await loadStocks();
  const acc = document.getElementById('a-s'); if (acc) acc.classList.add('open');
}
async function addStock() {
  const name = document.getElementById('ns-name')?.value?.trim();
  const amount = parseInt(document.getElementById('ns-amt')?.value || 0);
  const unit = document.getElementById('ns-unit')?.value?.trim() || '개';
  const low_alert = parseInt(document.getElementById('ns-alert')?.value || 2);
  if (!name) { alert('재료 이름을 입력해주세요.'); return; }
  const sort_order = dbStocks.length;
  const { error } = await sb.from('inventory').insert([{ name, amount, unit, low_alert, sort_order }]);
  if (error) { alert('추가 실패: ' + error.message); return; }
  showAddForm = false; await loadStocks();
  const acc = document.getElementById('a-s'); if (acc) acc.classList.add('open');
}
async function loadStocks() {
  try {
    const { data, error } = await sb.from('inventory').select('*').order('sort_order').order('id');
    if (error) { console.error('재고 로딩 오류:', error); return; }
    if (data) dbStocks = data;
    refreshStockBody();
  } catch (e) { console.error('Supabase 오류:', e); }
}
async function addShopItem() {
  const input = document.getElementById('new-shop-item'); const val = input?.value?.trim();
  if (!val) { alert('재료 이름을 입력해주세요.'); return; }
  const { error } = await sb.from('shop_list').insert([{ name: val }]);
  if (error) { alert('추가 실패: ' + error.message); return; }
  showShopAddForm = false; await loadShops();
  const acc = document.getElementById('a-h'); if (acc) acc.classList.add('open');
}
async function removeShopItem(id) {
  const { error } = await sb.from('shop_list').delete().eq('id', id);
  if (error) { alert('삭제 실패: ' + error.message); return; }
  await loadShops();
  const acc = document.getElementById('a-h'); if (acc) acc.classList.add('open');
}
async function loadShops() {
  try {
    const { data, error } = await sb.from('shop_list').select('*').order('id');
    if (error) { console.error('shop_list 오류:', error); return; }
    shops = data || []; refreshShopBody();
  } catch (e) { console.error('shop_list 연결 오류:', e); }
}
async function loadMealLog() {
  try {
    const { data, error } = await sb.from('meal_log').select('*');
    if (error) { console.error('meal_log 오류:', error); return; }
    if (data && data.length > 0) data.forEach(log => {
      if (meals[log.date]) { meals[log.date].done = log.done; meals[log.date].memo = log.memo || '섭취완료'; }
    });
  } catch (e) { console.error('meal_log 연결 오류:', e); }
}

/* 재료 차감 수량 계산 */
function calcUseCount(amount) {
  const s = String(amount || '').trim();
  if (!s || s === '반복노출' || s === '반복') return 0; /* 반복노출은 차감 없음 */
  if (s === '소량') return 1;
  if (s.includes('팩') || s.includes('개')) return Math.max(1, parseInt(s) || 1);
  const g = parseInt(s);
  if (isNaN(g) || g <= 0) return 0;
  return Math.max(1, Math.round(g / 15)); /* 최소 1큐브 보장 */
}
async function checkDone(dateKey) {
  const data = meals[dateKey]; if (!data) return;
  if (!confirm('섭취 완료로 기록할까요? 재고가 자동 차감됩니다.')) return;
  const memoEl = document.getElementById('memo-input');
  const memo = memoEl && memoEl.value.trim() ? memoEl.value.trim() : '섭취완료';

  const allRaw = [...(data.amEdited || data.am || [])];
  const stockChanges = [];
  for (const raw of allRaw) {
    const { name, amount } = parseItem(raw);
    const useCount = calcUseCount(amount);
    if (useCount <= 0) continue;
    const stock = dbStocks.find(s => s.name === name); if (!stock) continue;
    const actualDeduct = Math.min(useCount, stock.amount);
    await sb.from('inventory').update({ amount: stock.amount - actualDeduct }).eq('id', stock.id);
    stock.amount -= actualDeduct;
    stockChanges.push({ id: stock.id, name: stock.name, amount: actualDeduct });
  }
  const { error: logErr } = await sb.from('meal_log').upsert({ date: dateKey, done: true, memo, stock_changes: stockChanges }, { onConflict: 'date' });
  if (logErr) console.error('meal_log 저장 오류:', logErr);
  meals[dateKey].done = true; meals[dateKey].memo = memo;
  await loadStocks(); renderStrip(); renderContent();
}
async function cancelDone(dateKey) {
  if (!confirm('섭취 완료를 취소할까요? 차감된 재고가 복구됩니다.')) return;
  const { data: logData, error: fetchErr } = await sb.from('meal_log').select('stock_changes').eq('date', dateKey).single();
  if (fetchErr) { alert('취소 실패: ' + fetchErr.message); return; }
  const changes = logData?.stock_changes || [];
  for (const change of changes) {
    const stock = dbStocks.find(s => s.id === change.id);
    if (stock) await sb.from('inventory').update({ amount: stock.amount + change.amount }).eq('id', change.id);
  }
  const { error: updateErr } = await sb.from('meal_log').update({ done: false, stock_changes: [] }).eq('date', dateKey);
  if (updateErr) { alert('취소 실패: ' + updateErr.message); return; }
  meals[dateKey].done = false; meals[dateKey].memo = '';
  /* 아침 건너뜀 상태도 초기화 */
  meals[dateKey].amSkipped = false;
  localStorage.removeItem(`jjina_am_skip_${dateKey}`);
  await loadStocks(); renderStrip(); renderContent();
}
async function updateMemo(dateKey) {
  const memoEl = document.getElementById('memo-input'); if (!memoEl) return;
  const memo = memoEl.value.trim() || '섭취완료';
  const { error } = await sb.from('meal_log').upsert({ date: dateKey, done: true, memo }, { onConflict: 'date' });
  if (error) { alert('저장 실패: ' + error.message); return; }
  meals[dateKey].memo = memo;
  const editWrap = document.getElementById('memo-edit-wrap');
  const displayTxt = document.getElementById('memo-display-txt');
  if (editWrap) editWrap.style.display = 'none';
  if (displayTxt) displayTxt.textContent = memo;
}

/* ================================================
   아침 건너뜀 토글
================================================ */
function skipAm(dateKey) {
  const data = meals[dateKey]; if (!data) return;
  const cur = !!data.amSkipped;
  data.amSkipped = !cur;
  if (!cur) {
    localStorage.setItem(`jjina_am_skip_${dateKey}`, '1');
  } else {
    localStorage.removeItem(`jjina_am_skip_${dateKey}`);
    /* 저녁도 아직 미완이면 잠금 복원 */
    data.pmDone = false;
    localStorage.removeItem(`jjina_pm_done_${dateKey}`);
    localStorage.removeItem(`jjina_pm_memo_${dateKey}`);
  }
  renderStrip(); renderContent();
}

/* ================================================
   저녁 섭취완료 / 취소 / 메모수정 (localStorage)
================================================ */
async function checkPmDone(dateKey) {
  const data = meals[dateKey]; if (!data || !data.pm) return;
  const memoEl = document.getElementById('pm-memo-input');
  const memo = memoEl && memoEl.value.trim() ? memoEl.value.trim() : '섭취완료';

  /* 저녁 항목 재고 차감 */
  const stockChanges = [];
  for (const raw of (data.pmEdited || data.pm || [])) {
    const { name, amount } = parseItem(raw);
    const useCount = calcUseCount(amount);
    if (useCount <= 0) continue;
    const stock = dbStocks.find(s => s.name === name); if (!stock) continue;
    const actualDeduct = Math.min(useCount, stock.amount);
    await sb.from('inventory').update({ amount: stock.amount - actualDeduct }).eq('id', stock.id);
    stock.amount -= actualDeduct;
    stockChanges.push({ id: stock.id, name: stock.name, amount: actualDeduct });
  }

  /* localStorage에 저장 */
  data.pmDone = true;
  data.pmMemo = memo;
  localStorage.setItem(`jjina_pm_done_${dateKey}`, '1');
  localStorage.setItem(`jjina_pm_memo_${dateKey}`, memo);

  await loadStocks(); renderStrip(); renderContent();
}

function cancelPmDone(dateKey) {
  if (!confirm('저녁 완료를 취소할까요?')) return;
  const data = meals[dateKey]; if (!data) return;
  data.pmDone = false; data.pmMemo = '';
  localStorage.removeItem(`jjina_pm_done_${dateKey}`);
  localStorage.removeItem(`jjina_pm_memo_${dateKey}`);
  renderStrip(); renderContent();
}

function showPmMemoEdit() {
  const w = document.getElementById('pm-memo-edit-wrap'); if (w) w.style.display = 'block';
}

function updatePmMemo(dateKey) {
  const memoEl = document.getElementById('pm-memo-input'); if (!memoEl) return;
  const memo = memoEl.value.trim() || '섭취완료';
  meals[dateKey].pmMemo = memo;
  localStorage.setItem(`jjina_pm_memo_${dateKey}`, memo);
  const editWrap = document.getElementById('pm-memo-edit-wrap');
  const displayTxt = document.getElementById('pm-memo-display-txt');
  if (editWrap) editWrap.style.display = 'none';
  if (displayTxt) displayTxt.textContent = memo;
}

/* ================================================
   하루 완료 여부 (스트립 done-day 판정)
================================================ */
function isDayDone(data) {
  if (!data.pm) return !!data.done;          /* 1끼: 아침 완료 */
  return !!data.pmDone;                       /* 2끼: 저녁까지 완료 */
}

/* ================================================
   인라인 재료 편집
================================================ */
function startEdit(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const srcKey = slot === 'am' ? 'am' : 'pm';
  const editedKey = slot === 'am' ? 'amEdited' : 'pmEdited';
  const modeKey = slot === 'am' ? 'amEditMode' : 'pmEditMode';
  if (!data[editedKey]) data[editedKey] = [...(data[srcKey] || [])];
  data[modeKey] = true;
  renderContent();
}
function saveEdit(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const editedKey = slot === 'am' ? 'amEdited' : 'pmEdited';
  const modeKey = slot === 'am' ? 'amEditMode' : 'pmEditMode';
  const current = data[editedKey] || [];
  /* 입력값 수집 */
  const updated = current.map((raw, idx) => {
    const { name } = parseItem(raw);
    const amtInput = document.getElementById(`ea-${dateKey}-${slot}-${idx}`);
    const newAmt = amtInput ? amtInput.value.trim() : '';
    return newAmt ? `${name} ${newAmt}` : raw;
  });
  data[editedKey] = updated;
  data[modeKey] = false;
  renderContent();
}
function cancelEdit(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const modeKey = slot === 'am' ? 'amEditMode' : 'pmEditMode';
  data[modeKey] = false;
  renderContent();
}
function deleteEditRow(dateKey, slot, idx) {
  const data = meals[dateKey]; if (!data) return;
  const srcKey = slot === 'am' ? 'am' : 'pm';
  const editedKey = slot === 'am' ? 'amEdited' : 'pmEdited';
  /* 삭제 전 현재 입력값 저장 */
  const current = data[editedKey] || [...(data[srcKey] || [])];
  const updated = current.map((raw, i) => {
    if (i === idx) return null;
    const { name } = parseItem(raw);
    const amtInput = document.getElementById(`ea-${dateKey}-${slot}-${i}`);
    return amtInput ? `${name} ${amtInput.value.trim() || parseItem(raw).amount}` : raw;
  }).filter(Boolean);
  data[editedKey] = updated;
  renderContent();
}
function addEditRow(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const srcKey = slot === 'am' ? 'am' : 'pm';
  const editedKey = slot === 'am' ? 'amEdited' : 'pmEdited';
  /* 추가 전 현재 입력값 저장 */
  const current = data[editedKey] || [...(data[srcKey] || [])];
  const updated = current.map((raw, i) => {
    const { name } = parseItem(raw);
    const amtInput = document.getElementById(`ea-${dateKey}-${slot}-${i}`);
    return amtInput ? `${name} ${amtInput.value.trim() || parseItem(raw).amount}` : raw;
  });
  const nameInput = document.getElementById(`ean-${dateKey}-${slot}`);
  const amtInput2 = document.getElementById(`eaa-${dateKey}-${slot}`);
  const newName = nameInput?.value.trim();
  const newAmt = amtInput2?.value.trim();
  if (newName) updated.push(newAmt ? `${newName} ${newAmt}` : newName);
  data[editedKey] = updated;
  renderContent();
}

/* ================================================
   localStorage 상태 복원
================================================ */
function loadLocalState() {
  Object.keys(meals).forEach(key => {
    if (localStorage.getItem(`jjina_am_skip_${key}`) === '1') {
      meals[key].amSkipped = true;
    }
    if (localStorage.getItem(`jjina_pm_done_${key}`) === '1') {
      meals[key].pmDone = true;
      meals[key].pmMemo = localStorage.getItem(`jjina_pm_memo_${key}`) || '섭취완료';
    }
  });
}

/* ================================================
   날짜 이동
================================================ */
function goToday() { sel = new Date(TODAY); curMonth = TODAY.getMonth(); renderStrip(); renderContent(); }
function changeMonth(dir) {
  curMonth = Math.max(4, Math.min(6, curMonth + dir));
  for (let i=1; i<=31; i++) { const d=new Date(2026,curMonth,i); if(d.getMonth()!==curMonth) break; if(meals[dk(d)]){ sel=d; break; } }
  renderStrip(); renderContent();
}
function pick(y, m, d) { sel = new Date(y, m, d); curMonth = m; renderStrip(); renderContent(); }

/* ================================================
   월간 달력 (제공된 플래너 디자인 — 6·7월)
================================================ */
const M_WD = ['일','월','화','수','목','금','토'];
function mealDayCount(y, m, d) { return Math.round((new Date(y,m-1,d) - START)/86400000) + 1; }
function isMondayYMD(y, m, d) { return new Date(y,m-1,d).getDay() === 1; }

function buildMonthCal(y, m) {
  const first = new Date(y, m-1, 1).getDay();
  const last  = new Date(y, m, 0).getDate();
  let h = `<div class="month-section">`;
  h += `<div class="month-top"><div class="month-title">${y}년 ${m}월</div>`;
  /* 체크리스트 */
  const items = CHECKLIST[m] || [], memos = REPEAT_MEMO[m] || [];
  h += `<div class="checklist-box"><div class="checklist-title">필요 재료</div><div class="checklist-grid">`;
  items.forEach((item, i) => {
    h += `<div class="checklist-item" id="cli-${m}-${i}"><input type="checkbox" id="chk-${m}-${i}" onchange="toggleCheck(${m},${i})"><label for="chk-${m}-${i}">${esc(item)}</label></div>`;
  });
  h += `</div>`;
  if (memos.length) {
    h += `<div class="repeat-memo"><div class="repeat-memo-title">반복노출 재료 제조법</div><div class="repeat-memo-grid">`;
    memos.forEach(({name, memo}) => { h += `<div class="repeat-memo-item"><strong>${esc(name)}</strong> — ${esc(memo)}</div>`; });
    h += `</div></div>`;
  }
  h += `</div></div>`; /* /checklist-box /month-top */

  h += `<div class="weekdays">${M_WD.map(w=>`<div class="wd">${w}</div>`).join('')}</div><div class="days-grid">`;
  for (let i=0; i<first; i++) h += `<div class="dc empty"></div>`;
  for (let d=1; d<=last; d++) {
    const ev = meals[`${m}/${d}`] || {};
    const dObj = new Date(y, m-1, d);
    let cls = 'dc';
    if (isToday(dObj)) cls += ' today';
    if (ev.done) cls += ' done';
    h += `<div class="${cls}"><div class="day-row"><span class="dn">${d}${ev.done ? ' ✓' : ''}</span>`;
    if (isMondayYMD(y,m,d)) h += `<span class="meal-day-count">이유식 ${mealDayCount(y,m,d)}일째</span>`;
    h += `</div>`;
    if (ev.badge || ev.newBadge) {
      h += `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px;">`;
      if (ev.badge)    h += `<span class="badge b-${ev.badge.t}">${esc(ev.badge.x)}</span>`;
      if (ev.newBadge) h += `<span class="badge b-${ev.newBadge.t}">${esc(ev.newBadge.x)}</span>`;
      h += `</div>`;
    }
    if (ev.am) {
      h += `<div class="meal-block"><div class="meal-header"><span class="time-badge">오전</span></div><div class="meal-items">`;
      ev.am.forEach(it => { const r=it.startsWith('반복:'); h += `<div class="meal-item${r?' repeat':''}">${esc(r?it.slice(3):it)}</div>`; });
      h += `</div></div>`;
    }
    if (ev.pm) {
      h += `<hr class="meal-sep"><div class="meal-block"><div class="meal-header"><span class="time-badge">오후</span></div><div class="meal-items">`;
      ev.pm.forEach(it => { const r=it.startsWith('반복:'); h += `<div class="meal-item${r?' repeat':''}">${esc(r?it.slice(3):it)}</div>`; });
      h += `</div></div>`;
    } else if (ev.am) {
      h += `<hr class="meal-sep"><div class="meal-block"><div class="meal-header"><span class="time-badge">오후</span></div><div class="meal-item" style="color:#CACACA">-</div></div>`;
    }
    h += `</div>`;
  }
  const rem = (first + last) % 7;
  if (rem) for (let i=0; i<7-rem; i++) h += `<div class="dc empty"></div>`;
  h += `</div></div>`;
  return h;
}
function toggleCheck(m, i) {
  const row = document.getElementById(`cli-${m}-${i}`);
  const chk = document.getElementById(`chk-${m}-${i}`);
  if (chk.checked) row.classList.add('checked'); else row.classList.remove('checked');
}
function buildCal() {
  let h = `<div class="mcal">`;
  h += buildMonthCal(2026, 6);
  h += buildMonthCal(2026, 7);
  h += `<div class="print-btn-wrap"><button class="print-btn" onclick="window.print()">📥 인쇄 / PDF 저장</button></div>`;
  h += `</div>`;
  return h;
}

/* ================================================
   NEW 식재료 2일 전 자동화
   — 오늘~D+2 내 NEW 식재료를 장볼재료·재고(0)에 자동 추가
================================================ */
async function autoAddUpcoming() {
  let stockAdded = false, shopAdded = false;
  for (let offset = 0; offset <= 2; offset++) {
    const d = new Date(TODAY);
    d.setDate(TODAY.getDate() + offset);
    const data = meals[dk(d)];
    if (!data) continue;
    const newBadges = [data.badge, data.newBadge].filter(b => b && b.t === 'new');
    for (const badge of newBadges) {
      const name = badge.x.replace(/^New\s*/, '').trim();
      if (!name) continue;
      /* 장볼 재료: 없으면 추가 */
      const inShop = shops.some(s => s.name === name);
      if (!inShop) {
        const { error } = await sb.from('shop_list').insert([{ name }]);
        if (!error) shopAdded = true;
      }
      /* 재고: 없으면 수량 0으로 추가 */
      const inStock = dbStocks.some(s => s.name === name);
      if (!inStock) {
        const sort_order = dbStocks.length;
        const { error } = await sb.from('inventory').insert([{ name, amount: 0, unit: '개', low_alert: 1, sort_order }]);
        if (!error) stockAdded = true;
      }
    }
  }
  if (stockAdded) await loadStocks();
  if (shopAdded) await loadShops();
}

/* ================================================
   탭 전환
================================================ */
function switchTab(tab) {
  document.getElementById('main-view').style.display = tab === 'main' ? 'block' : 'none';
  document.getElementById('cal-view').style.display = tab === 'cal' ? 'block' : 'none';
  document.getElementById('tab-main').classList.toggle('active', tab === 'main');
  document.getElementById('tab-cal').classList.toggle('active', tab === 'cal');
  if (tab === 'cal') document.getElementById('cal-content').innerHTML = buildCal();
}

/* ================================================
   초기화
================================================ */
async function init() {
  await loadMealLog();
  loadLocalState();
  await loadStocks();
  await loadShops();
  await autoAddUpcoming();  /* NEW 식재료 2일 전 자동 추가 */
  renderStrip();
  renderContent();
}
init();
</script>
