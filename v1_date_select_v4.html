/* ===== 컬러 변수 ===== */
:root {
  --pink: #ff6eb4;
  --sky: #29aaee;
  --yellow: #f5c800;
  --green: #2eaa55;
  --gray: #888;
  --purple: #9933cc;
  --bg: #f5f5f5;
  --text: #1a1a1a;
  --text-sub: #888;
  --border: #e0e0e0;
}

/* ===== 기본 리셋 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
button { font-family: 'Pretendard', sans-serif; cursor: pointer; }
textarea { font-family: 'Pretendard', sans-serif; }
input { font-family: 'Pretendard', sans-serif; }

/* ===== 헤더 ===== */
.header { background: #f0f0f0; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
.header-top { padding: 14px 16px 4px; }
.title { font-size: 24px; font-weight: 700; color: #111; }
.sub { font-size: 12px; color: #5f5f5f; margin-top: 6px; }

/* 월 네비게이션 + Today 버튼 */
.month-nav { display: flex; align-items: center; gap: 20px; padding: 8px 16px; }
.month-nav .nav-arrow { background: transparent; border: none; padding: 4px 5px; font-size: 16px; color: #111; }
.month-nav span { font-size: 16px; font-weight: 700; color: #111; }
.month-nav-right { margin-left: auto; }
.today-btn { background: var(--pink); border: none; padding: 6px 14px; font-size: 12px; font-weight: 500; color: #fff; border-radius: 20px; }

/* ===== 날짜 스트립 ===== */
.strip-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 6px 16px 12px; scrollbar-width: none; }
.strip-wrap::-webkit-scrollbar { display: none; }
.strip { display: flex; gap: 6px; width: max-content; }
.day-item { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; transition: background 0.15s; }
.day-item .dn { font-size: 15px; font-weight: 500; color: #888; line-height: 1; }

.day-item.done-day .dn { color: #ccc; }
.day-item.today { border: 1.5px solid var(--pink); }
.day-item.today .dn { color: var(--pink); font-weight: 700; }
.day-item.selected { background: #111; }
.day-item.selected .dn { color: #fff; }
.day-item.selected.done-day .dn { color: #fff; }
.day-item.selected.today,
.day-item.selected.today.done-day { background: var(--pink); border: 1.5px solid var(--pink); }
.day-item.selected.today .dn,
.day-item.selected.today.done-day .dn { color: #fff; font-weight: 700; }

/* ===== 뷰 전환 ===== */
#main-view { display: block; padding-bottom: 56px; min-height: 100vh; }
#cal-view { display: none; padding-bottom: 56px; min-height: 100vh; }

/* ===== 날짜 헤더 ===== */
.day-hd { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px; background: #fff; border-bottom: 1px solid var(--border); }
.day-title { font-size: 24px; font-weight: 800; line-height: 1.2; color: #111; }
.today-lbl { display: block; font-size: 12px; color: var(--pink); font-weight: 500; margin-bottom: 2px; }
.dday-txt { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
.status { font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 20px; margin-top: 4px; white-space: nowrap; }
.status.done { background: #e8f5e9; color: var(--green); }
.status.pending { background: var(--pink); color: #fff; }
.status.future { background: #f0f0f0; color: var(--gray); }

/* ===== 배지 ===== */
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 20px; }
.b-new { background: var(--pink); color: #fff; }
.b-direct { background: var(--sky); color: #fff; }
.b-store { background: var(--yellow); color: #fff; }
.b-mix { background: var(--green); color: #fff; }
.b-warn { background: #111; color: #fff; }
.b-repeat { background: var(--gray); color: #fff; }
.b-kit { background: var(--purple); color: #fff; }

.meal-items { display: flex; flex-direction: column; gap: 9px; }
.meal-item { display: flex; justify-content: space-between; align-items: center; }
.meal-name { font-size: 14px; font-weight: 600; color: #111; }
.meal-amt { font-size: 14px; color: var(--text-sub); }
.meal-note { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 11px; color: #aaa; }
.empty-card { background: #fff; text-align: center; color: #bbb; padding: 28px 0; font-size: 13px; border-bottom: 1px solid var(--border); }

.memo-input-lbl { font-size: 12px; font-weight: 700; color: #585858; margin-bottom: 6px; }

.check-btn-wrap { padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--border); }
.check-btn { width: 100%; padding: 12px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; }

.memo-card { background: #fffbf0; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.memo-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.memo-lbl { font-size: 12px; font-weight: 700; color: #585858; }
.memo-edit-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--gray); }
.memo-txt { font-size: 13px; color: #2f2f2e; line-height: 1.6; }
.memo-edit-wrap { background: #fff; padding: 13px 16px; border-bottom: 1px solid var(--border); display: none; }
.memo-save-btn { margin-top: 8px; width: 100%; padding: 10px; background: var(--gray); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; }

.mid-banner-sub { font-size: 11px; color: rgba(255,255,255,0.85); line-height: 1.5; }

.acc-title { font-size: 13px; font-weight: 700; color: #111; }
.acc-arrow { font-size: 12px; color: #111; font-weight: 700; transition: transform 0.2s; }
.acc.open .acc-arrow { transform: rotate(180deg); }
.acc-body { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
.acc.open .acc-body { display: block; }

.stock-row:last-of-type { border-bottom: none; }
.stock-name { flex: 1; }
.stock-val { font-weight: 700; color: var(--text); }
.stock-low { color: #fd0c0c !important; }

.add-form input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12px; margin-bottom: 6px; color: #111; outline: none; }

.add-form-row { display: flex; gap: 6px; margin-bottom: 6px; }
.add-form-row input { margin-bottom: 0; flex: 1; }
.add-confirm-btn { width: 100%; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; }

.shop-row:last-of-type { border-bottom: none; }

.btab { flex: 1; background: none; border: none; color: #aaa; font-size: 12px; font-weight: 700; padding: 12px 4px 14px; transition: color 0.2s; }

.pc-table { min-width: 640px; border-collapse: collapse; table-layout: fixed; width: 100%; }

.pc-badge { font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 10px; }

.print-btn { width: 100%; background: #111; color: #fff; border: none; padding: 14px; font-size: 13px; font-weight: 700; border-radius: 8px; }

/* ===== 인쇄 ===== */
@media print {
  body { max-width: none; background: #fff; }
  .bottom-tabs, .print-btn-wrap { display: none; }
  .header { position: static; }
}
</style>

/* ================================================
   유틸 함수
================================================ */
const DOW = ["월","화","수","목","금","토","일"];
let curMonth = TODAY.getMonth();
let sel = new Date(TODAY);

function dk(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function dds(d) { return `D+${Math.floor((d - START) / 86400000) + 1}`; }
function dows(d) { const x = d.getDay(); return DOW[x === 0 ? 6 : x - 1]; }
function isToday(d) { return d.toDateString() === TODAY.toDateString(); }
function isPast(d) { return d < TODAY && !isToday(d); }
function isMidPhase(d) { return d >= MID_START; }

function weekStart(d) {
  const x = d.getDay();
  const m = new Date(d);
  m.setDate(d.getDate() - (x === 0 ? 6 : x - 1));
  return m;
}

function weekDays(s) {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(s);
    d.setDate(s.getDate() + i);
    return d;
  });
}

function weekNumber(d) {
  const f = new Date(2026, d.getMonth(), 1);
  return Math.ceil((d.getDate() + ((f.getDay() || 7) - 1)) / 7);
}

function badgeClass(b) {
  const map = { "NEW":"b-new", "직접":"b-direct", "시판":"b-store", "시판+직접":"b-mix", "주의":"b-warn", "반복":"b-repeat", "키트":"b-kit" };
  return map[b] || "b-direct";
}

function esc(v) {
  return String(v ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function ageStr(d) {
  const by = BIRTH.getFullYear(), bm = BIRTH.getMonth(), bd = BIRTH.getDate();
  const dy = d.getFullYear(), dm = d.getMonth(), dd = d.getDate();
  let totalM = (dy - by) * 12 + (dm - bm);
  if (dd < bd) totalM--;
  const lastB = new Date(BIRTH);
  lastB.setMonth(lastB.getMonth() + totalM);
  return `생후 ${totalM}개월 ${Math.floor((d - lastB) / 86400000) + 1}일`;
}

/* ================================================
   날짜 스트립 렌더링
================================================ */
function renderStrip() {
  document.getElementById('month-lbl').textContent = `${curMonth + 1}월`;
  document.getElementById('sub').textContent = ageStr(TODAY);

  let html = "";
  for (let day = 1; day <= 31; day++) {
    const d = new Date(2026, curMonth, day);
    if (d.getMonth() !== curMonth) break;
    const data = meals[dk(d)];
    let cls = "day-item";
    if (isToday(d)) cls += " today";
    if (d.toDateString() === sel.toDateString()) cls += " selected";
    if (data && data.done) cls += " done-day";
    html += `<div class="${cls}" onclick="pick(${d.getFullYear()},${d.getMonth()},${d.getDate()})">
      <div class="dn">${day}</div>
    </div>`;
  }
  document.getElementById('strip').innerHTML = html;

  setTimeout(() => {
    const wrap = document.getElementById('strip-wrap');
    const items = document.getElementById('strip').querySelectorAll('.day-item');
    const idx = sel.getDate() - 1;
    if (items[idx]) {
      const il = items[idx].getBoundingClientRect().left;
      const wl = wrap.getBoundingClientRect().left;
      wrap.scrollTo({ left: wrap.scrollLeft + il - wl - wrap.clientWidth / 2 + items[idx].clientWidth / 2, behavior: 'smooth' });
    }
  }, 50);
}

          <div class="memo-txt" id="memo-display-txt">${esc(data.memo || '섭취완료')}</div>
        </div>
        <div class="memo-edit-wrap" id="memo-edit-wrap">
          <div class="memo-input-lbl">📝 메모 수정</div>
          <textarea id="memo-input" class="memo-input" rows="2">${esc(data.memo || '')}</textarea>
          <button class="memo-save-btn" onclick="updateMemo('${dk(sel)}')">저장</button>
        </div>`;
    }
  }

  // 이번 주차 새 식재료
  const newItems = [];
  weekDays(weekStart(sel)).forEach(d => {
    const m = meals[dk(d)];
    if (m && (m.badges || []).includes("NEW")) {
      m.items.forEach(it => { if (!newItems.includes(it.n)) newItems.push(it.n); });
    }
  });
  if (newItems.length > 0) {
    html += `
      <div class="new-card">
        <div class="new-lbl">✨ ${sel.getMonth()+1}월 ${weekNumber(sel)}주차 새 식재료</div>
        <div class="new-chips">${newItems.map(i => `<span class="new-chip">${esc(i)}</span>`).join('')}</div>
      </div>`;
  }

  html += accHtml("a-s", "📦 재고 현황", stockHtml());
  html += accHtml("a-h", "🛒 장볼 재료", shopHtml());
  html += accHtml("a-n", "⚠️ 알러지 유의사항", noticeHtml());
  html += `<div style="height:80px;"></div>`;
  document.getElementById('content').innerHTML = html;
}

/* ================================================
   아코디언
================================================ */
function accHtml(id, title, body) {

      <div class="acc-header" onclick="toggleAcc('${id}')">
        <span class="acc-title">${title}</span>

function toggleAcc(id) {

/* ================================================
   재고 현황 HTML
================================================ */
function stockHtml() {
  if (dbStocks.length === 0) {
    return '<div style="padding:8px 0;color:#aaa;font-size:12px;">재고 정보를 불러오는 중...</div>';
  }

  let html = '';

  if (!stockEditMode) {
    html += dbStocks.map(s => {
      const isLow = s.amount <= s.low_alert;
      return `
        <div class="stock-row">
          <span class="stock-name">${esc(s.name)}</span>
          <span class="stock-val${isLow ? ' stock-low' : ''}">${s.amount}${esc(s.unit)} ${isLow ? '❗️' : ''}</span>
        </div>`;
    }).join('');
    html += `<button class="stock-edit-btn" onclick="startStockEdit()">✏️ 재고 수정하기</button>`;
  } else {
    html += dbStocks.map((s, idx) => `
  <div class="stock-edit-row">
    <span class="stock-name">${esc(s.name)}</span>
    <div style="display:flex;align-items:center;gap:5px;">
      <button onclick="moveStock(${idx}, -1)" style="background:#f5f5f5;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:#555;cursor:pointer;" ${idx === 0 ? 'disabled style="opacity:0.3;"' : ''}>◀</button>
      <button onclick="moveStock(${idx}, 1)" style="background:#f5f5f5;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:#555;cursor:pointer;" ${idx === dbStocks.length-1 ? 'disabled style="opacity:0.3;"' : ''}>▶</button>
      <input type="number" class="stock-input" id="si-${s.id}" value="${s.amount}" min="0" />
      <span class="stock-unit">${esc(s.unit)}</span>
      <button onclick="deleteStock(${s.id})" style="background:none;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:11px;color:#aaa;cursor:pointer;">삭제</button>
    </div>
  </div>`).join('');
    html += `<button class="stock-save-all-btn" onclick="saveAllStocks()">💾 전체 저장</button>`;
    html += `<button class="stock-cancel-btn" onclick="cancelStockEdit()">취소</button>`;
  }

  html += `<div class="add-divider">`;
  html += `<button class="add-stock-btn" onclick="toggleAddForm()">+ 새 재료 추가</button>`;
  if (showAddForm) {
    html += `
      <div class="add-form">
        <input type="text" id="ns-name" placeholder="재료 이름 (예: 당근)" />
        <div class="add-form-row">
          <input type="number" id="ns-amt" placeholder="수량" min="0" />
          <input type="text" id="ns-unit" placeholder="단위 (개/g/봉)" />
        </div>
        <input type="number" id="ns-alert" placeholder="알림 기준 수량 (예: 2)" min="0" />
        <button class="add-confirm-btn" onclick="addStock()">추가하기</button>
      </div>`;
  }
  html += `</div>`;
  return html;
}

function startStockEdit() { stockEditMode = true; refreshStockBody(); }
function cancelStockEdit() { stockEditMode = false; refreshStockBody(); }
function refreshStockBody() {
  const body = document.querySelector('#a-s .acc-body');
  if (body) body.innerHTML = stockHtml();
}
function toggleAddForm() { showAddForm = !showAddForm; refreshStockBody(); }

/* ================================================
   장볼 재료 HTML
================================================ */
function shopHtml() {
  const autoShopNames = dbStocks.filter(s => s.amount <= s.low_alert).map(s => s.name);
  const manualShops = shops.filter(s => !autoShopNames.includes(s.name));

  let html = '';
  html += autoShopNames.map(s => `
    <div class="shop-row">
      <div class="shop-dot"></div>
      <span style="flex:1;">${esc(s)}</span>
      <span style="font-size:10px;color:var(--text-sub);">재고부족</span>
    </div>`).join('');

  html += manualShops.map(s => `
    <div class="shop-row">
      <div class="shop-dot"></div>
      <span style="flex:1;">${esc(s.name)}</span>
      <button onclick="removeShopItem(${s.id})" style="background:none;border:none;font-size:14px;color:#ccc;padding:0 2px;line-height:1;">✕</button>
    </div>`).join('');

  if (autoShopNames.length === 0 && manualShops.length === 0) {
    html += `<div style="padding:8px 0;font-size:12px;color:#aaa;">장볼 재료가 없어요 👍</div>`;
  }

  html += `<div class="add-divider">`;
  html += `<button class="add-stock-btn" onclick="toggleShopAddForm()">+ 장볼 재료 추가</button>`;
  if (showShopAddForm) {
    html += `
      <div class="add-form" style="margin-top:8px;">
        <input type="text" id="new-shop-item" placeholder="예) 한우 우둔살 350g" />
        <button class="add-confirm-btn" onclick="addShopItem()">추가하기</button>
      </div>`;
  }
  html += `</div>`;
  return html;
}

function toggleShopAddForm() { showShopAddForm = !showShopAddForm; refreshShopBody(); }
function refreshShopBody() {
  const body = document.querySelector('#a-h .acc-body');
  if (body) body.innerHTML = shopHtml();
}

/* ================================================
   알러지 유의사항 HTML
================================================ */
function noticeHtml() {
  return `<ul class="notice-list">${notices.map(n => `<li>${esc(n)}</li>`).join('')}</ul>`;
}

/* ================================================
   메모 수정 UI
================================================ */
function showMemoEdit() {
  const wrap = document.getElementById('memo-edit-wrap');
  if (wrap) wrap.style.display = 'block';
}

/* ================================================
   재고 순서 이동
================================================ */
function moveStock(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= dbStocks.length) return;
  dbStocks.forEach(s => {
    const input = document.getElementById(`si-${s.id}`);
    if (input) s._tempAmount = parseInt(input.value);
  });
  [dbStocks[idx], dbStocks[newIdx]] = [dbStocks[newIdx], dbStocks[idx]];
  refreshStockBody();
}

/* ================================================
   Supabase — 재고 전체 저장
================================================ */
async function saveAllStocks() {
  for (let i = 0; i < dbStocks.length; i++) {
    const s = dbStocks[i];
    const input = document.getElementById(`si-${s.id}`);
    const newAmt = input ? parseInt(input.value) : (s._tempAmount ?? s.amount);
    if (isNaN(newAmt) || newAmt < 0) continue;
    const { error } = await sb.from('inventory').update({ amount: newAmt, sort_order: i }).eq('id', s.id);
    if (error) { alert(`${s.name} 저장 실패: ${error.message}`); return; }
  }
  stockEditMode = false;
  await loadStocks();
  const acc = document.getElementById('a-s');
  if (acc) acc.classList.add('open');
}

async function deleteStock(id) {
  const stock = dbStocks.find(s => s.id === id);
  if (!stock) return;
  if (!confirm(`'${stock.name}'을(를) 삭제할까요?`)) return;
  const { error } = await sb.from('inventory').delete().eq('id', id);
  if (error) { alert('삭제 실패: ' + error.message); return; }
  stockEditMode = true;
  await loadStocks();
  const acc = document.getElementById('a-s');
  if (acc) acc.classList.add('open');
}

async function addStock() {
  const name = document.getElementById('ns-name')?.value?.trim();
  const amount = parseInt(document.getElementById('ns-amt')?.value || 0);
  const unit = document.getElementById('ns-unit')?.value?.trim() || '개';
  const low_alert = parseInt(document.getElementById('ns-alert')?.value || 2);
  if (!name) { alert('재료 이름을 입력해주세요.'); return; }
  const sort_order = dbStocks.length;
  const { error } = await sb.from('inventory').insert([{ name, amount, unit, low_alert, sort_order }]);
  if (error) { alert('추가 실패: ' + error.message); return; }
  showAddForm = false;
  await loadStocks();
  const acc = document.getElementById('a-s');
  if (acc) acc.classList.add('open');
}

async function loadStocks() {
  try {
    const { data, error } = await sb.from('inventory').select('*').order('sort_order').order('id');
    if (error) { console.error('재고 로딩 오류:', error); return; }
    if (data) dbStocks = data;
    refreshStockBody();
  } catch (e) { console.error('Supabase 오류:', e); }
}

async function addShopItem() {
  const input = document.getElementById('new-shop-item');
  const val = input?.value?.trim();
  if (!val) { alert('재료 이름을 입력해주세요.'); return; }
  const { error } = await sb.from('shop_list').insert([{ name: val }]);
  if (error) { alert('추가 실패: ' + error.message); return; }
  showShopAddForm = false;
  await loadShops();
  const acc = document.getElementById('a-h');
  if (acc) acc.classList.add('open');
}

async function removeShopItem(id) {
  const { error } = await sb.from('shop_list').delete().eq('id', id);
  if (error) { alert('삭제 실패: ' + error.message); return; }
  await loadShops();
  const acc = document.getElementById('a-h');
  if (acc) acc.classList.add('open');
}

async function loadShops() {
  try {
    const { data, error } = await sb.from('shop_list').select('*').order('id');
    if (error) { console.error('shop_list 오류:', error); return; }
    shops = data || [];
    refreshShopBody();
  } catch (e) { console.error('shop_list 연결 오류:', e); }
}

async function loadMealLog() {
  try {
    const { data, error } = await sb.from('meal_log').select('*');
    if (error) { console.error('meal_log 오류:', error); return; }
    if (data && data.length > 0) {
      data.forEach(log => {
        if (meals[log.date]) {
          meals[log.date].done = log.done;
          meals[log.date].memo = log.memo || '섭취완료';
        }
      });
    }
  } catch (e) { console.error('meal_log 연결 오류:', e); }
}

/* ================================================
   섭취완료 체크
================================================ */
async function checkDone(dateKey) {
  const data = meals[dateKey];
  if (!data) return;
  if (!confirm('섭취 완료로 기록할까요? 재고가 자동으로 차감됩니다.')) return;

  const memoEl = document.getElementById('memo-input');
  const memo = memoEl && memoEl.value.trim() ? memoEl.value.trim() : '섭취완료';

  const stockMap = {
    '한우':       '한우큐브',
    '쌀미음':     '쌀미음큐브',
    '브로콜리미음': '브로콜리미음큐브',
    '감자미음':   '감자미음큐브',
    '고구마미음': '고구마미음큐브',
  };

  const stockChanges = [];
  for (const item of data.items) {
    const stockName = stockMap[item.n];
    if (!stockName) continue;
    let useCount = 0;
    const aStr = String(item.a || '');
    if (aStr.includes('개')) {
      useCount = parseInt(aStr) || 0;
    } else {
      const g = parseInt(aStr);
      useCount = isNaN(g) ? 0 : Math.round(g / 15);
    }
    if (useCount <= 0) continue;
    const stock = dbStocks.find(s => s.name === stockName);
    if (!stock) continue;
    const actualDeduct = Math.min(useCount, stock.amount);
    await sb.from('inventory').update({ amount: stock.amount - actualDeduct }).eq('id', stock.id);
    stockChanges.push({ id: stock.id, name: stock.name, amount: actualDeduct });
  }

  const { error: logErr } = await sb.from('meal_log').upsert(
    { date: dateKey, done: true, memo, stock_changes: stockChanges },
    { onConflict: 'date' }
  );
  if (logErr) console.error('meal_log 저장 오류:', logErr);

  meals[dateKey].done = true;
  meals[dateKey].memo = memo;
  await loadStocks();
  renderStrip();
  renderContent();
}

/* ================================================
   섭취완료 취소
================================================ */
async function cancelDone(dateKey) {
  if (!confirm('섭취 완료를 취소할까요? 차감된 재고가 복구됩니다.')) return;

  const { data: logData, error: fetchErr } = await sb.from('meal_log')
    .select('stock_changes')
    .eq('date', dateKey)
    .single();
  if (fetchErr) { alert('취소 실패: ' + fetchErr.message); return; }

  const changes = logData?.stock_changes || [];
  for (const change of changes) {
    const stock = dbStocks.find(s => s.id === change.id);
    if (stock) {
      await sb.from('inventory').update({ amount: stock.amount + change.amount }).eq('id', change.id);
    }
  }

  const { error: updateErr } = await sb.from('meal_log')
    .update({ done: false, stock_changes: [] })
    .eq('date', dateKey);
  if (updateErr) { alert('취소 실패: ' + updateErr.message); return; }

  meals[dateKey].done = false;
  meals[dateKey].memo = '';
  await loadStocks();
  renderStrip();
  renderContent();
}

async function updateMemo(dateKey) {
  const memoEl = document.getElementById('memo-input');
  if (!memoEl) return;
  const memo = memoEl.value.trim() || '섭취완료';
  const { error } = await sb.from('meal_log').upsert({ date: dateKey, done: true, memo }, { onConflict: 'date' });
  if (error) { alert('저장 실패: ' + error.message); return; }
  meals[dateKey].memo = memo;
  const editWrap = document.getElementById('memo-edit-wrap');
  const displayTxt = document.getElementById('memo-display-txt');
  if (editWrap) editWrap.style.display = 'none';
  if (displayTxt) displayTxt.textContent = memo;
}

/* ================================================
   날짜 이동
================================================ */
function goToday() {
  sel = new Date(TODAY);
  curMonth = TODAY.getMonth();
  renderStrip();
  renderContent();
}

// 월 범위: 5월(4) ~ 7월(6)
function changeMonth(dir) {
  curMonth = Math.max(4, Math.min(6, curMonth + dir));
  for (let i = 1; i <= 31; i++) {
    const d = new Date(2026, curMonth, i);
    if (d.getMonth() !== curMonth) break;
    if (meals[dk(d)]) { sel = d; break; }
  }
  renderStrip();
  renderContent();
}

function pick(y, m, d) {
  sel = new Date(y, m, d);
  curMonth = m;
  renderStrip();
  renderContent();
}

/* ================================================
   월간 달력 HTML — 5월·6월·7월
================================================ */
function buildPC() {
  const months = [
    { m: 4, label: "5월", days: 31, d0: 3 },  // 5/1 = 금(4) → 월 기준 3칸
    { m: 5, label: "6월", days: 30, d0: 6 },  // 6/1 = 월(1) → 0칸 → 실제 6월1일은 일요일
    { m: 6, label: "7월", days: 31, d0: 2 },  // 7/1 = 수(3) → 월 기준 2칸
  ];
  let html = "";
  months.forEach(({ m, label, days, d0 }) => {
    html += `<div class="pc-month-lbl">${label}</div>`;
    html += `<div class="cal-overflow"><table class="pc-table"><thead><tr>`;
    ["월","화","수","목","금","토","일"].forEach(x => html += `<th>${x}</th>`);
    html += `</tr></thead><tbody><tr>`;
    let col = 0;
    for (let i = 0; i < d0; i++) { html += `<td class="emp"></td>`; col++; }
    for (let day = 1; day <= days; day++) {
      if (col === 7) { html += `</tr><tr>`; col = 0; }
      const d = new Date(2026, m, day);
      const data = meals[dk(d)];
      const isMid = data && data.midStart;
      html += `<td class="${isToday(d) ? 'pc-today-cell' : ''}">`;
      html += `<div class="pc-cell${data && data.done ? ' pc-done' : ''}${isMid ? ' pc-mid-marker' : ''}">`;
      html += `<div class="pc-date">${day}${data && data.done ? ' ✓' : ''}${isMid ? ' ⭐' : ''}</div>`;
      if (data) {
        html += `<div class="pc-items">${data.items.map(it => `${esc(it.n)}${it.a ? ' '+esc(it.a) : ''}`).join('<br>')}</div>`;
        html += `<div class="pc-badges">${(data.badges||[]).map(b => `<span class="pc-badge ${badgeClass(b)}">${esc(b)}</span>`).join('')}</div>`;
      }
      html += `</div></td>`;
      col++;
    }
    while (col < 7) { html += `<td class="emp"></td>`; col++; }
    html += `</tr></tbody></table></div>`;
  });
  return html;
}

function downloadCal() {
  const cc = document.getElementById('cal-content').innerHTML;
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8"><title>찐아 이유식 식단표</title>
    <style>
      body{font-family:sans-serif;padding:20px;max-width:900px;margin:0 auto;}
      table{min-width:640px;border-collapse:collapse;table-layout:fixed;width:100%;}
      th{background:#333;color:#fff;font-size:10px;padding:5px;text-align:center;}
      td{border:1px solid #ddd;vertical-align:top;}
      .np{margin-bottom:16px;}
      @media print{.np{display:none;}}
    </style>
    </head><body>
    <div class="np">
      <button onclick="window.print()" style="padding:10px 20px;background:#111;color:#fff;border:none;cursor:pointer;font-size:14px;">🖨️ 인쇄 / PDF 저장</button>
    </div>
    ${cc}
    </body></html>`);
  w.document.close();
  w.onload = () => setTimeout(() => w.print(), 300);
}

/* ================================================
   탭 전환
================================================ */
function switchTab(tab) {
  document.getElementById('main-view').style.display = tab === 'main' ? 'block' : 'none';
  document.getElementById('cal-view').style.display = tab === 'cal' ? 'block' : 'none';
  document.getElementById('tab-main').classList.toggle('active', tab === 'main');
  document.getElementById('tab-cal').classList.toggle('active', tab === 'cal');
  if (tab === 'cal') {
    document.getElementById('cal-content').innerHTML =
      buildPC() + `<div class="print-btn-wrap"><button class="print-btn" onclick="downloadCal()">📥 인쇄 / PDF 저장</button></div>`;
  }
}

async function init() {
  await loadMealLog();
  await loadStocks();
  await loadShops();

}

init();
