:root{
  --pink:#ff6eb4;
  --sky:#29aaee;
  --yellow:#f5c800;
  --green:#2eaa55;
  --gray:#888;
  --purple:#9933cc;
  --bg:#f5f5f5;
  --text:#1a1a1a;
  --text-sub:#888;
  --border:#e0e0e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Pretendard',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  max-width:480px;
  margin:0 auto;
}
button{font-family:'Pretendard',sans-serif;}

.header{
  background:#f0f0f0;
  position:sticky;
  top:0;
  z-index:50;
  border-bottom:1px solid var(--border);
}
.header-top{
  padding:14px 16px 4px;
}
.title{font-size:24px;font-weight:700;color:#111;}
.sub{font-size:12px;color:#5f5f5f;margin-top:6px;}
.today-btn{
  background:var(--pink);
  border:none;
  padding:6px 14px;
  font-size:12px;
  font-weight:500;
  color:#fff;
  cursor:pointer;
  border-radius:20px;
}
/* Today 버튼을 month-nav 오른쪽 끝에 배치 */
.month-nav{
  display:flex;
  align-items:center;
  gap:20px;
  padding:8px 16px 8px;
  justify-content:flex-start;
}
.month-nav-right{margin-left:auto;}
.month-nav button.nav-arrow{
  background:rgba(0,0,0,0);
  border:none;
  padding:4px 5px;
  font-size:16px;
  cursor:pointer;
  color:#111;
  border-radius:4px;
}
.month-nav span{font-size:16px;font-weight:700;color:#111;}

.strip-wrap{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:6px 16px 12px;
  scrollbar-width:none;
}
.strip-wrap::-webkit-scrollbar{display:none;}
.strip{display:flex;gap:6px;width:max-content;}
.day-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  cursor:pointer;
  border-radius:50%;
  flex-shrink:0;
  transition:background 0.15s;
}
.day-item .dn{font-size:15px;font-weight:500;color:#888;line-height:1;}
.day-item.today{border:1px solid var(--pink);}
.day-item.today .dn{color:var(--pink);font-weight:500;}
.day-item.selected{background:hsl(0, 0%, 0%);border:1px solid var(--border);}
.day-item.selected .dn{color:#fff7f7;}
.day-item.selected.today{background:#fff;border:1px solid var(--pink);}
.day-item.selected.today .dn{color:var(--pink);}
.day-item.done-day .dn{color:#ccc;}
.day-item.selected.done-day .dn{color:#fff;font-weight:500;}

#main-view{display:block;padding-bottom:56px;min-height:100vh;}
#cal-view{display:none;padding-bottom:56px;min-height:100vh;}
.day-hd{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:16px 16px 16px;
  background:#fff;
  border-bottom:1px solid var(--border);
}
.day-title{font-size:24px;font-weight:800;line-height:1.2;color:#111;}
.today-lbl{display:block;font-size:12px;color:var(--pink);font-weight:500;margin-bottom:2px;}
.dday-txt{font-size:12px;color:var(--text-sub);margin-top:3px;}
.status{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;margin-top:4px;white-space:nowrap;}
.status.done{background:#e8f5e9;color:var(--green);}
.status.pending{background:var(--pink);color:#fff;}
.status.future{background:#f0f0f0;color:var(--gray);}

.badge{display:inline-block;font-size:10px;font-weight:600;padding:4px 9px;border-radius:20px;}
.b-new{background:var(--pink);color:#fff;}
.b-direct{background:var(--sky);color:#fff;}
.b-store{background:var(--yellow);color:#fff;}
.b-mix{background:var(--green);color:#fff;}
.b-warn{background:#111;color:#fff;}
.b-repeat{background:var(--gray);color:#fff;}
.b-kit{background:var(--purple);color:#fff;}

.meal-card{background:#fff;padding:15px 16px;border-bottom:1px solid var(--border);}
.meal-card.dimmed{opacity:0.45;}
.meal-lbl{font-size:13px;font-weight:800;color:#111;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.meal-items{display:flex;flex-direction:column;gap:9px;}
.meal-item{display:flex;justify-content:space-between;align-items:center;}
.meal-name{font-size:14px;font-weight:600;color:#111;}
.meal-amt{font-size:14px;color:var(--text-sub);}
.meal-note{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:11px;color:#aaa;}
.empty-card{background:#fff;text-align:center;color:#bbb;padding:28px 0;font-size:13px;border-bottom:1px solid var(--border);}
.memo-card{background:#fffbf0;padding:13px 16px;border-bottom:1px solid var(--border);}
.memo-lbl{font-size:12px;font-weight:700;color:#585858;margin-bottom:4px;}
.memo-txt{font-size:13px;color:#2f2f2e;line-height:1.6;}
.new-card{background:#fff0f6;padding:20px 16px;border-bottom:1px solid var(--border);}
.new-lbl{font-size:13px;font-weight:700;color:#000000;margin-bottom:7px;}
.new-chips{display:flex;flex-wrap:wrap;gap:6px;}
.new-chip{background:var(--pink);color:#fff;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;}

.acc{background:#fff;border-bottom:1px solid var(--border);}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding: 20px 16px;cursor:pointer;user-select:none;}
.acc-title{font-size:13px;font-weight:700;color:#111;}
.acc-arrow{font-size:12px;color:#111;font-weight:700;transition:transform 0.2s;}
.acc.open .acc-arrow{transform:rotate(180deg);}
.acc-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);}
.acc.open .acc-body{display:block;}
.stock-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:#111;gap:12px;}
.stock-row:last-child{border-bottom:none;}
.stock-val{font-weight:700;color:var(--sky);text-align:right;}
.stock-low{color:#e65100!important;}
.shop-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:#111;}
.shop-row:last-child{border-bottom:none;}
.shop-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);flex-shrink:0;}
.notice-list{padding-top:8px;}
.notice-list li{font-size:12px;color:#444;line-height:1.8;list-style:none;padding:2px 0;border-bottom:1px solid var(--border);}
.notice-list li:last-child{border-bottom:none;}

.bottom-tabs{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:#e8e8e8;
  display:flex;
  z-index:300;
  border-top:0 solid var(--border);
}
.btab{flex:1;background:none;border:none;color:#aaa;font-size:12px;font-weight:700;padding:12px 4px 14px;cursor:pointer;transition:color 0.2s;}
.btab.active{color:#111;border-top:2px solid #111; background-color: #fff;}

.pc-month-lbl{font-size:14px;font-weight:700;padding:12px 16px 6px;color:#111;}
.cal-overflow{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 16px 12px;}
.pc-table{min-width:640px;border-collapse:collapse;table-layout:fixed;width:100%;}
.pc-table th{background:#333;color:#fff;font-size:10px;font-weight:600;padding:5px;text-align:center;}
.pc-table td{border:1px solid #ddd;vertical-align:top;background:#fff;}
.pc-table td.emp{background:#f8f8f8;border-color:#eee;}
.pc-cell{padding:5px;min-height:72px;}
.pc-date{font-size:11px;font-weight:700;margin-bottom:3px;color:#111;}
.pc-items{font-size:9px;color:#333;line-height:1.6;}
.pc-note-sm{font-size:8px;color:#aaa;}
.pc-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
.pc-badge{font-size:7px;font-weight:700;padding:1px 5px;border-radius:10px;}
.pc-done{opacity:0.45;}
.pc-today-cell{outline:2px solid var(--pink);}
.print-btn-wrap{padding:12px 16px 80px;}
.print-btn{width:100%;background:#111;color:#fff;border:none;padding:14px;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;}
@media print{
  body{max-width:none;background:#fff;}
  .bottom-tabs,.print-btn-wrap{display:none;}
  .header{position:static;}
}
</style>

  "6/27": {items:[{n:"쌀",a:"30g"},{n:"단호박",a:"15g"},{n:"양배추",a:"15g"}],badges:["직접"]},
  "6/28": {items:[{n:"쌀",a:"30g"},{n:"땅콩",a:"5g"},{n:"한우",a:"15g"}],badges:["반복","직접"]},
  "6/29": {items:[{n:"쌀",a:"30g"},{n:"두부",a:"15g"},{n:"단호박",a:"15g"}],badges:["직접"]},
  "6/30": {items:[{n:"쌀",a:"30g"},{n:"양배추",a:"15g"},{n:"한우",a:"15g"}],badges:["직접"]}
};

const stocks = [
  {n:"한우 큐브 (15g)",a:"11개 (165g)",low:false},
  {n:"브로콜리미음",a:"140g (5/16 도착)",low:false},
  {n:"감자미음",a:"140g (5/16 도착)",low:false},
  {n:"고구마미음",a:"100g",low:false},
  {n:"쌀가루 (아이보리)",a:"구매 필요",low:true},
  {n:"오트밀 파우더",a:"구매 필요",low:true}
];
const shops = ["아이보리 쌀가루 초기 1단계", "아이보리 오트밀 파우더 200g", "한우 우둔살 350g (5/24 전)"];
const notices = [
  "오트밀: 글루텐 프리 인증 제품 사용",
  "노른자: 완숙 후 으깨어 사용 / 흰자는 돌 이후",
  "땅콩: 첫날 반드시 오전 + 병원 진료 가능 시간",
  "땅콩: 주 2~3회 반복 노출 필수",
  "새 식재료: 3일 이상 단독 관찰",
  "양배추: 충분히 익혀 곱게 으깨기",
  "단호박: 쪄서 껍질 제거 후 곱게 으깨기",
  "키트 사용 식재료도 동일하게 3일 단독 관찰"
];
const DOW = ["월","화","수","목","금","토","일"];
let curMonth = TODAY.getMonth();
let sel = new Date(TODAY);

function dk(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function dds(d){ return `D+${Math.floor((d - START) / 86400000) + 1}`; }
function dows(d){ const x = d.getDay(); return DOW[x === 0 ? 6 : x - 1]; }
function isToday(d){ return d.toDateString() === TODAY.toDateString(); }
function isPast(d){ return d < TODAY && !isToday(d); }
function weekStart(d){ const x = d.getDay(); const m = new Date(d); m.setDate(d.getDate() - (x === 0 ? 6 : x - 1)); return m; }
function weekDays(s){ return Array.from({length:7}, (_,i) => { const d = new Date(s); d.setDate(s.getDate() + i); return d; }); }
function weekNumber(d){ const f = new Date(2025, d.getMonth(), 1); return Math.ceil((d.getDate() + ((f.getDay() || 7) - 1)) / 7); }
function badgeClass(b){
  const map = {"NEW":"b-new", "직접":"b-direct", "시판":"b-store", "시판+직접":"b-mix", "주의":"b-warn", "반복":"b-repeat", "키트":"b-kit"};
  return map[b] || "b-direct";
}
function esc(v){
  return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function ageStr(d){
  const by=BIRTH.getFullYear(),bm=BIRTH.getMonth(),bd=BIRTH.getDate();
  const dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
  let totalM=(dy-by)*12+(dm-bm);
  if(dd<bd) totalM--;
  const lastB=new Date(BIRTH);
  lastB.setMonth(lastB.getMonth()+totalM);
  const days=Math.floor((d-lastB)/86400000)+1;
  return `생후 ${totalM}개월 ${days}일`;
}
function renderStrip(){
  document.getElementById('month-lbl').textContent = `${curMonth + 1}월`;
  document.getElementById('sub').textContent = ageStr(TODAY);

  let html = "";
  for(let day=1; day<=31; day++){
    const d = new Date(TODAY.getFullYear(), curMonth, day);
    if(d.getMonth() !== curMonth) break;
    const data = meals[dk(d)];
    let cls = "day-item";
    if(isToday(d)) cls += " today";
    if(d.toDateString() === sel.toDateString()) cls += " selected";
    if(data && data.done) cls += " done-day";
    html += `<div class="${cls}" onclick="pick(${d.getFullYear()},${d.getMonth()},${d.getDate()})"><div class="dn">${day}</div></div>`;
  }
  document.getElementById('strip').innerHTML = html;

  setTimeout(() => {
    const wrap = document.getElementById('strip-wrap');
    const items = document.getElementById('strip').querySelectorAll('.day-item');
    const idx = sel.getDate() - 1;
    if(items[idx]){
      const itemLeft = items[idx].getBoundingClientRect().left;
      const wrapLeft = wrap.getBoundingClientRect().left;
      wrap.scrollTo({left:wrap.scrollLeft + itemLeft - wrapLeft - wrap.clientWidth/2 + items[idx].clientWidth/2, behavior:'smooth'});
    }
  }, 50);
}

function renderContent(){
  const key = dk(sel);
  const data = meals[key];
  const todaySelected = isToday(sel);
  const pastSelected = isPast(sel);
  let stTxt = "예정";
  let stCls = "future";

  if(!data){ stTxt = "식단 없음"; stCls = "future"; }
  else if(data.done){ stTxt = "섭취 완료 ✓"; stCls = "done"; }
  else if(todaySelected){ stTxt = "오늘 예정"; stCls = "pending"; }
  else if(pastSelected){ stTxt = "기록 없음"; stCls = "future"; }

  let html = "";
  html += `<div class="day-hd">`;
  html += `<div>`;
  html += `<div class="day-title">`;
  if(todaySelected) html += `<span class="today-lbl">오늘</span>`;
  html += `${sel.getMonth()+1}월 ${sel.getDate()}일 (${dows(sel)})</div>`;
  html += `<div class="dday-txt">${dds(sel)}</div>`;
  html += `</div>`;
  html += `<div class="status ${stCls}">${stTxt}</div>`;
  html += `</div>`;

  if(!data){
    html += `<div class="empty-card">이날은 식단이 없어요</div>`;
  }else{
    const badges = (data.badges || []).map(b => `<span class="badge ${badgeClass(b)}">${esc(b)}</span>`).join(" ");
    html += `<div class="meal-card${data.done ? ' dimmed' : ''}">`;
    html += `<div class="meal-lbl">🥣 Baby food ${badges}</div>`;
    html += `<div class="meal-items">`;
    data.items.forEach(item => {
      html += `<div class="meal-item"><span class="meal-name">${esc(item.n)}</span><span class="meal-amt">${esc(item.a || '')}</span></div>`;
    });
    html += `</div>`;
    if(data.note) html += `<div class="meal-note">💧 ${esc(data.note)}</div>`;
    // 섭취완료 버튼 (완료되지 않은 날만 표시)
if(!data.done){
  html += `<div style="padding:12px 0 4px;">
    <button onclick="checkDone('${dk(sel)}')" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;">
      ✓ 섭취 완료 체크
    </button>
  </div>`;
}
    html += `</div>`;
    if(data.memo){
      html += `<div class="memo-card"><div class="memo-lbl">📝 섭취 기록</div><div class="memo-txt">${esc(data.memo)}</div></div>`;
    }
  }

  const newItems = [];
  weekDays(weekStart(sel)).forEach(d => {
    const meal = meals[dk(d)];
    if(meal && (meal.badges || []).includes("NEW")){
      meal.items.forEach(item => { if(!newItems.includes(item.n)) newItems.push(item.n); });
    }
  });
  if(newItems.length > 0){
    html += `<div class="new-card"><div class="new-lbl">✨ ${sel.getMonth()+1}월 ${weekNumber(sel)}주차 새 식재료</div><div class="new-chips">`;
    newItems.forEach(item => html += `<span class="new-chip">${esc(item)}</span>`);
    html += `</div></div>`;
  }

  html += accordionHtml("a-s", "📦 재고 현황", stockHtml());
  html += accordionHtml("a-h", "🛒 장볼 재료", shopHtml());
  html += accordionHtml("a-n", "⚠️ 알러지 유의사항", noticeHtml());
  html += `<div style="height:80px;"></div>`;

  document.getElementById('content').innerHTML = html;
}

function accordionHtml(id, title, body){
  return `<div class="acc" id="${id}"><div class="acc-header" onclick="toggleAcc('${id}')"><span class="acc-title">${title}</span><span class="acc-arrow">▼</span></div><div class="acc-body">${body}</div></div>`;
}
function stockHtml(){
  const source = dbStocks.length > 0 ? dbStocks.map(s => {
    const isLow = s.amount <= s.low_alert;
    return `<div class="stock-row">
      <span>${esc(s.name)}</span>
      <span class="stock-val${isLow?' stock-low':''}">${s.amount}${esc(s.unit)} ${isLow?'🔴':''}</span>
    </div>`;
  }) : stocks.map(s =>
    `<div class="stock-row"><span>${esc(s.n)}</span><span class="stock-val${s.low?' stock-low':''}">${esc(s.a)}</span></div>`
  );
  return source.join("");
}
function shopHtml(){
  // DB 재고 기준 2개 이하인 항목 자동 추가
  const autoShops = dbStocks.filter(s => s.amount <= s.low_alert).map(s => s.name);
  const allShops = [...new Set([...autoShops, ...shops])];
  return allShops.map(s => `<div class="shop-row"><div class="shop-dot"></div><span>${esc(s)}</span></div>`).join("");
}
function noticeHtml(){
  return `<ul class="notice-list">${notices.map(n => `<li>${esc(n)}</li>`).join("")}</ul>`;
}
function toggleAcc(id){ document.getElementById(id).classList.toggle('open'); }

// Supabase에서 재고 불러오기
async function loadStocks(){
  try {
    const { data, error } = await sb.from('inventory').select('*').order('id');
    if(error){ console.error('재고 로딩 오류:', error); return; }
    if(data && data.length > 0){
      dbStocks = data;
      console.log('재고 로딩 성공:', dbStocks);
      renderContent();
    }
  } catch(e){
    console.error('Supabase 연결 오류:', e);
  }
}

// 섭취완료 체크 → 재고 차감
async function checkDone(dateKey){
  const data = meals[dateKey];
  if(!data) return;

  if(!confirm('섭취 완료로 기록할까요? 재고가 자동으로 차감됩니다.')) return;

  // meal_log 테이블에 기록
  await sb.from('meal_log').upsert({
    date: dateKey,
    done: true,
    memo: '섭취완료'
  }, { onConflict: 'date' });

  // 재고 차감: 한우 큐브 (15g 단위로 사용한 개수만큼)
  // 재고 차감
for(const item of data.items){
  let stockName = null;
  let useCount = 0;

  if(item.n === '한우'){
    stockName = '한우큐브';
    const grams = parseInt(item.a);
    useCount = isNaN(grams) ? 0 : Math.round(grams / 15);
  } else if(item.n === '쌀미음'){
    stockName = '쌀미음큐브';
    const grams = parseInt(item.a);
    useCount = isNaN(grams) ? 0 : Math.round(grams / 15);
  }

  if(stockName && useCount > 0){
    const stock = dbStocks.find(s => s.name === stockName);
    if(stock){
      await sb.from('inventory').update({
        amount: Math.max(0, stock.amount - useCount)
      }).eq('id', stock.id);
    }
  }
}

  // 로컬 meals 데이터도 완료 처리
  meals[dateKey].done = true;
  meals[dateKey].memo = '섭취완료';

  // 재고 다시 불러오고 화면 갱신
  await loadStocks();
  renderStrip();
}

function goToday(){
  sel = new Date(TODAY);
  curMonth = TODAY.getMonth();
  renderStrip();
  renderContent();
}
function changeMonth(dir){
  curMonth = Math.max(4, Math.min(5, curMonth + dir));
  for(let i=1; i<=31; i++){
    const d = new Date(2026, curMonth, i);
    if(d.getMonth() !== curMonth) break;
    if(meals[dk(d)]){ sel = d; break; }
  }
  renderStrip();
  renderContent();
}
function pick(y,m,d){
  sel = new Date(y,m,d);
  curMonth = m;
  renderStrip();
  renderContent();
}

function buildPC(){
  const months = [{m:4,label:"5월",days:31,d0:3},{m:5,label:"6월",days:30,d0:6}];
  let html = "";

  months.forEach(month => {
    html += `<div class="pc-month-lbl">${month.label}</div>`;
    html += `<div class="cal-overflow"><table class="pc-table"><thead><tr>`;
    ["월","화","수","목","금","토","일"].forEach(d => html += `<th>${d}</th>`);
    html += `</tr></thead><tbody><tr>`;

    let col = 0;
    for(let i=0; i<month.d0; i++){ html += `<td class="emp"></td>`; col++; }

    for(let day=1; day<=month.days; day++){
      if(col === 7){ html += `</tr><tr>`; col = 0; }
      const d = new Date(2026, month.m, day);
      const data = meals[dk(d)];
      html += `<td class="${isToday(d) ? 'pc-today-cell' : ''}"><div class="pc-cell${data && data.done ? ' pc-done' : ''}">`;
      html += `<div class="pc-date">${day}${data && data.done ? ' ✓' : ''}</div>`;
      if(data){
        html += `<div class="pc-items">`;
        html += data.items.map(item => `${esc(item.n)}${item.a ? ' ' + esc(item.a) : ''}`).join('<br>');
        html += `</div>`;
        if(data.note) html += `<div class="pc-note-sm">${esc(data.note)}</div>`;
        html += `<div class="pc-badges">`;
        (data.badges || []).forEach(b => html += `<span class="pc-badge ${badgeClass(b)}">${esc(b)}</span>`);
        html += `</div>`;
      }
      html += `</div></td>`;
      col++;
    }
    while(col < 7){ html += `<td class="emp"></td>`; col++; }
    html += `</tr></tbody></table></div>`;
  });

  return html;
}
function downloadCal(){
  const calContent = document.getElementById('cal-content').innerHTML;
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>찐아 이유식 식단표</title>
    <style>
      body{font-family:sans-serif;padding:20px;max-width:900px;margin:0 auto;}
      table{min-width:640px;border-collapse:collapse;table-layout:fixed;width:100%;}
      th{background:#333;color:#fff;font-size:10px;padding:5px;text-align:center;}
      td{border:1px solid #ddd;vertical-align:top;}
      .np{margin-bottom:16px;}
      @media print{.np{display:none;}}
    </style>
    </head><body>
    <div class="np">
      <button onclick="window.print()" style="padding:10px 20px;background:#111;color:#fff;border:none;cursor:pointer;font-size:14px;">🖨️ 인쇄 / PDF 저장</button>
    </div>
    ${calContent}
    </body></html>`);
  w.document.close();
  w.onload = () => setTimeout(() => w.print(), 300);
}
function switchTab(tab){
  document.getElementById('main-view').style.display = tab === 'main' ? 'block' : 'none';
  document.getElementById('cal-view').style.display = tab === 'cal' ? 'block' : 'none';
  document.getElementById('tab-main').classList.toggle('active', tab === 'main');
  document.getElementById('tab-cal').classList.toggle('active', tab === 'cal');

  if(tab === 'cal'){
    document.getElementById('cal-content').innerHTML = buildPC() + `<div class="print-btn-wrap"><button class="print-btn" onclick="downloadCal()">📥 인쇄 / PDF 저장</button></div>`;
  }
}

renderStrip();
renderContent();
loadStocks(); // Supabase 재고 비동기 로드
</script>
