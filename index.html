/* ── DB 날짜 경계 변환: 내부 "M/D" ↔ DB "YYYY-MM-DD" ──
   2026-01 마이그레이션 이후 DB는 YYYY-MM-DD 저장. 내부 로직은 "M/D" 유지.
   변환은 반드시 이 두 함수(DB 경계)에서만 수행한다. */
function toDbDate(key) {
  const m = String(key).match(/^(\d{1,2})\/(\d{1,2})$/);
  if (!m) return key; // '_appstate' 등 예약 키는 그대로
  return PLAN_YEAR + '-' + String(m[1]).padStart(2, '0') + '-' + String(m[2]).padStart(2, '0');
}
function fromDbDate(d) {
  const m = String(d).match(/^\d{4}-(\d{2})-(\d{2})$/);
  if (!m) return d;
  return parseInt(m[1]) + '/' + parseInt(m[2]);
}
async function loadMealLog() {
  try {
    const { data, error } = await sb.from('meal_log').select('*').eq('baby_id', BABY_ID);
    if (error) { console.error('meal_log 오류:', error); return; }
    if (data && data.length > 0) data.forEach(log => {
      const key = fromDbDate(log.date);
      if (meals[key]) { meals[key].done = log.done; meals[key].memo = log.memo || '섭취완료'; }
    });
  } catch (e) { console.error('meal_log 연결 오류:', e); }
}

/* 재료 차감 수량 계산 */
function calcUseCount(amount, base) {
  base = base || 15;
  const s = String(amount || '').trim();
  if (!s || s === '반복노출' || s === '반복') return 0;
  if (s === '소량') return 1;
  if (s.includes('팩') || s.includes('개')) return Math.max(1, parseInt(s) || 1);
  const g = parseInt(s);
  if (isNaN(g) || g <= 0) return 0;
  return Math.max(1, Math.round(g / base));
}
async function checkDone(dateKey) {
  const data = meals[dateKey]; if (!data) return;
  if (!confirm('섭취 완료로 기록할까요? 재고가 자동 차감됩니다.')) return;
  const memo = composeMemo('am-reactions', 'memo-input');

  const allRaw = [...(data.amEdited || data.am || [])];
  const stockChanges = [];
  for (const raw of allRaw) {
    const { name, amount } = parseItem(raw);
    const stock = dbStocks.find(s => s.name === name); if (!stock) continue;
    const useCount = calcUseCount(amount, stock.base_g || 15);
    if (useCount <= 0) continue;
    const actualDeduct = Math.min(useCount, stock.amount);
    await sb.from('inventory').update({ amount: stock.amount - actualDeduct }).eq('id', stock.id);
    stock.amount -= actualDeduct;
    stockChanges.push({ id: stock.id, name: stock.name, amount: actualDeduct });
  }
  const { error: logErr } = await sb.from('meal_log').upsert({ user_id: USER_ID, baby_id: BABY_ID, date: toDbDate(dateKey), done: true, memo, stock_changes: stockChanges }, { onConflict: 'baby_id,date' });
  if (logErr) {
    /* v15 수정: 예전엔 콘솔에만 찍고 화면은 무조건 완료로 표시 → 저장 실패해도 완료된 것처럼 보이는 버그.
       이미 차감한 재고를 되돌리고, 사용자에게 실제로 알린다. */
    console.error('meal_log 저장 오류:', logErr);
    for (const change of stockChanges) {
      const stock = dbStocks.find(s => s.id === change.id);
      if (stock) await sb.from('inventory').update({ amount: stock.amount + change.amount }).eq('id', change.id);
    }
    alert('저장에 실패했어요. 잠시 후 다시 시도해주세요.\n(' + logErr.message + ')');
    await loadStocks();
    return;
  }
  meals[dateKey].done = true; meals[dateKey].memo = memo;
  await loadStocks(); rerender();
}
async function cancelDone(dateKey) {

/* 저녁 섭취완료 / 취소 / 메모 (appState → Supabase 동기화) */
async function checkPmDone(dateKey) {
  const data = meals[dateKey]; if (!data || !data.pm) return;
  const memo = composeMemo('pm-reactions', 'pm-memo-input');

  const stockChanges = [];
  let deductErr = null;
  for (const raw of (data.pmEdited || data.pm || [])) {
    const { name, amount } = parseItem(raw);
    const stock = dbStocks.find(s => s.name === name); if (!stock) continue;
    const useCount = calcUseCount(amount, stock.base_g || 15);
    if (useCount <= 0) continue;
    const actualDeduct = Math.min(useCount, stock.amount);
    const { error } = await sb.from('inventory').update({ amount: stock.amount - actualDeduct }).eq('id', stock.id);
    if (error) { deductErr = error; break; }
    stock.amount -= actualDeduct;
    stockChanges.push({ id: stock.id, name: stock.name, amount: actualDeduct });
  }
  if (deductErr) {
    /* v16 수정: 재고 차감 실패 시 이미 차감된 부분 되돌리고 알림 (조용히 넘어가지 않음) */
    for (const change of stockChanges) {
      const stock = dbStocks.find(s => s.id === change.id);
      if (stock) await sb.from('inventory').update({ amount: stock.amount + change.amount }).eq('id', change.id);
    }
    alert('재고 차감에 실패했어요. 잠시 후 다시 시도해주세요.\n(' + deductErr.message + ')');
    await loadStocks();
    return;
  }

  data.pmDone = true;
  data.pmMemo = memo;
  appState.pmDone[dateKey] = true;
  appState.pmMemo[dateKey] = memo;
  appState.pmStock[dateKey] = stockChanges;
  saveAppState();

  await loadStocks(); rerender();
}

/* ================================================
   인라인 재료 편집 (기존 로직 유지)
================================================ */
/* 현재 편집행 input 값들을 "이름 양" 배열로 읽어옴 (3개 함수 공통) */
function readEditInputs(dateKey, slot, current) {
  return current.map((raw, i) => {
    const { name } = parseItem(raw);
    const amtInput = document.getElementById(`ea-${dateKey}-${slot}-${i}`);
    if (!amtInput) return raw;
    if (amtInput.readOnly) {
      const fixedVal = amtInput.value.trim();
      return fixedVal ? `${name} ${fixedVal}` : raw;
    }
    const num = amtInput.value.trim();
    const unit = amtInput.dataset.unit || 'g';
    return num ? `${name} ${num}${unit}` : raw;
  });
}
function startEdit(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const editedKey = slot + 'Edited';
  const modeKey = slot + 'EditMode';
  const snapKey = slot + 'EditSnapshot';
  /* v17: 편집 시작 시점 상태를 스냅샷으로 저장 → 취소 시 정확히 복원하기 위함.
     null이면 "편집 이력 전혀 없음"을 의미(취소 시 amEdited 자체를 지워 원본 식단으로 복귀). */
  data[snapKey] = data[editedKey] ? [...data[editedKey]] : null;
  if (!data[editedKey]) data[editedKey] = [...(data[slot] || [])];
  data[modeKey] = true;
  rerender();
}
function saveEdit(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const editedKey = slot + 'Edited';
  const modeKey = slot + 'EditMode';
  const snapKey = slot + 'EditSnapshot';
  data[editedKey] = readEditInputs(dateKey, slot, data[editedKey] || []);
  data[modeKey] = false;
  delete data[snapKey];
  persistEdit(dateKey, slot);   /* 편집 내용 appState → Supabase 저장 */
  rerender();
}
/* 인라인 편집 영속화 → appState.edits (Supabase 동기화) */
function persistEdit(dateKey, slot) {
  const editedKey = slot + 'Edited';
  const arr = meals[dateKey] && meals[dateKey][editedKey];
  const k = `${dateKey}_${slot}`;
  if (arr && arr.length) appState.edits[k] = arr;
  else delete appState.edits[k];
  saveAppState();
}
function loadEdits() {
  Object.keys(appState.edits).forEach(k => {
    const arr = appState.edits[k];
    if (!Array.isArray(arr) || !arr.length) return;
    const idx = k.lastIndexOf('_');
    const dateKey = k.slice(0, idx), slot = k.slice(idx + 1);
    if (meals[dateKey]) meals[dateKey][slot + 'Edited'] = arr;
  });
}
function cancelEdit(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;
  const editedKey = slot + 'Edited';
  const modeKey = slot + 'EditMode';
  const snapKey = slot + 'EditSnapshot';
  /* v17: 편집 시작 전 스냅샷으로 복원 (삭제·추가·수량변경 모두 되돌림) */
  if (Object.prototype.hasOwnProperty.call(data, snapKey)) {
    if (data[snapKey] === null) delete data[editedKey];
    else data[editedKey] = data[snapKey];
    delete data[snapKey];
  }
  data[modeKey] = false;
  rerender();
}
function deleteEditRow(dateKey, slot, idx) {
  const data = meals[dateKey]; if (!data) return;
  const srcKey = slot === 'am' ? 'am' : 'pm';
  const editedKey = slot === 'am' ? 'amEdited' : 'pmEdited';
  const current = data[editedKey] || [...(data[srcKey] || [])];
  data[editedKey] = readEditInputs(dateKey, slot, current).filter((_, i) => i !== idx);
  rerender();
}
function addEditRow(dateKey, slot) {
  const data = meals[dateKey]; if (!data) return;

/* ================================================
   기기 간 동기화 상태 (v5.1)
   - 교환/편집/저녁완료/메모/아침건너뜀을 모두 Supabase로 동기화
   - meal_log의 예약 행(date='_appstate')의 stock_changes(jsonb)에 통째 저장
     → 별도 테이블/콘솔작업 없이 모든 기기에서 동일하게 보임
   - 아침 완료/메모는 기존처럼 meal_log의 해당 날짜 행(이미 동기화됨)
================================================ */
const STATE_ROW = '_appstate';
let appState = { swaps: [], edits: {}, pmDone: {}, pmMemo: {}, amSkip: {}, pmStock: {}, lunchDone: {}, lunchMemo: {}, lunchSkip: {}, lunchStock: {}, shifts: [], checklist: {}, checklistAt: {} };

async function loadAppState() {
  try {
    const { data, error } = await sb.from('meal_log').select('stock_changes').eq('baby_id', BABY_ID).eq('date', STATE_ROW);
    if (error) { console.error('앱 상태 로드 오류:', error); return; }
    const s = (data && data[0] && data[0].stock_changes) || null;
    if (s && typeof s === 'object') {
      appState = {
        swaps:  Array.isArray(s.swaps) ? s.swaps : [],
        edits:  (s.edits  && typeof s.edits  === 'object') ? s.edits  : {},
        pmDone: (s.pmDone && typeof s.pmDone === 'object') ? s.pmDone : {},
        pmMemo: (s.pmMemo && typeof s.pmMemo === 'object') ? s.pmMemo : {},
        amSkip: (s.amSkip && typeof s.amSkip === 'object') ? s.amSkip : {},
        pmStock: (s.pmStock && typeof s.pmStock === 'object') ? s.pmStock : {},
        lunchDone: (s.lunchDone && typeof s.lunchDone === 'object') ? s.lunchDone : {},
        lunchMemo: (s.lunchMemo && typeof s.lunchMemo === 'object') ? s.lunchMemo : {},
        lunchSkip: (s.lunchSkip && typeof s.lunchSkip === 'object') ? s.lunchSkip : {},
        lunchStock: (s.lunchStock && typeof s.lunchStock === 'object') ? s.lunchStock : {},
        shifts: Array.isArray(s.shifts) ? s.shifts : [],
        checklist: (s.checklist && typeof s.checklist === 'object') ? s.checklist : {},
        checklistAt: (s.checklistAt && typeof s.checklistAt === 'object') ? s.checklistAt : {},
      };
    }
  } catch (e) { console.error('앱 상태 로드 연결 오류:', e); }
}
/* 전체 상태를 통째로 저장 (마지막 저장이 항상 최신 → 누락돼도 다음 저장이 복구) */
async function saveAppState() {
  /* v15 수정: 기존엔 error를 확인 안 해서 실패해도 아무 표시가 없었음(저녁완료·건너뛰기·교환·편집 전부 해당) */
  try {
    const { error } = await sb.from('meal_log').upsert({ user_id: USER_ID, baby_id: BABY_ID, date: STATE_ROW, done: false, memo: '_appstate', stock_changes: appState }, { onConflict: 'baby_id,date' });
    if (error) { console.error('앱 상태 저장 오류:', error); alert('저장에 실패했어요. 새로고침 후 다시 시도해주세요.\n(' + error.message + ')'); }
  } catch (e) { console.error('앱 상태 저장 오류:', e); }
}
/* 저녁완료/메모/아침건너뜀 상태를 meals에 반영 (로그인 후·재교환 후 호출) */
function applySyncedState() {
  Object.keys(meals).forEach(key => {
    meals[key].amSkipped = !!appState.amSkip[key];
    if (appState.pmDone[key]) {
      meals[key].pmDone = true;
      meals[key].pmMemo = appState.pmMemo[key] || '섭취완료';
    } else {
      meals[key].pmDone = false;
    }
    // 점심(3끼)
    meals[key].lunchSkipped = !!appState.lunchSkip[key];
    if (appState.lunchDone[key]) {
      meals[key].lunchDone = true;
      meals[key].lunchMemo = appState.lunchMemo[key] || '섭취완료';
    } else {
      meals[key].lunchDone = false;
    }
  });
}

/* ================================================
   식단 날짜 교환 (1:1)
   - meals = 불변 원본 / 교환은 "식단 내용 필드"만 자리바꿈
   - 완료기록(done/memo/pmDone/amSkipped)은 캘린더 날짜에 고정 → 과거 보존
   - 교환 이력은 appState.swaps(Supabase 동기화), 로드 시 순서대로 재적용
   - 같은 교환 재실행 = 원복(self-inverse) → 되돌리기 단순
================================================ */
const SWAP_FIELDS = ['am','pm','lunch','note','amEdited','pmEdited','lunchEdited'];
let swapOpenKey = null;      // 현재 피커가 열린 날짜 키
let pendingSwapTarget = null;// 선택했지만 아직 확정 전인 대상 키
let swapUndoTimer = null;

/* 'New 재료' 배지를 떼어 반환 (badge/newBadge 어디 있든) — 음식 따라 이동 대상 */
function pluckNewBadge(m) {
  if (m.newBadge && m.newBadge.t === 'new') { const b = m.newBadge; delete m.newBadge; return b; }
  if (m.badge && m.badge.t === 'new') { const b = m.badge; delete m.badge; return b; }
  return undefined;
}
function setNewBadge(m, badge) { if (badge) m.newBadge = badge; else delete m.newBadge; }

/* 식단 내용 + New배지만 두 날짜 간 교환
   - 2끼 전환/입자(grain)/중기시작(trans·midStart) 마커는 '그 날짜'의 발달 단계 → 교환 안 함(고정)
   - New 재료 배지는 그 재료(음식)를 따라가야 하므로 함께 교환 */
function applySwap(a, b) {
  const A = meals[a], B = meals[b];
  if (!A || !B) return;
  SWAP_FIELDS.forEach(f => {
    const av = A[f], bv = B[f];
    if (bv === undefined) delete A[f]; else A[f] = bv;
    if (av === undefined) delete B[f]; else B[f] = av;
  });
  const na = pluckNewBadge(A), nb = pluckNewBadge(B);
  setNewBadge(A, nb); setNewBadge(B, na);
}
function replaySwaps() { appState.swaps.forEach(p => { if (Array.isArray(p)) applySwap(p[0], p[1]); }); }

/* 교환 대상이 될 수 있는 날인가: 식단 있음 + 미완료 (과거도 허용 — 미완료면 변경 가능) */
function swapEligibleKey(key) {
  const m = meals[key];
  if (!m || !(m.am && m.am.length)) return false;
  return !m.done && !m.pmDone && !m.amSkipped;
}
/* 칩에 표시할 짧은 이름(배지명 우선, 없으면 첫 재료명) */
function swapChipLabel(key) {
  const m = meals[key]; if (!m) return '식단';
  const badge = (m.newBadge && m.newBadge.x) || (m.badge && m.badge.x);
  if (badge) return badge.replace(/^New\s*/, '').trim();
  const first = (m.am && m.am[0]) || (m.pm && m.pm[0]) || '';
  return parseItem(first).name || '식단';
}
/* 해당 날짜 식단에 재고 부족 재료가 있는가 (피커 경고용) */
function dayHasLowStock(key) {
  const m = meals[key];
  if (!m || !dbStocks.length) return false;
  const items = [...(m.amEdited || m.am || []), ...(m.pmEdited || m.pm || [])];
  return items.some(raw => {
    const { name } = parseItem(raw);
    const st = dbStocks.find(s => s.name === name);
    return st && st.amount <= st.low_alert;
  });
}
/* 교환 이력에 포함된 날짜인가 (스트립·달력 점 표시용) */
function isSwappedDay(key) {
  return appState.swaps.some(p => Array.isArray(p) && (p[0] === key || p[1] === key));
}
/* 교환/되돌리기 시 두 날짜의 편집 데이터도 함께 이동 (편집이 음식 따라가도록) */
function swapEditStorage(a, b) {
  ['am', 'pm'].forEach(slot => {
    const ka = `${a}_${slot}`, kb = `${b}_${slot}`;
    const va = appState.edits[ka], vb = appState.edits[kb];
    if (vb === undefined) delete appState.edits[ka]; else appState.edits[ka] = vb;
    if (va === undefined) delete appState.edits[kb]; else appState.edits[kb] = va;
  });
}
function toggleSwapPicker(key) {
  swapOpenKey = (swapOpenKey === key) ? null : key;
  pendingSwapTarget = null;
  rerender();
}
function selectSwapTarget(key) { pendingSwapTarget = key; rerender(); }
function confirmSwap(a, b) {
  if (!swapEligibleKey(a) || !swapEligibleKey(b) || a === b) return;
  applySwap(a, b);
  swapEditStorage(a, b);     /* 편집 데이터도 음식 따라 이동 */
  appState.swaps.push([a, b]);
  saveAppState();            /* 모든 기기 동기화 */
  swapOpenKey = null;
  pendingSwapTarget = null;
  rerender();
  showSwapUndoToast(a, b);
  if (swapUndoTimer) clearTimeout(swapUndoTimer);
  swapUndoTimer = setTimeout(hideSwapUndoToast, 5000);
}
function undoLastSwap() {
  if (!appState.swaps.length) return;
  if (swapUndoTimer) { clearTimeout(swapUndoTimer); swapUndoTimer = null; }
  const [a, b] = appState.swaps.pop();
  applySwap(a, b);          // self-inverse → 원복
  swapEditStorage(a, b);    // 편집 데이터도 원복
  saveAppState();
  hideSwapUndoToast();
  rerender();
}
function showSwapUndoToast(a, b) {
  const t = document.getElementById('undo-toast'); if (!t) return;
  t.style.display = 'flex';
  t.className = 'undo-toast';
  t.innerHTML = `<span><span class="undo-toast-name">${esc(a)} ↔ ${esc(b)}</span> 식단 교환됨</span><button class="undo-btn" onclick="undoLastSwap()">되돌리기</button>`;
}
function hideSwapUndoToast() {
  const t = document.getElementById('undo-toast'); if (t) t.style.display = 'none';
}
/* v18: "M/D" 키 → Date 객체 (PLAN_YEAR 기준) */
function keyDateObj(key) {
  const m = String(key).match(/^(\d{1,2})\/(\d{1,2})$/);
  return m ? new Date(PLAN_YEAR, +m[1] - 1, +m[2]) : null;
}
/* v18: 하루밀기/교환과 관찰기간 — 확정: 구조적 동기화 없이 안내 문구만(2026-07-12 결정).
   최종 판단은 부모 몫이므로 차단하지 않고, 해당 날짜에 "지금 관찰 중"인 재료명만 알려준다. */
function dayObservingNames(key) {
  const m = meals[key]; if (!m) return [];
  const d = keyDateObj(key); if (!d) return [];
  const items = [...(m.amEdited || m.am || []), ...(m.lunchEdited || m.lunch || []), ...(m.pmEdited || m.pm || [])];
  const set = new Set();
  items.forEach(raw => {
    if (typeof raw !== 'string' || raw.startsWith('반복:')) return;
    const { name } = parseItem(raw);
    if (name && isObservingOn(introStatus, name, d)) set.add(name);
  });
  return [...set];
}
function observingNoticeHtml(key) {
  const names = dayObservingNames(key);
  if (!names.length) return '';
  return `<div class="gate-hint" style="color:#b45309;">⚠️ ${esc(names.join(', '))} 관찰기간 중인 날짜예요. 옮기면 관찰 연속성이 끊길 수 있어요 — 참고만 해주세요.</div>`;
}

/* 교환 피커 패널 (식단 카드 하단) */
function swapPickerHtml(srcKey) {
  const targets = Object.keys(meals)
    .filter(k => /^\d+\/\d+$/.test(k) && k !== srcKey && swapEligibleKey(k))
    .sort((a, b) => {

      return (am2 * 31 + ad) - (bm * 31 + bd);

  let h = `<div class="swap-panel">

    <div class="swap-panel-sub">고른 날과 식단을 통째로 맞바꿔요</div>
    ${observingNoticeHtml(srcKey)}`;
  if (!targets.length) {

  } else {

      const low = dayHasLowStock(k) ? `<span class="sc-warn" title="재고 부족">⚠️</span>` : '';
      h += `<div class="swap-chip${sel}" onclick="selectSwapTarget('${k}')">
        <div class="sc-date">${esc(k)}${low}</div>

      h += `<div class="swap-confirm-row">

        <button class="swap-do-btn" onclick="confirmSwap('${srcKey}','${pendingSwapTarget}')">교환하기</button>
        <button class="swap-cancel-btn" onclick="toggleSwapPicker('${srcKey}')">취소</button>
      </div>`;
    }
  }
  h += `</div>`;
  return h;

/* ================================================
   하루 밀기 (데이터 재배치 — swap과 같은 계열)
   - fromKey부터 마지막 식단일까지 식단 내용 필드를 한 칸씩 뒤로 이동
   - fromKey에는 쌀미음(쉬어가기) 삽입
   - 완료기록(done/pmDone/memo 등)은 날짜에 고정 (과거·기록 보존)
   - appState.shifts에 from 기록 → 모든 기기 동기화 / 되돌리기 지원
================================================ */
const SHIFT_REST = { am:['쌀미음 60g'], pm:['쌀미음 60g'], note:'🩺 소화 쉬어가기 — 일정이 하루 미뤄졌어요' };

/* 식단이 있는 날짜 키들을 날짜 오름차순으로 반환 (M/D 형식만) */
function sortedMealKeys() {
  return Object.keys(meals)
    .filter(k => /^\d+\/\d+$/.test(k))
    .sort((a, b) => {
      const [am, ad] = a.split('/').map(Number), [bm, bd] = b.split('/').map(Number);
      return (am * 31 + ad) - (bm * 31 + bd);
    });
}
/* fromKey 이상인 날짜 키들 (오름차순) */
function keysFrom(fromKey) {
  const [fm, fd] = fromKey.split('/').map(Number);
  const fOrd = fm * 31 + fd;
  return sortedMealKeys().filter(k => {
    const [m, d] = k.split('/').map(Number);
    return (m * 31 + d) >= fOrd;
  });
}
/* 한 칸 뒤로 밀기: 뒤에서부터 앞 식단을 끌어옴 */
function applyShift(fromKey) {
  const keys = keysFrom(fromKey);
  if (keys.length < 2) return false;
  // 뒤에서부터: keys[i] <- keys[i-1]
  for (let i = keys.length - 1; i >= 1; i--) {
    copyMealContent(keys[i - 1], keys[i]);
  }
  // fromKey에 쉬어가기 삽입
  setMealContent(keys[0], SHIFT_REST);
  return true;
}
/* 한 칸 앞으로 당기기 (되돌리기): 앞에서부터 뒤 식단을 끌어옴 */
function unapplyShift(fromKey) {
  const keys = keysFrom(fromKey);
  if (keys.length < 2) return false;
  for (let i = 0; i < keys.length - 1; i++) {
    copyMealContent(keys[i + 1], keys[i]);
  }
  return true;
}
/* 식단 "내용 필드"만 복사 (완료기록·날짜고정 항목은 건드리지 않음) */
function copyMealContent(srcKey, dstKey) {
  const S = meals[srcKey], D = meals[dstKey];
  if (!S || !D) return;
  SWAP_FIELDS.forEach(f => {
    if (S[f] === undefined) delete D[f]; else D[f] = JSON.parse(JSON.stringify(S[f]));
  });
  // New 배지만 음식 따라 이동 (trans/grain 등 발달단계 배지는 날짜 고정)
  // 먼저 목적지의 기존 New 배지 제거
  if (D.newBadge && D.newBadge.t === 'new') delete D.newBadge;
  if (D.badge && D.badge.t === 'new') delete D.badge;
  // 출발지의 New 배지를 읽어 목적지에 부여 (출발지 원본은 보존 — replay 무결성)
  const sNew = (S.newBadge && S.newBadge.t === 'new') ? S.newBadge
             : (S.badge && S.badge.t === 'new') ? S.badge : undefined;
  if (sNew) D.newBadge = JSON.parse(JSON.stringify(sNew));
}
function setMealContent(key, content) {
  const D = meals[key]; if (!D) return;
  SWAP_FIELDS.forEach(f => {
    if (content[f] === undefined) delete D[f]; else D[f] = JSON.parse(JSON.stringify(content[f]));
  });
  // 쉬어가기 날: New 배지 제거 (badge가 New였던 경우도 포함). trans/grain은 보존
  if (D.newBadge && D.newBadge.t === 'new') delete D.newBadge;
  if (D.badge && D.badge.t === 'new') delete D.badge;
  if (content.note !== undefined) D.note = content.note;
}
function replayShifts() { appState.shifts.forEach(s => { if (s && s.from) applyShift(s.from); }); }

/* 사용자 액션: 오늘(또는 지정일)부터 하루 밀기 */
function shiftFromDay(fromKey) {
  if (!confirm(`${fromKey}부터 이후 일정을 하루씩 미룰까요?\n오늘은 쌀미음(쉬어가기)으로 바뀌고, 이후 식단이 하루씩 뒤로 이동해요.\n(완료한 기록은 그대로 유지됩니다)`)) return;
  if (!applyShift(fromKey)) { alert('미룰 수 있는 식단이 없어요.'); return; }
  appState.shifts.push({ from: fromKey, ts: Date.now() });
  saveAppState();
  rerender();
  showShiftUndoToast(fromKey);
}
function undoLastShift() {
  if (!appState.shifts.length) return;
  const last = appState.shifts.pop();
  unapplyShift(last.from);
  saveAppState();
  hideSwapUndoToast();
  rerender();
}
function showShiftUndoToast(fromKey) {
  const t = document.getElementById('undo-toast'); if (!t) return;
  t.style.display = 'flex';
  t.className = 'undo-toast';
  t.innerHTML = `<span><span class="undo-toast-name">${esc(fromKey)}</span>부터 하루 미뤄짐</span><button class="undo-btn" onclick="undoLastShift()">되돌리기</button>`;
  if (swapUndoTimer) clearTimeout(swapUndoTimer);
  swapUndoTimer = setTimeout(hideSwapUndoToast, 5000);
}


/* ================================================
   날짜 이동 (식단 탭)
================================================ */
function goToday() { sel = new Date(TODAY); curMonth = TODAY.getMonth(); renderMeal(); }
function changeMonth(dir) {
  curMonth = Math.max(MONTH_MIN, Math.min(MONTH_MAX, curMonth + dir));
  for (let i = 1; i <= 31; i++) { const d = new Date(PLAN_YEAR, curMonth, i); if (d.getMonth() !== curMonth) break; if (meals[dk(d)]) { sel = d; break; } }
  renderMeal();
}
function pick(y, m, d) { sel = new Date(y, m, d); curMonth = m; renderMeal(); }

/* ================================================
   월간 달력 (기존 디자인·로직 보존)
================================================ */
const M_WD = ['일','월','화','수','목','금','토'];
function mealDayCount(y, m, d) { return Math.round((new Date(y,m-1,d) - START)/86400000) + 1; }
function isMondayYMD(y, m, d) { return new Date(y,m-1,d).getDay() === 1; }

function buildMonthCal(y, m) {
  const first = new Date(y, m-1, 1).getDay();
  const last  = new Date(y, m, 0).getDate();
  let h = `<div class="month-section">`;
  h += `<div class="month-top"><div class="month-title">${y}년 ${m}월</div>`;
  h += `</div>`;

  h += `<div class="weekdays">${M_WD.map(w=>`<div class="wd">${w}</div>`).join('')}</div><div class="days-grid">`;
  for (let i=0; i<first; i++) h += `<div class="dc empty"></div>`;
  for (let d=1; d<=last; d++) {
    const ev = meals[`${m}/${d}`] || {};
    const dObj = new Date(y, m-1, d);
    let cls = 'dc';
    if (isToday(dObj)) cls += ' today';
    if (ev.done) cls += ' done';
    h += `<div class="${cls}"><div class="day-row"><span class="dn">${d}${ev.done ? ' ✓' : ''}</span>`;
    if (isMondayYMD(y,m,d)) h += `<span class="meal-day-count">이유식 ${mealDayCount(y,m,d)}일째</span>`;
    h += `</div>`;
    if (ev.badge || ev.newBadge) {
      h += `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px;">`;
      if (ev.badge)    h += `<span class="badge b-${ev.badge.t}">${esc(ev.badge.x)}</span>`;
      if (ev.newBadge) h += `<span class="badge b-${ev.newBadge.t}">${esc(ev.newBadge.x)}</span>`;
      h += `</div>`;
    }
    if (ev.amEdited || ev.am) {
      h += `<div class="meal-block"><div class="meal-header"><span class="time-badge">오전</span></div><div class="meal-items">`;
      (ev.amEdited || ev.am).forEach(it => { const r=it.startsWith('반복:'); h += `<div class="meal-item${r?' repeat':''}">${esc(r?it.slice(3):it)}</div>`; });
      h += `</div></div>`;
    }
    if (ev.lunchEdited || ev.lunch) {
      h += `<hr class="meal-sep"><div class="meal-block"><div class="meal-header"><span class="time-badge">점심</span></div><div class="meal-items">`;
      (ev.lunchEdited || ev.lunch).forEach(it => { const r=it.startsWith('반복:'); h += `<div class="meal-item${r?' repeat':''}">${esc(r?it.slice(3):it)}</div>`; });
      h += `</div></div>`;
    }
    if (ev.pmEdited || ev.pm) {
      h += `<hr class="meal-sep"><div class="meal-block"><div class="meal-header"><span class="time-badge">오후</span></div><div class="meal-items">`;
      (ev.pmEdited || ev.pm).forEach(it => { const r=it.startsWith('반복:'); h += `<div class="meal-item${r?' repeat':''}">${esc(r?it.slice(3):it)}</div>`; });
      h += `</div></div>`;
    } else if (ev.am) {
      h += `<hr class="meal-sep"><div class="meal-block"><div class="meal-header"><span class="time-badge">오후</span></div><div class="meal-item" style="color:#CACACA">-</div></div>`;
    }
    h += `</div>`;
  }
  const rem = (first + last) % 7;
  if (rem) for (let i=0; i<7-rem; i++) h += `<div class="dc empty"></div>`;
  h += `</div></div>`;
  return h;
}
function fmtNow() {
  const d = new Date(), p = n => String(n).padStart(2, '0');
  return `${d.getMonth() + 1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function toggleCheck(m, i, checked) {
  const row = document.getElementById(`cli-${m}-${i}`);
  if (checked) row.classList.add('checked'); else row.classList.remove('checked');
  const name = (CHECKLIST[m] || [])[i];
  if (name == null) return;
  if (!appState.checklist[m]) appState.checklist[m] = {};
  if (checked) appState.checklist[m][name] = true; else delete appState.checklist[m][name];
  appState.checklistAt[m] = fmtNow();
  const at = document.getElementById(`chk-at-${m}`);
  if (at) at.textContent = '업데이트 ' + appState.checklistAt[m];
  saveAppState();
}
function buildCal() {
  let h = `<div class="mcal">`;
  for (let mm = MONTH_MIN + 1; mm <= MONTH_MAX + 1; mm++) h += buildMonthCal(PLAN_YEAR, mm);
  h += `<div class="print-btn-wrap"><button class="print-btn" onclick="window.print()">📥 인쇄 / PDF 저장</button><button class="img-btn" id="img-export-btn" onclick="exportMonthlyImage()">🖼 이미지로 저장</button></div>`;
  h += `</div>`;
  return h;
}

/* 월간 식단표 → PNG 이미지로 저장 (html2canvas) */
async function exportMonthlyImage() {
  const btn = document.getElementById('img-export-btn');
  const target = document.getElementById('cal-content');
  const wrap = target?.querySelector('.print-btn-wrap');
  if (!target || typeof html2canvas === 'undefined') {
    alert('이미지 저장 기능을 불러오지 못했어요. 네트워크 상태를 확인 후 다시 시도해주세요.');
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
  if (wrap) wrap.style.display = 'none';
  try {
    const canvas = await html2canvas(target, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
    const link = document.createElement('a');
    const today = new Date();
    const stamp = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    link.download = `찐아_식단표_${stamp}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    console.error('이미지 저장 오류:', e);
    alert('이미지 저장에 실패했어요. 잠시 후 다시 시도해주세요.');
  } finally {
    if (wrap) wrap.style.display = '';
    if (btn) { btn.disabled = false; btn.textContent = '🖼 이미지로 저장'; }
  }
}

/* 식재료 2일 전 자동화 (v17: New 배지 항목뿐 아니라 해당 기간 식단의 모든 재료를 확인 →
   재고에 아예 없는 재료는 New 여부와 무관하게 0개로 자동 등록. 기존 재료가 나중에 재고 등록만
   누락된 사각지대(예: 고구마·브로콜리)를 다음 로그인 시 자동으로 채워 넣기 위함. 재고 충분 시
   장볼 목록 자동 추가는 스킵하는 기존 정책은 그대로 유지) */
async function autoAddUpcoming() {
  let stockAdded = false, shopAdded = false;
  let nextSortOrder = dbStocks.length;
  const seen = new Set();
  for (let offset = 0; offset <= 2; offset++) {
    const d = new Date(TODAY);
    d.setDate(TODAY.getDate() + offset);
    const data = meals[dk(d)];
    if (!data) continue;
    const rawItems = [...(data.amEdited || data.am || []), ...(data.pmEdited || data.pm || [])];
    for (const raw of rawItems) {
      const { name } = parseItem(raw);
      if (!name || seen.has(name)) continue;
      seen.add(name);
      const stockItem = dbStocks.find(s => s.name === name);
      const hasEnough = stockItem && !isStockLow(stockItem);
      const inShop = shops.some(s => s.name === name);
      // 재고가 충분하면(수량 > 알림기준) 장볼 목록에 자동 추가 안 함
      if (!inShop && !hasEnough) {
        const { error } = await sb.from('shop_list').insert([{ user_id: USER_ID, baby_id: BABY_ID, name }]);
        if (!error) shopAdded = true; else console.error('장볼목록 자동추가 오류:', error);
      }
      if (!stockItem) {
        const { error } = await sb.from('inventory').insert([{ user_id: USER_ID, baby_id: BABY_ID, name, amount: 0, unit: '개', low_alert: 1, sort_order: nextSortOrder }]);
        if (!error) { stockAdded = true; nextSortOrder++; } else console.error('재고 자동추가 오류:', error);
      }
    }
  }
  if (stockAdded) await loadStocks();
  if (shopAdded) await loadShops();
}

function openMonthly() {
  lastTab = activeTab;

   - 이메일/비밀번호 로그인 (세션 자동 유지 → 재방문 시 로그인 생략)

function gateEl() { return document.getElementById('gate-card'); }

function hideGate() { document.body.classList.remove('gated'); document.getElementById('gate-view').style.display = 'none'; }

/* 비밀번호 확인 실시간 검사: 불일치 문구를 확인칸 안(오른쪽)에 표시 */
function checkPwMatch() {
  const pw = document.getElementById('gate-pw')?.value || '';
  const pw2El = document.getElementById('gate-pw2');
  const err = document.getElementById('pw2-err');
  if (!pw2El || !err) return true;
  const bad = pw2El.value.length > 0 && pw2El.value !== pw;
  err.style.display = bad ? 'block' : 'none';
  return !bad && pw2El.value.length > 0;
}

async function doLogin() {
  const email = document.getElementById('gate-email')?.value?.trim();
  const pw = document.getElementById('gate-pw')?.value || '';
  if (!email || !pw) { gateMsg('이메일과 비밀번호를 입력해주세요.'); return; }
  /* v12: supabase가 로그인 성공 즉시 storage.setItem을 호출하므로, 그 전에 유지 여부를 먼저 기록 */
  setRememberPref(document.getElementById('gate-remember')?.checked !== false);
  const btn = document.getElementById('gate-submit'); if (btn) btn.disabled = true;
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) {
      gateMsg(/invalid/i.test(error.message) ? '이메일 또는 비밀번호가 올바르지 않아요.'
            : /confirm/i.test(error.message) ? '가입 확인 메일의 링크를 먼저 눌러주세요.'
            : '로그인 실패: ' + error.message);
      return;
    }
    await enterApp(data.session);
  } catch (e) { console.error('로그인 오류:', e); gateMsg('연결에 실패했어요. 잠시 후 다시 시도해주세요.'); }
  finally { const b = document.getElementById('gate-submit'); if (b) b.disabled = false; }
}

async function doSignup() {
  const email = document.getElementById('gate-email')?.value?.trim();
  const pw = document.getElementById('gate-pw')?.value || '';
  const pw2 = document.getElementById('gate-pw2')?.value || '';
  if (!email || !pw) { gateMsg('이메일과 비밀번호를 입력해주세요.'); return; }
  if (pw.length < 6 || !/[A-Za-z]/.test(pw) || !/[0-9]/.test(pw) || !/[^A-Za-z0-9]/.test(pw)) {
    gateMsg('비밀번호는 영문, 숫자, 특수문자를 모두 포함해\n6자 이상으로 정해주세요.'); return;
  }
  if (pw !== pw2) { checkPwMatch(); document.getElementById('gate-pw2')?.focus(); return; }
  if (!document.getElementById('gate-age')?.checked) { gateMsg('만 14세 이상 보호자 확인에 체크해주세요.'); return; }
  if (!document.getElementById('gate-terms')?.checked) { gateMsg('이용약관과 개인정보처리방침 동의에 체크해주세요.'); return; }
  const btn = document.getElementById('gate-submit'); if (btn) btn.disabled = true;
  try {
    const { data, error } = await sb.auth.signUp({ email, password: pw,
      options: { emailRedirectTo: location.origin + location.pathname } });
    if (error) {
      gateMsg(/already|registered|exists/i.test(error.message) ? '이미 가입된 이메일이에요. 로그인해주세요.' : '가입 실패: ' + error.message);
      return;
    }
    if (data.session) { await enterApp(data.session); return; }
    /* Supabase는 이메일 나열 공격 방지를 위해, 이미 가입·인증된 이메일로 재가입 시도해도
       에러 없이 identities:[] 인 가짜 user를 반환한다. 이 케이스를 별도로 감지한다. */
    if (data.user && Array.isArray(data.user.identities) && data.user.identities.length === 0) {
      gateMsg('이미 가입된 이메일이에요. 로그인해주세요.');
      return;
    }
    /* 프로젝트에 이메일 확인이 켜져 있는 경우 */
    showAuth('login', '가입 확인 메일을 보냈어요.\n메일의 링크를 누른 뒤 로그인해주세요.');
  } catch (e) { console.error('가입 오류:', e); gateMsg('연결에 실패했어요. 잠시 후 다시 시도해주세요.'); }
  finally { const b = document.getElementById('gate-submit'); if (b) b.disabled = false; }
}

const ROLE_OPTS = ['엄마', '아빠', '엄빠'];

/* ── 날짜 셀렉트(년/월/일) 컴포넌트 ── */
function dateSelHtml(prefix, defDate) {

  let ys = ''; for (let y = yNow; y >= yNow - 3; y--) ys += `<option value="${y}"${y === dy ? ' selected' : ''}>${y}년</option>`;
  let ms = ''; for (let m = 1; m <= 12; m++) ms += `<option value="${m}"${m === dm ? ' selected' : ''}>${m}월</option>`;
  let ds = ''; for (let d = 1; d <= 31; d++) ds += `<option value="${d}"${d === dd ? ' selected' : ''}>${d}일</option>`;
  return `<div class="ob-date-row">
    <select class="gate-select" id="${prefix}-y" onchange="syncDays('${prefix}')">${ys}</select>
    <select class="gate-select" id="${prefix}-m" onchange="syncDays('${prefix}')">${ms}</select>
    <select class="gate-select" id="${prefix}-d">${ds}</select></div>`;
}
function syncDays(prefix) {
  const y = +document.getElementById(prefix + '-y').value, m = +document.getElementById(prefix + '-m').value;
  const sel = document.getElementById(prefix + '-d'); const cur = +sel.value;
  const last = new Date(y, m, 0).getDate();
  let ds = ''; for (let d = 1; d <= last; d++) ds += `<option value="${d}">${d}일</option>`;
  sel.innerHTML = ds; sel.value = Math.min(cur, last);
}
function readDateSel(prefix) {

async function submitOnboard() {

/* ── 유틸: 'YYYY-MM-DD' → 로컬 Date (UTC 파싱 함정 회피) ── */
function parseDbDateFull(s) {
  const m = String(s).match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  return m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(s);
}

/* ── 템플릿 식단 생성: 내장 meals를 D+오프셋으로 재배치 ──
   - 기록성 필드(done/memo 등)는 제거하고 계획만 복사
   - 찐아 개인 이력 성격의 note(장염 관련)는 제외
   - v8 한계: 시작 연도 내의 날짜만 생성 (연도 경계는 제외) */
const TEMPLATE_STRIP = ['done','memo','pmDone','pmMemo','amSkipped','lunchDone','lunchMemo','lunchSkipped'];
function templateRows(userId, babyId, startDate) {
  const s = v8DateOnly(startDate);
  const rows = [];
  Object.keys(meals).forEach(key => {
    const m = key.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (!m) return;
    const orig = new Date(BASE_START.getFullYear(), +m[1] - 1, +m[2]);
    const offset = v8DayDiff(orig, BASE_START);
    if (offset < 0) return;
    const nd = v8AddDays(s, offset);
    if (nd.getFullYear() !== s.getFullYear()) return;
    const plan = {};
    Object.keys(meals[key]).forEach(f => { if (!TEMPLATE_STRIP.includes(f)) plan[f] = meals[key][f]; });
    if (plan.note && /장염/.test(plan.note)) delete plan.note;
    const dbd = nd.getFullYear() + '-' + String(nd.getMonth() + 1).padStart(2, '0') + '-' + String(nd.getDate()).padStart(2, '0');
    rows.push({ user_id: userId, baby_id: babyId, date: dbd, plan });
  });
  return rows;
}
async function generateTemplatePlan(userId, babyId, startDate) {
  const rows = templateRows(userId, babyId, startDate);
  /* v18: 재료 선호도 로테이션 — 생성 시점에 위험도 기본캡(견과류·고위험 알러지군 등)을 적용해 배경 재료 치환.
     이 시점엔 아직 사용자가 직접 설정한 ingredient_preference가 없으므로 prefRows는 빈 배열 →
     RISK_WEEKLY_DEFAULT 시스템 기본값만 적용됨(딩굴이가 나중에 설정 화면에서 재료별로 override 가능) */
  const introRows = templateIntroStatusRows(userId, babyId, startDate);
  const { warnings } = applyIngredientPreferences(rows, introRows, []);
  if (warnings.length) console.error('[재료선호도 로테이션] 생성 시 대체 실패:', warnings);
  for (let i = 0; i < rows.length; i += 50) {
    const { error } = await sb.from('meal_plan').insert(rows.slice(i, i + 50));
    if (error) throw error;
  }
  for (let i = 0; i < introRows.length; i += 50) {
    const { error } = await sb.from('ingredient_intro_status').insert(introRows.slice(i, i + 50));
    if (error) console.error('ingredient_intro_status 생성 오류:', error); /* best-effort: 관찰기간 안내가 안 뜨는 것뿐, 식단 생성은 막지 않음 */
  }
  return rows.length;
}

/* ── 오너(찐아) 계정 판정: 내장 식단을 그대로 쓰는 유일한 계정 ── */
let IS_OWNER = false;
let acctEditMode = false;
let PARENT_ROLE = '엄마';
function isOwnerBaby(b) { return !!b && b.solid_start_date === '2026-05-09' && b.birth_date === '2025-11-14'; }

/* ── 템플릿 식단에서 재료명 유니크 추출 (기본 재고 생성용) ── */
function templateIngredientNames(rows) {
  const set = new Set();
  rows.forEach(r => {
    ['am', 'pm', 'lunch'].forEach(f => (r.plan[f] || []).forEach(raw => {
      let s = String(raw); if (s.startsWith('반복:')) s = s.slice(3);
      const m = s.match(/^(.*?)\s+(\d+\s*g|\d+\s*팩|\d+\s*개|소량|반복노출|반복)$/);
      const nm = (m ? m[1] : s).trim();
      if (nm) set.add(nm);
    }));
  });
  return [...set];
}

/* ── 신규 계정 기본 재고 생성: 식단 재료 전체를 0개로 등록 (차감·소진예고 연동) ── */
async function generateDefaultInventory(userId, babyId, startDate) {
  const names = templateIngredientNames(templateRows(userId, babyId, startDate));
  if (!names.length) return 0;
  const rows = names.map((name, i) => ({ user_id: userId, baby_id: babyId, name, amount: 0, unit: '개', low_alert: 1, sort_order: i, base_g: 15 }));
  for (let i = 0; i < rows.length; i += 50) {
    const { error } = await sb.from('inventory').insert(rows.slice(i, i + 50));
    if (error) { console.error('기본 재고 생성 오류:', error); return 0; }
  }
  return rows.length;
}

/* ── 자가치유: 신규 계정인데 식단/재고가 비어 있으면 다시 생성 ── */
async function selfHealNewAccount(b) {
  if (IS_OWNER) return;
  try {
    if (!usesDbPlan) {
      await generateTemplatePlan(USER_ID, BABY_ID, parseDbDateFull(b.solid_start_date));
      await loadMealPlan();
      await loadIntroStatus(); /* generateTemplatePlan에서 방금 생성된 관찰상태 반영 */
    }
    const { data } = await sb.from('inventory').select('id').eq('baby_id', BABY_ID).limit(1);
    if (!data || data.length === 0) await generateDefaultInventory(USER_ID, BABY_ID, parseDbDateFull(b.solid_start_date));
    /* v18: 기존 계정(v17 이전 가입)엔 ingredient_intro_status가 없을 수 있음 → 사각지대 보강 */
    if (!introStatus.length) {
      const { data: introData } = await sb.from('ingredient_intro_status').select('id').eq('baby_id', BABY_ID).limit(1);
      if (!introData || introData.length === 0) {
        const rows = templateIntroStatusRows(USER_ID, BABY_ID, parseDbDateFull(b.solid_start_date));
        for (let i = 0; i < rows.length; i += 50) {
          const { error } = await sb.from('ingredient_intro_status').insert(rows.slice(i, i + 50));
          if (error) { console.error('ingredient_intro_status 보강 오류:', error); break; }
        }
        await loadIntroStatus();
      }
    }
  } catch (e) { console.error('자가치유 오류:', e); }
}

/* ── 계정 정보 저장 (더보기 > 계정 정보 수정) ── */
async function saveAccount() {
  const name = document.getElementById('acct-name')?.value?.trim();
  if (!name) { alert('아기 이름을 입력해주세요.'); return; }
  const role = readRole('acct-role');
  const newStart = IS_OWNER ? null : readDateSel('ac-start');
  const curStart = toDbDateFull(START);
  try {
    const upd = { name, parent_role: role };
    const startChanged = newStart && newStart !== curStart;
    if (startChanged) {
      if (!(parseDbDateFull(newStart) > BIRTH)) { alert('이유식 시작일이 생년월일보다 빨라요.'); return; }
      if (!confirm('식단 전체를 새 시작일 기준으로 다시 만들까요?\n섭취 기록은 유지되지만, 직접 수정한 식단 내용은 초기화돼요.')) return;
      upd.solid_start_date = newStart;
    }
    const { error } = await sb.from('babies').update(upd).eq('id', BABY_ID);
    if (error) throw error;
    if (startChanged) {
      const { error: dErr } = await sb.from('meal_plan').delete().eq('baby_id', BABY_ID);
      if (dErr) throw dErr;
      await generateTemplatePlan(USER_ID, BABY_ID, parseDbDateFull(newStart));
      location.reload();
      return;
    }
    BABY_NAME = name;
    PARENT_ROLE = role;
    acctEditMode = false;
    renderMore();
  } catch (e) { console.error('계정 저장 오류:', e); alert('저장에 실패했어요: ' + (e.message || e)); }
}
function toDbDateFull(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

/* v18: 오너 컷오버 — 이 날짜부터는 오너도 meal_plan DB 생성값을 사용(완전 자동 재생성 확정, 2026-07-12 결정) */
const OWNER_ROTATION_CUTOVER = '2026-07-20';

/* ── 사용자 식단 로드: meal_plan 행이 있으면 내장 meals를 통째로 교체 ──
   v18: 오너 계정은 전체 교체가 아니라 "병합"으로 동작 변경 —
   컷오버(7/20) 이전 과거 하드코딩 기록은 그대로 두고, DB에 있는 날짜(컷오버 이후 자동생성분)만 덮어씀.
   일반 신규계정은 기존 동작(전체 교체) 그대로 유지 — 리스크 최소화. */
async function loadMealPlan() {
  usesDbPlan = false;
  try {
    const { data, error } = await sb.from('meal_plan').select('date, plan').eq('baby_id', BABY_ID);
    if (error) { console.error('meal_plan 오류:', error); return; }
    if (!data || data.length === 0) return; /* 오너 계정(컷오버 전): 내장 식단 유지 */
    if (IS_OWNER) {
      /* 병합: 기존 키(5/9~7/19 등)는 그대로, DB에 있는 날짜만 덮어씀 */
      data.forEach(r => {
        const key = fromDbDate(r.date);
        if (r.plan && typeof r.plan === 'object') meals[key] = r.plan;
      });
    } else {
      Object.keys(meals).forEach(k => delete meals[k]);
      data.forEach(r => {
        const key = fromDbDate(r.date);
        if (r.plan && typeof r.plan === 'object') meals[key] = r.plan;
      });
    }
    usesDbPlan = true;
  } catch (e) { console.error('meal_plan 연결 오류:', e); }
}

/* v18: 재료 도입/관찰 상태 로드 (baby_id 스코프, 없으면 빈 배열 유지) */
async function loadIntroStatus() {
  try {
    const { data, error } = await sb.from('ingredient_intro_status').select('ingredient_name, first_intro_date, observe_days').eq('baby_id', BABY_ID);
    if (error) { console.error('ingredient_intro_status 오류:', error); introStatus = []; return; }
    introStatus = data || [];
  } catch (e) { console.error('ingredient_intro_status 연결 오류:', e); introStatus = []; }
}
/* v18: 재료 선호도 설정 로드 (baby_id 스코프) */
async function loadIngredientPrefs() {
  try {
    const { data, error } = await sb.from('ingredient_preference').select('id, ingredient_name, mode, weekly_max').eq('baby_id', BABY_ID);
    if (error) { console.error('ingredient_preference 오류:', error); ingredientPrefs = []; return; }
    ingredientPrefs = data || [];
  } catch (e) { console.error('ingredient_preference 연결 오류:', e); ingredientPrefs = []; }
}

/* ── v11 수정: 세션이 살아있는데도 일시 오류로 로그인화면에 튕기던 문제 ──
   기존 버그: 프로필(babies)/식단 로드 중 네트워크 지연 등 일시 오류만 나도
   무조건 showAuth('login')을 호출 → 세션 토큰은 멀쩡히 남아있는데
   "로그인이 풀린 것"처럼 보였음 (자동 로그인 안 되는 문제의 실제 원인).
   수정: 세션 자체가 없을 때만 로그인 화면 표시, 프로필 로드 실패는
   "다시 시도"로 세션 유지한 채 재시도 가능하게 분리. */
let _lastSession = null; /* 재시도 시 재사용 */

function showGateRetry(msg) {
  showGate();
  gateEl().innerHTML = `
    <div class="wordmark gate-wordmark">Cubit</div>
    <div class="gate-sub" style="margin-top:8px;">${esc(msg)}</div>
    <button class="gate-btn" onclick="retryEnterApp()">다시 시도</button>
    <div class="gate-switch" style="margin-top:14px;"><b onclick="forceLogoutToLogin()">로그아웃하고 다시 로그인</b></div>`;
}
async function retryEnterApp() { await enterApp(_lastSession); }
async function forceLogoutToLogin() {
  try { await sb.auth.signOut(); } catch (e) { console.error('로그아웃 오류:', e); }
  location.reload();
}

/* ── 로그인 완료 → 프로필 로드 → 앱 시작 ── */
async function enterApp(session) {
  if (!session) {
    try { const r = await sb.auth.getSession(); session = r.data.session; }
    catch (e) { console.error('세션 확인 오류:', e); showGateRetry('연결에 문제가 있어요. 다시 시도해주세요.'); return; }
  }
  if (!session) { showAuth('login'); return; } /* 세션 자체가 없음 = 실제 로그아웃 상태 */
  _lastSession = session;
  USER_ID = session.user.id;
  AUTH_EMAIL = session.user.email || '';
  try {
    const { data: babies, error } = await sb.from('babies').select('*')
      .eq('user_id', USER_ID).order('created_at', { ascending: true }).limit(1);
    if (error) throw error;
    if (!babies || babies.length === 0) { showOnboard(); return; }
    const b = babies[0];
    BABY_ID = b.id;
    BABY_NAME = b.name || '아기';
    IS_OWNER = isOwnerBaby(b);
    PARENT_ROLE = b.parent_role || '엄마';
    rebaseDates(parseDbDateFull(b.solid_start_date), parseDbDateFull(b.birth_date));
    await loadMealPlan();
    await loadIntroStatus();
    await loadIngredientPrefs();
    await selfHealNewAccount(b);
    recomputeMonthBounds();
    document.title = 'Cubit — ' + BABY_NAME;
    hideGate();
    await startApp();
  } catch (e) {
    /* 세션은 유효하므로 로그인 화면이 아니라 재시도 화면으로 (v11) */
    console.error('프로필 로드 오류:', e);
    showGateRetry('정보를 불러오지 못했어요. 네트워크를 확인하고 다시 시도해주세요.');
  }
}

/* ── 부팅: 세션 확인 → 게이트 or 앱 ── */
async function init() {
  document.body.classList.add('gated');
  showGate();
  gateEl().innerHTML = `<div class="wordmark gate-wordmark">Cubit</div><div class="gate-sub" style="margin-top:8px;">불러오는 중...</div>`;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showAuth('login'); return; }
    await enterApp(session);
  } catch (e) {
    console.error('부팅 오류:', e);
    showGateRetry('연결에 문제가 있어요. 다시 시도해주세요.');
  }
}
/* SIGNED_OUT은 명시적 로그아웃(forceLogoutToLogin) 시에만 발생 → 새로고침해 게이트로 복귀 */
sb.auth.onAuthStateChange((event) => { if (event === 'SIGNED_OUT') location.reload(); });

/* v19: 자정 자동 갱신 — 이전엔 TODAY를 부팅 시 한 번만 계산해서, 탭을 새로고침 없이
   자정 넘겨 켜두면 "오늘"이 어제로 고정된 채 남아있었음(어제 실제로 발생 — 어제 식단을
   오늘 먹이는 사고). 화면이 다시 보일 때 + 포커스 복귀 시 + 1분마다 날짜가 바뀌었는지
   확인해서, 바뀌었으면 TODAY를 갱신하고 화면을 다시 그린다. 로그인 전(게이트 화면)에는
   아직 렌더할 화면 자체가 없으므로 건드리지 않는다. */
function checkDateRollover() {
  if (document.body.classList.contains('gated')) return; /* 로그인 전이면 스킵 */
  const now = new Date();
  if (now.toDateString() !== TODAY.toDateString()) {
    TODAY = now;
    recomputeMonthBounds();
    rerender();
  }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkDateRollover(); });
window.addEventListener('focus', checkDateRollover);
setInterval(checkDateRollover, 60000);

init();
</script>
