<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data:;">
<title>Cubit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ===== 폰트 ===== */
/* Pretendard */
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2'); font-weight:800; font-display:swap; }
/* Paperlogy (Freesentation 공식 저장소) */
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-5Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-6SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-7Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-8ExtraBold.woff2') format('woff2'); font-weight:800; font-display:swap; }
@font-face { font-family:'Paperlogy'; src:url('https://cdn.jsdelivr.net/gh/Freesentation/paperlogy@main/woff2/Paperlogy-9Black.woff2') format('woff2'); font-weight:900; font-display:swap; }

/* ===== 컬러 변수 ===== */
:root {
  --coral: #F97070;          /* 메인 액션 */
  --coral-deep: #E04545;     /* 경고/부족 (코랄 동일계열, 진하게) */
  --coral-grad: linear-gradient(135deg,#F97070 0%,#FF9A5C 100%); /* 중요 액션 버튼 */
  --orange: #ff7a4d;
  --sky: #29aaee;
  --gray: #888;
  --bg: #f6f4f1;
  --text: #2b2422;
  --text-sub: #9a938f;
  --border: #ece8e4;
  --card: #ffffff;
}

/* ===== 기본 리셋 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; max-width: 480px; margin: 0 auto; }
button { font-family: 'Pretendard', sans-serif; cursor: pointer; }
textarea, input { font-family: 'Pretendard', sans-serif; }

/* ===== 헤더 ===== */
.header { background: #f0ede9; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
.header-top { padding: 16px 18px 4px; }
.title { font-family:'Paperlogy',sans-serif; font-size: 22px; font-weight: 800; color: #1f1a18; letter-spacing: -0.3px; }
.sub { font-size: 12px; color: #8a827d; margin-top: 5px; }

/* 월 네비게이션 + Today 버튼 */
.month-nav { display: flex; align-items: center; gap: 16px; padding: 10px 18px 4px; }
.month-nav .nav-arrow { background: transparent; border: none; padding: 2px 4px; font-size: 17px; color: #5a534e; }
.month-nav span#month-lbl { font-family:'Paperlogy',sans-serif; font-size: 15px; font-weight: 700; color: #1f1a18; }
.month-nav-right { margin-left: auto; }
.today-btn { background: var(--coral); border: none; padding: 7px 18px; font-size: 12px; font-weight: 700; color: #fff; border-radius: 20px; box-shadow: 0 2px 8px rgba(249,112,112,0.35); }

/* ===== 날짜 스트립 ===== */
.strip-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 8px 14px 14px; scrollbar-width: none; }
.strip-wrap::-webkit-scrollbar { display: none; }
.strip { display: flex; gap: 4px; width: max-content; }
.day-item { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; transition: background 0.15s; }
.day-item .dn { font-family:'Paperlogy',sans-serif; font-size: 15px; font-weight: 600; color: #9a938f; line-height: 1; }
.day-item.done-day .dn { color: #cfc9c4; }
.day-item.today { border: 1.5px solid var(--coral); }
.day-item.today .dn { color: var(--coral); font-weight: 800; }
.day-item.selected { background: #1f1a18; }
.day-item.selected .dn { color: #fff; }
.day-item.selected.done-day .dn { color: #fff; }
.day-item.selected.today { background: var(--coral); border: none; }
.day-item.selected.today .dn { color: #fff; font-weight: 800; }

/* ===== 뷰 전환 ===== */
#cal-view { display: none; padding-bottom: 64px; min-height: 100vh; min-height: 100dvh; background:#fff; }

/* ===== 날짜 헤더 (D-day) ===== */
.day-hd { padding: 20px 18px 6px; }
.dday-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.dday { font-family:'Paperlogy',sans-serif; font-size: 34px; font-weight: 800; line-height: 1; color: #1f1a18; letter-spacing: -1px; }
.dday-date { font-family:'Paperlogy',sans-serif; font-size: 14px; color: #6e6661; font-weight: 500; }
.dday-mid { color:var(--coral-deep); font-weight: 700; }

/* 오늘 식단 / 지난 식단 타이틀 */
.sec-title { font-family:'Paperlogy',sans-serif; display:flex; align-items:center; gap:8px; padding: 14px 18px 6px; font-size: 16px; font-weight: 600; color:#1f1a18; }
.sec-title .accent { color: var(--coral); }
.stock-warn { margin-left:auto; font-size: 11px; font-weight: 600; color: var(--coral-deep); white-space: nowrap; }
.deadline-warn { margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size: 11px; font-weight: 700; color: #1f1a18; white-space: nowrap; }
.deadline-warn .dw-icon { font-size: 12px; }

/* ===== 중기 전환 배너 ===== */
.mid-banner { margin: 6px 16px 0; background: var(--coral-grad); padding: 14px 16px; border-radius: 16px; }
.mid-banner-title { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.mid-banner-sub { font-size: 11px; color: rgba(255,255,255,0.88); line-height: 1.5; }

/* ===== 식단 카드 (아침/저녁) ===== */
.meal-card { margin: 8px 16px 0; background: var(--card); border-radius: 18px; padding: 18px 18px 16px; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.meal-card.evening { background: var(--card); box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.meal-card.dimmed { background:#fdf8f6; box-shadow:0 2px 10px rgba(60,45,40,0.04); }
.meal-card.dimmed .meal-lbl { color:#a89f99; }
.meal-card-head { display:flex; align-items:center; gap:8px; margin-bottom: 14px; flex-wrap: wrap; }
.meal-lbl { font-size: 13px; font-weight: 700; color: #6e6661; }
.day-badge { display:inline-block; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; }
.db-new   { background:var(--coral); color:#fff; }
.db-trans { background:#1f1a18; color:#fff; }
.db-grain { background:#b6aea8; color:#fff; }

.meal-rows { display:flex; flex-direction:column; gap: 14px; }
.meal-row { display:flex; align-items:center; gap: 13px; }
.ic-tile { width:38px; height:38px; border-radius:11px; background:#f4f1ed; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.ic-tile img { width:28px; height:28px; object-fit:contain; }
.ic-tile .emoji { font-size:18px; }
.mr-name { font-size:15px; font-weight:700; color:#1f1a18; flex:1; }
.mr-name.repeat { color:var(--coral); }
.mr-amt { font-size:13px; color:#9a938f; margin-right:14px; font-weight:500; }
.mr-cube { font-size:13px; font-weight:700; color:var(--orange); white-space:nowrap; min-width:42px; text-align:right; }
.mr-cube .num { font-weight:800; }
.meal-note { margin-top:14px; padding-top:12px; border-top:1px dashed #e6e1dc; font-size:12px; color:#b06a4a; line-height:1.5; }

/* ===== 섭취 메모 / 완료 ===== */
.memo-block { margin-top: 16px; }
.memo-input-lbl { font-size: 12px; font-weight: 700; color: #6e6661; margin-bottom: 8px; }
.memo-input-lbl span { color:#b3aca7; font-weight:500; font-size:11px; }
.memo-input { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 16px; resize: none; outline: none; color: #2b2422; background:#faf8f6; }
.memo-input:focus { border-color: var(--coral); }
.check-btn { width: 100%; margin-top: 14px; padding: 15px; background: var(--coral-grad); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; box-shadow:0 6px 16px rgba(249,112,112,0.32); }

/* 완료 기록 */
.memo-done { margin-top:16px; }
.memo-done-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.memo-done-lbl { font-size:12px; font-weight:700; color:#6e6661; }
.memo-edit-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:11px; color:#9a938f; }
.memo-txt { font-size:12px; color:#3a3330; line-height:1.6; background:#faf6f4; border-radius:10px; padding:10px 12px; }
.memo-edit-wrap { margin-top:10px; display:none; }
.memo-save-btn { margin-top:8px; width:100%; padding:11px; background:#9a938f; color:#fff; border:none; border-radius:10px; font-size:12px; font-weight:700; }

/* ===== 아침 건너뜀 / 저녁 잠금 ===== */
.skip-badge { background:#c4bfbb; color:#fff; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; }
/* 아침 카드 내 보조 버튼 (섭취완료 아래) */
.skip-am-btn { margin-top:10px; width:100%; padding:10px; background:none; border:none; font-size:12px; font-weight:600; color:#6e6661; text-align:center; }
.skip-am-btn:active { opacity:0.6; }
.undo-skip-btn { margin-top:10px; width:100%; padding:10px; background:none; border:none; font-size:12px; font-weight:600; color:#6e6661; }
.shift-day-wrap { margin:8px 16px 0; background:var(--card); border-radius:18px; padding:4px; box-shadow:0 4px 18px rgba(60,45,40,0.06); }
.shift-day-btn { display:flex; align-items:center; gap:8px; width:100%; padding:13px 14px; background:transparent; border:none; border-radius:15px; font-family:'Pretendard',sans-serif; font-size:12.5px; font-weight:600; color:var(--text-sub); text-align:left; }
.shift-day-btn:active { background:#fdf5f3; }
.shift-day-btn .sdb-ic { flex:none; width:26px; height:26px; border-radius:50%; background:#fdf1ee; color:var(--coral-deep); display:flex; align-items:center; justify-content:center; font-size:13px; }
.shift-day-btn .sdb-txt { flex:1; }
.shift-day-btn .sdb-txt b { color:var(--text); font-weight:700; }
.meal-card.am-skipped { opacity:0.5; }
/* 저녁 잠금 래퍼 */
.evening-wrap { margin: 8px 16px 0; }
.pm-locked-card { background:var(--card); border-radius:18px; padding:18px 18px 16px; opacity:0.35; box-shadow:0 4px 18px rgba(60,45,40,0.06); pointer-events:none; }
.pm-locked-card .meal-card-head { margin-bottom:10px; }
/* 저녁 활성 카드 완료 버튼 — 아침과 동일 */
.check-btn.pm-btn { background: var(--coral-grad); box-shadow:0 6px 16px rgba(249,112,112,0.32); }
/* 저녁 완료 배지 */
.pm-done-badge { background:#fef1f1; color:var(--coral); font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
.pm-done-lbl { font-size:12px; font-weight:700; color:var(--coral); }
.done-badge { background:#fef1f1; color:var(--coral); font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; margin-left:auto; }

.empty-card { margin: 10px 16px; background:#fff; border-radius:16px; text-align: center; color: #bbb; padding: 32px 0; font-size: 13px; }

/* ===== 새 식재료 카드 ===== */
.new-card { margin: 8px 16px 0; background: var(--card); border-radius: 18px; padding: 18px; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.new-lbl { font-family:'Paperlogy',sans-serif; font-size: 13px; font-weight: 600; color: var(--coral); margin-bottom: 10px; }
.new-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.new-chip { background: var(--coral); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }

/* ===== 오늘 할 일 (재고 부족/임박) ===== */
.todo-card { margin: 8px 16px 0; background: var(--card); border-radius: 18px; padding: 16px 18px; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.todo-lbl { font-family:'Paperlogy',sans-serif; font-size: 14px; font-weight: 600; color:#1f1a18; margin-bottom: 8px; }
.todo-row { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.todo-row:last-child { border-bottom:none; }
.todo-row:active { opacity:0.6; }
.todo-dot { width:7px; height:7px; border-radius:50%; background:var(--coral-deep); flex-shrink:0; }
.todo-name { flex:1; font-size:14px; font-weight:600; color:var(--coral-deep); }
.todo-action { font-size:12px; font-weight:700; color:#9a938f; white-space:nowrap; }
.todo-empty { font-size:13px; color:#9a938f; padding:4px 0 2px; }

/* 마감 임박(D-2 이하) 행 — 배경 없음, 텍스트 블랙, D-day 칩만 코랄 강조 */
.todo-row.imminent .todo-dot { background:#1f1a18; }
.todo-row.imminent .todo-name { color:#1f1a18; }
.todo-row.imminent .todo-dday { color:var(--coral-deep) !important; font-weight:700; }

/* ===== 아코디언 (카드 형태) ===== */
.acc { margin: 8px 16px 0; background: var(--card); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 18px rgba(60,45,40,0.06); }
.acc-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 18px; user-select: none; cursor: pointer; }
.acc-title { font-family:'Paperlogy',sans-serif; font-size: 14px; font-weight: 600; color: #1f1a18; }
.acc-arrow { font-size: 12px; color: #9a938f; font-weight: 700; transition: transform 0.2s; }
.acc.open .acc-arrow { transform: rotate(180deg); }
.acc-body { display: none; padding: 0 18px 16px; border-top: 1px solid var(--border); }
.acc.open .acc-body { display: block; }

/* ===== 재고/장보기 ===== */
.stock-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: #2b2422; }
.stock-row:last-of-type { border-bottom: none; }
.stock-name { flex: 1; }
.stock-val { font-weight: 700; }
.stock-low { color: var(--coral-deep) !important; }
.stock-edit-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
.stock-edit-row:last-of-type { border-bottom: none; }
.stock-input { width: 64px; border: 1px solid var(--border); border-radius: 6px; padding: 5px 6px; font-size: 16px; text-align: center; outline: none; }
.stock-input:focus { border-color: var(--sky); }
.stock-unit { font-size: 11px; color: var(--text-sub); }
.stock-edit-btn { width: 100%; margin-top: 10px; padding: 10px; background: #f5f2ef; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: #6e6661; }
.stock-save-all-btn { width: 100%; margin-top: 10px; padding: 10px; background: var(--coral-grad); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; }
.stock-cancel-btn { width: 100%; margin-top: 6px; padding: 9px; background: #f5f2ef; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--gray); }
.add-divider { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.add-stock-btn { width: 100%; padding: 10px; background: #f5f2ef; border: 1px dashed var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--gray); }
.add-form { margin-top: 10px; padding: 12px; background: #faf8f6; border-radius: 8px; border: 1px solid var(--border); }
.add-form input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 16px; margin-bottom: 6px; outline: none; }
.add-form input:focus { border-color: var(--coral); }
.add-form-row { display: flex; gap: 6px; margin-bottom: 6px; }
.add-form-row input { margin-bottom: 0; flex: 1; }
.add-confirm-btn { width: 100%; padding: 10px; background: var(--coral-grad); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; }
.shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding: 4px 0 16px; }
.shop-chip { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--border); border-radius:12px; padding:11px 13px; font-size:13px; color:#2b2422; font-weight:500; min-width:0; }
.shop-chip-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.shop-chip-x { background:none; border:none; font-size:15px; color:#cfc9c4; padding:0 0 0 6px; flex-shrink:0; line-height:1; }
.shop-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.shop-row:last-of-type { border-bottom: none; }
.shop-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--coral); flex-shrink: 0; }
/* 재고 편집행 정렬 */
.stock-edit-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; gap:0; }
.stock-edit-row:last-of-type { border-bottom:none; }
.stock-edit-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.stock-order-btns { display:flex; flex-direction:column; gap:2px; margin-right:8px; }
.stock-order-btn { background:#f5f2ef; border:1px solid var(--border); border-radius:5px; padding:2px 7px; font-size:10px; color:#777; line-height:1.4; cursor:pointer; }
.stock-order-btn:disabled { opacity:0.3; cursor:default; }
.stock-edit-x { background:none; border:none; font-size:16px; color:#cfc9c4; padding:0 0 0 8px; cursor:pointer; flex-shrink:0; line-height:1; }
.notice-list li { font-size: 13px; color: #4a433f; line-height: 1.4; list-style: none; padding: 10px 0; border-bottom: 1px solid var(--border); }
.notice-list li:last-child { border-bottom: none; }

/* ===== 인라인 편집 ===== */
.edit-row { display:flex; align-items:center; gap:10px; }
.edit-amt-field { display:flex; align-items:center; gap:4px; background:#faf8f6; border:1px solid var(--border); border-radius:8px; padding:6px 8px; width:76px; flex-shrink:0; }
.edit-amt-field input { flex:1; min-width:0; border:none; outline:none; font-size:16px; font-weight:700; color:#2b2422; width:100%; text-align:right; background:transparent; font-family:'Pretendard',sans-serif; }
.edit-amt-field input::-webkit-outer-spin-button, .edit-amt-field input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.edit-amt-field input[type=number] { -moz-appearance:textfield; }
.edit-amt-field:focus-within { border-color:var(--coral); }
.edit-amt-field.readonly-amt input { text-align:center; color:var(--text-sub); font-weight:600; }
.edit-amt-field .ec-unit { font-size:13px; color:var(--text-sub); font-weight:600; flex-shrink:0; }
.edit-del-btn { background:none; border:none; font-size:16px; color:#cfc9c4; padding:0 2px; flex-shrink:0; }
.edit-add-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
.edit-add-name { flex:1; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:16px; outline:none; font-family:'Pretendard',sans-serif; background:#faf8f6; min-width:0; }
.edit-add-amt-field { display:flex; align-items:center; gap:2px; background:#faf8f6; border:1px solid var(--border); border-radius:8px; padding:8px 8px; flex-shrink:0; }
.edit-add-amt-field input { width:44px; border:none; outline:none; font-size:16px; font-weight:700; color:#2b2422; text-align:right; background:transparent; font-family:'Pretendard',sans-serif; }
.edit-add-amt-field input::-webkit-outer-spin-button, .edit-add-amt-field input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.edit-add-unit { border:none; outline:none; background:transparent; font-size:13px; color:var(--text-sub); font-weight:600; }
.edit-add-name:focus, .edit-add-amt-field:focus-within { border-color:var(--coral); }
.edit-actions { display:flex; gap:8px; margin-top:12px; }
.edit-save-btn { flex:1; padding:10px; background:var(--coral-grad); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:700; font-family:'Pretendard',sans-serif; }
.edit-cancel-btn { flex:1; padding:10px; background:#f5f2ef; color:#6e6661; border:none; border-radius:10px; font-size:13px; font-weight:600; font-family:'Pretendard',sans-serif; }
/* 카드 헤더 편집 버튼 */
.card-edit-btn { margin-left:auto; background:none; border:none; font-size:12px; font-weight:600; color:#9a938f; padding:0; letter-spacing:0; }

/* ===== 식단 날짜 교환 ===== */
.card-actions { margin-left:auto; display:flex; align-items:center; gap:14px; }
.card-swap-btn { background:none; border:none; font-size:12px; font-weight:600; color:var(--coral); padding:0; letter-spacing:0; }
.swap-panel { margin:8px 16px 0; background:var(--card); border-radius:18px; padding:18px; box-shadow:0 4px 18px rgba(60,45,40,0.06); }
.swap-panel-title { font-size:13px; font-weight:700; color:var(--coral); margin-bottom:3px; }
.swap-panel-sub { font-size:11.5px; color:#9a938f; margin-bottom:12px; line-height:1.4; }
.swap-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
.swap-chip { flex-shrink:0; min-width:62px; max-width:96px; border:1px solid var(--border); border-radius:12px; padding:9px 10px; background:#faf8f6; text-align:center; cursor:pointer; transition:border-color .12s, background .12s; }
.swap-chip .sc-date { font-family:'Paperlogy',sans-serif; font-size:13px; font-weight:700; color:#1f1a18; }
.swap-chip .sc-name { font-size:10.5px; color:#9a938f; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.swap-chip.sel { border-color:var(--coral); background:#fff1f1; }
.swap-chip.sel .sc-name { color:var(--coral); }
.swap-confirm-row { display:flex; gap:8px; align-items:center; margin-top:14px; }
.swap-confirm-lbl { flex:1; font-size:13px; font-weight:700; color:#1f1a18; }
.swap-do-btn { padding:9px 16px; background:var(--coral-grad); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:700; font-family:'Pretendard',sans-serif; }
.swap-cancel-btn { padding:9px 14px; background:#f5f2ef; color:#6e6661; border:none; border-radius:10px; font-size:13px; font-weight:600; font-family:'Pretendard',sans-serif; }
.swap-empty { font-size:12px; color:#9a938f; padding:4px 0; }
.merged-div { height:1px; background:var(--border); margin:16px 0; }
.merged-subhead { display:flex; align-items:center; gap:8px; margin:0 0 14px; }
.sc-warn { font-size:10px; margin-left:3px; }
.day-item { position:relative; }
.swap-dot { position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--coral); }
.rcal-cell .swap-dot { bottom:2px; }

/* ===== 하단 탭 ===== */
.bottom-tabs { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; display: flex; z-index: 300; border-top:1px solid var(--border); }
.btab { font-family:'Paperlogy',sans-serif; flex: 1; background: none; border: none; color: #b3aca7; font-size: 12px; font-weight: 700; padding: 14px 4px 16px; transition: color 0.2s; border-top:2px solid transparent; }
.btab.active { color: #1f1a18; border-top: 2px solid #1f1a18; }

/* =====================================================
   ===== 월간 달력 (제공된 플래너 디자인, .mcal 스코프) =====
   ===================================================== */
.mcal { font-family: 'Paperlogy', sans-serif; color: #3B3333; padding: 24px 18px 20px; }
.mcal .month-top { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.mcal .month-title { font-size: 28px; font-weight: 700; color: #000; line-height: 1.15; }
.mcal .checklist-box { border: 1px solid #CACACA; border-radius: 8px; padding: 12px 16px; }
.mcal .checklist-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
.mcal .checklist-title { font-size: 11px; font-weight: 700; color: #F97070; letter-spacing: 0.2px; }
.mcal .checklist-at { font-size: 9px; color: #b8b0aa; font-weight: 600; }
.mcal .checklist-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 5px 10px; margin-bottom: 12px; }
.mcal .checklist-item { display: flex; align-items: flex-start; gap: 5px; cursor: pointer; user-select: none; }
.mcal .checklist-item input[type="checkbox"] { appearance:none; -webkit-appearance:none; width:13px; height:13px; min-width:13px; border:1px solid #CACACA; border-radius:3px; flex-shrink:0; cursor:pointer; position:relative; margin-top:1px; }
.mcal .checklist-item input[type="checkbox"]:checked { background:#F97070; border-color:#F97070; }
.mcal .checklist-item input[type="checkbox"]:checked::after { content:''; position:absolute; left:3px; top:0px; width:4px; height:8px; border:1.5px solid #fff; border-top:none; border-left:none; transform:rotate(45deg); }
.mcal .checklist-item label { font-size:10.5px; color:#3B3333; cursor:pointer; line-height:1.35; }
.mcal .checklist-item.checked label { text-decoration:line-through; color:#CACACA; }
.mcal .repeat-memo { border-top:1px solid #F0ECEA; padding-top:10px; margin-top:2px; }
.mcal .repeat-memo-title { font-size:10px; font-weight:700; color:#F97070; margin-bottom:6px; }
.mcal .repeat-memo-grid { display:grid; grid-template-columns:1fr; gap:4px; }
.mcal .repeat-memo-item { font-size:10px; color:#9D9D9D; line-height:1.4; }
.mcal .repeat-memo-item strong { color:#3B3333; font-weight:600; }
.mcal .weekdays { display:grid; grid-template-columns:repeat(7,1fr); border:1px solid #CACACA; border-bottom:none; background:#F1F1F1; }
.mcal .wd { text-align:center; padding:8px 0; font-size:13px; font-weight:500; color:#3B3333; }
.mcal .days-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); border-left:1px solid #CACACA; border-top:1px solid #CACACA; }
.mcal .dc { min-height:118px; padding:6px 5px 6px; border-right:1px solid #CACACA; border-bottom:1px solid #CACACA; background:#fff; }
.mcal .dc.empty { background:transparent; }
.mcal .month-section { margin-bottom:40px; }
.mcal .day-row { display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-bottom:5px; }
.mcal .dn { font-size:14px; font-weight:700; line-height:1; color:#3B3333; }
.mcal .dc.today .dn { color:#F97070; }
.mcal .dc.done .dn { color:#BBBBBB; }
.mcal .meal-day-count { font-size:8px; color:#CACACA; font-weight:400; white-space:nowrap; }
.mcal .badge { display:inline-block; font-size:9px; font-weight:500; padding:2px 7px; border-radius:20px; line-height:1.4; white-space:nowrap; }
.mcal .b-new { background:#F97070; color:#fff; }
.mcal .b-trans { background:#000; color:#fff; }
.mcal .b-grain { background:#BBBBBB; color:#fff; }
.mcal .time-badge { display:inline-block; font-size:8px; font-weight:500; padding:1px 5px; border-radius:20px; line-height:1.4; white-space:nowrap; background:transparent; color:#9D9D9D; border:0.5px solid #C7C2BF; }
.mcal .meal-block { margin-bottom:3px; }
.mcal .meal-header { margin-bottom:2px; }
.mcal .meal-sep { border:none; border-top:1px solid #E8E0DC; margin:4px 0; }
.mcal .meal-items { display:flex; flex-direction:column; gap:1px; }
.mcal .meal-item { font-size:9.5px; font-weight:400; color:#3B3333; line-height:1.45; }
.mcal .meal-item.repeat { color:#F97070; }
.mcal .dc.done .meal-item { color:#BBBBBB; text-decoration:line-through; }
.mcal .print-btn-wrap { padding: 4px 0 12px; }
.mcal .print-btn { width:100%; background:#1f1a18; color:#fff; border:none; padding:13px; font-size:13px; font-weight:700; border-radius:10px; }
.mcal .img-btn { width:100%; background:var(--coral-grad); color:#fff; border:none; padding:13px; font-size:13px; font-weight:700; border-radius:10px; margin-top:8px; }
.mcal .img-btn:disabled { opacity:0.6; }

@media print {
  body { max-width: none; background: #fff; }
  .bottom-tabs, .mcal .print-btn-wrap, .header { display: none !important; }
  #cal-view .header { display:none; }
}

/* =====================================================
   ===== v3 추가 — 5탭 구조 / 홈·재고·기록·더보기 =====
   ===================================================== */
#home-view, #stock-view, #record-view, #more-view, #meal-view {
  display:none; padding-bottom:64px; min-height:100vh; min-height:100dvh;
}
#cal-view .header-top { display:flex; align-items:center; gap:10px; }

/* 인사 영역 */
.greet { display:flex; align-items:center; padding:20px 18px 4px; }
.greet-txt { font-family:'Paperlogy',sans-serif; font-size:20px; font-weight:700; color:#1f1a18; letter-spacing:-0.3px; }

/* 공통 탭 헤더 / 패널 */
.tab-hd { padding:20px 18px 2px; }
.tab-title { font-family:'Paperlogy',sans-serif; font-size:24px; font-weight:800; color:#1f1a18; letter-spacing:-0.5px; }
.panel { margin:10px 16px 0; background:var(--card); border-radius:18px; padding:16px 18px; box-shadow:0 4px 18px rgba(60,45,40,0.06); }
.panel-title { font-family:'Paperlogy',sans-serif; font-size:14px; font-weight:600; color:#1f1a18; margin-bottom:10px; }
.panel-title-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.panel-title-row .panel-title { margin-bottom:0; }

/* 재고 요약 배지 (충분/임박/부족) */
.sum-badges { display:flex; gap:8px; }
.sum-badge { flex:1; text-align:center; font-size:12px; font-weight:700; padding:11px 4px; border-radius:12px; line-height:1.2; }
.sum-badge.full { background:#eef6ee; color:#4a8a4a; }
.sum-badge.soon { background:#fff3ea; color:#c97a3a; }
.sum-badge.out  { background:#fdecec; color:var(--coral-deep); }
.stock-summary-wrap { margin:12px 16px 0; }

/* 홈 — 재고 요약 / 최근 기록 카드 */
.home-summary, .home-recent { margin:10px 16px 0; background:var(--card); border-radius:18px; padding:16px 18px; box-shadow:0 4px 18px rgba(60,45,40,0.06); cursor:pointer; }
.home-summary:active, .home-recent:active { opacity:0.7; }
.home-sub-lbl { font-family:'Paperlogy',sans-serif; font-size:14px; font-weight:600; color:#1f1a18; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.home-sub-lbl .more-arrow { font-size:13px; color:#cfc9c4; font-weight:700; }
.home-rec-row { display:flex; gap:10px; align-items:center; padding:8px 0; font-size:13px; border-bottom:1px solid var(--border); }
.home-rec-row:last-child { border-bottom:none; }
.home-rec-date { font-weight:700; color:#6e6661; width:46px; flex-shrink:0; }
.home-rec-slot { color:var(--coral); font-weight:700; width:36px; flex-shrink:0; }
.home-rec-memo { color:#3a3330; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* 오늘 할 일 — D-day */
.todo-dday { font-size:11px; font-weight:700; margin-right:10px; white-space:nowrap; color:var(--text-sub); }
.todo-dday.dd-soon   { color:var(--coral); }
.todo-dday.dd-urgent { color:var(--coral-deep); }

/* 재고 상태 배지 */
.st-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-right:8px; flex-shrink:0; }
.st-badge.st-full { background:#eef6ee; color:#4a8a4a; }
.st-badge.st-soon { background:#fff3ea; color:#c97a3a; }
.st-badge.st-out  { background:#fdecec; color:var(--coral-deep); }

/* 장볼 재료 리스트 (D-day 포함) */
.shop-list { display:flex; flex-direction:column; }
.shop-line { display:flex; align-items:center; gap:8px; padding:11px 0; border-bottom:1px solid var(--border); font-size:13px; }
.shop-line:last-child { border-bottom:none; }
.shop-line-name { flex:1; font-weight:500; color:#2b2422; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.shop-dday { font-size:11px; font-weight:700; white-space:nowrap; color:var(--text-sub); }
.shop-dday.dd-soon   { color:var(--coral); }
.shop-dday.dd-urgent { color:var(--coral-deep); }

/* ⓘ 툴팁 */
.tip-btn { background:none; border:1px solid var(--border); color:var(--text-sub); width:20px; height:20px; border-radius:50%; font-size:11px; line-height:1; padding:0; flex-shrink:0; }
.tip-line { display:none; font-size:11px; color:#8a827d; background:#faf6f4; border-radius:8px; padding:8px 10px; margin-bottom:10px; line-height:1.5; }

/* 기록 탭 */
.rec-monthnav { display:flex; align-items:center; justify-content:center; gap:24px; padding:14px 0 2px; }
.rec-monthnav .nav-arrow { background:transparent; border:none; font-size:18px; color:#5a534e; padding:2px 6px; }
.rec-monthnav span { font-family:'Paperlogy',sans-serif; font-size:16px; font-weight:700; color:#1f1a18; }
.rec-card { margin:10px 16px 0; background:var(--card); border-radius:16px; padding:14px 16px; box-shadow:0 4px 18px rgba(60,45,40,0.06); }
.rec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.rec-date { font-size:13px; font-weight:700; color:#1f1a18; }
.rec-date .rec-slot-tag { color:var(--coral); margin-left:6px; }
.rec-cancel { background:none; border:1px solid #f5c4b3; color:var(--coral-deep); border-radius:8px; padding:4px 10px; font-size:11px; font-weight:600; }
.rec-items { font-size:13px; color:#3a3330; line-height:1.5; }
.rec-memo { margin-top:8px; font-size:12px; color:#b06a4a; background:#faf6f4; border-radius:8px; padding:8px 10px; line-height:1.5; }
.rec-memo.plain { color:#9a938f; }

/* 더보기 탭 */
.more-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
.more-row:last-child { border-bottom:none; }
.more-k { color:#6e6661; }
.more-v { font-weight:700; color:#1f1a18; }
.more-print-btn { width:100%; padding:13px; background:#1f1a18; color:#fff; border:none; border-radius:12px; font-size:13px; font-weight:700; }

/* 식단 탭 헤더 인쇄 버튼 */
.meal-print-btn { background:#1f1a18; color:#fff; border:none; border-radius:20px; padding:7px 13px; font-size:12px; font-weight:700; }
.cal-back-btn { background:none; border:none; font-size:14px; font-weight:700; color:#5a534e; padding:6px 0; }

/* 강조 플래시 (장볼 재료로 이동 시) */
.flash { animation:flashbg 1.2s ease; }
@keyframes flashbg { 0%,100% { box-shadow:0 4px 18px rgba(60,45,40,0.06); } 30% { box-shadow:0 0 0 2px var(--coral); } }

/* 되돌리기 토스트 */
.undo-toast {
  position:fixed; bottom:76px; left:50%; transform:translateX(-50%);
  background:#2b2422; color:#fff; border-radius:14px;
  padding:12px 16px; display:flex; align-items:center; gap:14px;
  font-size:13px; white-space:nowrap; z-index:999;
  box-shadow:0 6px 24px rgba(0,0,0,0.22);
  animation:toastIn 0.22s ease;
}
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
.undo-toast-name { color:#ffc8a8; font-weight:700; }
.undo-btn {
  background:var(--coral); color:#fff; border:none;
  border-radius:8px; padding:6px 13px; font-size:12px; font-weight:700;
}

/* =====================================================
   ===== v4 추가 — 카드형 재고 / 반응 / 기록 달력 등 =====
   ===================================================== */

/* 인사 영역 — 위계 낮춤 (D+ 헤더가 주인공) */
.greet-txt { font-size:15px !important; font-weight:600 !important; color:#6e6661 !important; }
.home-dayhd { padding:2px 18px 2px; }

/* 재고 요약 — 흰 카드 + 포인트 색 숫자 */
.sum-badges { display:flex; gap:10px; }
.sum-badge {
  flex:1; background:var(--card) !important; border-radius:14px;
  padding:14px 6px 12px !important; text-align:center;
  box-shadow:0 3px 12px rgba(60,45,40,0.05); display:flex; flex-direction:column; gap:4px;
}
.sum-num { font-family:'Paperlogy',sans-serif; font-size:26px; font-weight:800; line-height:1; }
.sum-lbl { font-size:11px; font-weight:600; color:var(--text-sub); }
.sum-badge.out  .sum-num { color:var(--coral-deep); }   /* 부족 = 딥코랄 */
.sum-badge.soon .sum-num { color:var(--coral); }        /* 임박 = 코랄 */
.sum-badge.full .sum-num { color:var(--text); }          /* 충분 = 본문색 */

/* 코랄 + 버튼 (재고/장보기 추가) */
.add-fab { width:34px; height:34px; border-radius:50%; background:var(--coral-grad); color:#fff; border:none; font-size:20px; font-weight:600; line-height:1; box-shadow:0 4px 12px rgba(249,112,112,0.35); display:flex; align-items:center; justify-content:center; }
.add-fab.small { width:26px; height:26px; font-size:16px; box-shadow:0 3px 9px rgba(249,112,112,0.3); }
.tab-hd-row { display:flex; align-items:center; justify-content:space-between; }
.panel-edit-btn { margin-left:auto; background:none; border:1px solid var(--border); color:var(--text-sub); border-radius:8px; padding:4px 12px; font-size:12px; font-weight:600; }
.panel-edit-btn.on { color:var(--coral-deep); border-color:#f5c4b3; }

/* 재고 카드형 */
.stock-card { display:flex; align-items:center; gap:13px; background:var(--card); border-radius:16px; padding:13px 15px; margin-bottom:10px; box-shadow:0 3px 12px rgba(60,45,40,0.05); }
.stock-card:last-child { margin-bottom:0; }
.stock-card-ic { width:46px; height:46px; border-radius:13px; background:#f4f1ee; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.stock-card-ic img { width:30px; height:30px; object-fit:contain; }
.stock-card-ic .emoji { font-size:22px; }
.stock-card-mid { flex:1; min-width:0; }
.stock-card-name { font-size:15px; font-weight:700; color:#2b2422; }
.stock-card-sub { font-size:11px; color:var(--text-sub); margin-top:2px; }
.stock-card-right { text-align:right; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
.stock-card-val { font-family:'Paperlogy',sans-serif; font-size:19px; font-weight:800; color:#4a8a4a; }
.stock-card-val.low { color:var(--coral-deep); }

/* 재고 편집 카드 */
.stock-edit-card { background:#faf8f6; border:1px solid var(--border); border-radius:14px; padding:12px 13px; margin-bottom:10px; }
.ec-top { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.ec-top .stock-edit-name { flex:1; font-size:14px; font-weight:700; color:#2b2422; }
.ec-bottom { display:flex; gap:10px; }
.ec-field { flex:1; display:flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--border); border-radius:10px; padding:7px 10px; }
.ec-field label { font-size:11px; color:var(--text-sub); white-space:nowrap; }
.ec-field input { flex:1; border:none; outline:none; font-size:16px; font-weight:700; color:#2b2422; width:100%; text-align:right; background:transparent; }
.ec-field .ec-unit { font-size:11px; color:var(--text-sub); }
.base-g-select { flex:1; border:none; outline:none; font-size:16px; font-weight:700; color:#2b2422; background:transparent; text-align:right; cursor:pointer; }
.add-form-select-wrap { flex:1; display:flex; flex-direction:column; gap:4px; background:#fff; border:1px solid var(--border); border-radius:12px; padding:10px 12px; }
.add-form-label { font-size:11px; color:var(--text-sub); }
.add-form-select-wrap .base-g-select { font-size:16px; font-weight:600; text-align:left; padding:0; }
.ec-warn { margin-top:8px; font-size:11px; font-weight:600; color:var(--coral-deep); line-height:1.4; background:#fff4f2; border-radius:8px; padding:7px 10px; }
.stock-x { background:none; border:none; color:#cfc9c4; font-size:15px; padding:2px 4px; }

/* 장볼 재료 2단 카드 */
.shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.shop-card { position:relative; background:#fff5f5; border:1px solid #fde0e0; border-radius:14px; padding:13px 14px; }
.shop-card-name { font-size:14px; font-weight:700; color:#2b2422; padding-right:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.shop-card .shop-dday { display:inline-block; margin-top:6px; font-size:11px; font-weight:700; }
.shop-card-x { position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,0.06); border:none; color:#8a827d; font-size:11px; line-height:1; padding:0; }

/* 반응 칩 */
.reaction-lbl { font-size:12px; font-weight:700; color:#6e6661; margin:2px 0 6px; }
.reaction-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.reaction-chip { display:flex; align-items:center; gap:4px; background:#faf8f6; border:1.5px solid var(--border); border-radius:18px; padding:5px 11px; font-size:12px; font-weight:600; color:#6e6661; }
.reaction-chip .re-e { font-size:13px; }
.reaction-chip.selected { background:#fff1f1; border-color:var(--coral); color:var(--coral-deep); }
/* 주의·부족함: 별도 차원 플래그 → 기본부터 한 톤 낮은 그레이 배경, 선택 시 더 진하게 */
.reaction-chip.tone-warn, .reaction-chip.tone-short { background:#eeeae6; border-color:#eeeae6; color:#7a736e; }
.reaction-chip.tone-warn.selected, .reaction-chip.tone-short.selected { background:#ddd7d1; border-color:#ddd7d1; color:#3e3935; }
.intro-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:10px 0; border-bottom:1px solid var(--border); }
.intro-row:last-child { border-bottom:none; }
.intro-name { font-size:13px; font-weight:700; color:#1f1a18; min-width:56px; }
.intro-date { font-size:11px; color:#9a938f; }
.intro-status { margin-left:auto; font-size:11px; font-weight:600; color:var(--coral); }
.intro-memo { width:100%; font-size:11px; color:#8a837e; line-height:1.4; }
.intro-empty { font-size:12px; color:#9a938f; padding:6px 0; }

/* 기록 탭 리스트/달력 토글 */
.rec-toggle { display:flex; gap:6px; background:#efe9e4; border-radius:12px; padding:4px; margin:10px 16px 2px; }
.rec-tg { flex:1; padding:9px; border:none; background:transparent; border-radius:9px; font-size:13px; font-weight:700; color:var(--text-sub); }
.rec-tg.active { background:#fff; color:#2b2422; box-shadow:0 2px 6px rgba(60,45,40,0.08); }
.rec-items .ri-amt { color:var(--text-sub); font-weight:600; }

/* 기록 달력 */
.rcal { margin:8px 16px 0; background:var(--card); border-radius:18px; padding:14px 12px; box-shadow:0 4px 18px rgba(60,45,40,0.06); }
.rcal-wd { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
.rcal-wd div { text-align:center; font-size:11px; font-weight:700; color:var(--text-sub); padding:4px 0; }
.rcal-wd div.sun { color:var(--coral-deep); }
.rcal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.rcal-cell { position:relative; aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; font-size:12px; color:#3a3330; }
.rcal-cell.empty { background:transparent; }
.rcal-cell.done { background:#fff1f1; }
.rcal-cell.today { box-shadow:inset 0 0 0 1.5px var(--coral); }
.rcal-dn { font-size:11px; font-weight:600; }
.rcal-cell.done .rcal-dn { color:var(--coral-deep); font-weight:800; }
.rcal-emoji { font-size:13px; line-height:1; }
/* 아침·저녁 2슬롯 아이콘 (작게 나란히) */
.rcal-slots { display:flex; gap:2px; align-items:center; justify-content:center; line-height:1; }
.rcal-slot { display:flex; flex-direction:column; align-items:center; gap:0; }
.rcal-slot-ic { font-size:11px; line-height:1.1; }
.rcal-slot-tag { font-size:7px; color:var(--text-sub); font-weight:700; line-height:1; }
.rcal-cell.selected { box-shadow:inset 0 0 0 2px #1f1a18; }
.rcal-cell.selected.today { box-shadow:inset 0 0 0 2px var(--coral); }
.rcal-legend { display:flex; flex-wrap:wrap; gap:8px 12px; margin:12px 16px 0; padding:0 2px; }
.rcal-legend span { font-size:11px; color:var(--text-sub); }
/* 달력 하단 — 선택일 상세 (그날 아침/저녁 식단 + 메모) */
.rcal-detail { margin:10px 16px 0; background:var(--card); border-radius:16px; padding:14px 16px; box-shadow:0 4px 18px rgba(60,45,40,0.06); }
.rcal-detail-date { font-size:14px; font-weight:800; color:#1f1a18; margin-bottom:10px; font-family:'Paperlogy',sans-serif; }
.rcal-detail-slot { padding:10px 0; border-bottom:1px solid var(--border); }
.rcal-detail-slot:last-child { border-bottom:none; }
.rcal-detail-slot-head { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.rcal-detail-slot-lbl { font-size:12px; font-weight:700; color:var(--coral); }
.rcal-detail-react { font-size:12px; font-weight:600; color:#6e6661; }
.rcal-detail-items { font-size:13px; color:#3a3330; line-height:1.5; }
.rcal-detail-items .ri-amt { color:var(--text-sub); font-weight:600; }
.rcal-detail-memo { margin-top:6px; font-size:12px; color:#b06a4a; background:#faf6f4; border-radius:8px; padding:8px 10px; line-height:1.5; }
.rcal-detail-empty { font-size:12px; color:#9a938f; padding:4px 0; }
.rcal-detail-none { font-size:12px; color:#b3aca7; }

/* ===== v8: 인증/온보딩 게이트 ===== */
#gate-view { position:fixed; inset:0; z-index:999; background:var(--bg); display:none; align-items:center; justify-content:center; padding:24px 20px; overflow-y:auto; }
.gate-card { width:100%; max-width:360px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 22px 22px; box-shadow:0 8px 30px rgba(0,0,0,.06); }
.gate-logo { text-align:center; font-size:36px; line-height:1; }
.gate-title { text-align:center; font-size:19px; font-weight:800; color:var(--text); margin:10px 0 4px; }
.gate-sub { text-align:center; font-size:13px; color:var(--text-sub); margin-bottom:18px; line-height:1.55; }
.gate-field { margin-bottom:10px; }
.gate-label { font-size:12px; font-weight:700; color:var(--text-sub); margin-bottom:4px; display:block; }
.gate-input { width:100%; padding:13px 14px; border:1px solid var(--border); border-radius:12px; font-size:16px; font-family:inherit; background:#fbfaf9; color:var(--text); }
.gate-input:focus { outline:none; border-color:var(--coral); background:#fff; }
.gate-btn { width:100%; padding:14px; border:none; border-radius:12px; background:var(--coral-grad); color:#fff; font-size:15px; font-weight:800; margin-top:8px; cursor:pointer; font-family:inherit; }
.gate-btn:disabled { opacity:.55; }
.gate-msg { font-size:12.5px; line-height:1.6; margin-top:10px; text-align:center; color:var(--coral-deep); display:none; white-space:pre-line; }
/* ── 부모 호칭 선택 칩 ── */
.role-row { display:flex; gap:8px; margin-top:6px; }
.role-chip { flex:1; text-align:center; padding:11px 0; border:1.5px solid #f0e8e4; border-radius:14px; font-size:13.5px; font-weight:600; color:var(--text-sub); background:#fdfbfa; }
.role-chip.on { border-color:var(--coral); background:#fef1f1; color:var(--coral-deep); font-weight:700; }
/* ── Cubit 워드마크 ── */
.wordmark { font-family:'Paperlogy',sans-serif; font-weight:900; letter-spacing:-0.5px;
  background:var(--coral-grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.gate-wordmark { text-align:center; font-size:34px; line-height:1.1; }
.greet-cubit { margin-left:auto; font-size:15px; opacity:0.9; }
/* ── 회원가입 보조 ── */
.gate-hint { font-size:11.5px; color:var(--text-sub); margin-top:5px; line-height:1.4; }
.pw-wrap { position:relative; }
.pw-inline-err { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:600; color:var(--coral-deep); display:none; pointer-events:none; }
.gate-check { display:flex; align-items:flex-start; gap:8px; font-size:12.5px; color:var(--text); line-height:1.45; margin-top:10px; }
.gate-check input { width:17px; height:17px; margin-top:1px; accent-color:var(--coral); flex:none; }
.gate-check b { color:var(--coral-deep); font-weight:600; text-decoration:underline; text-underline-offset:2px; cursor:pointer; }
/* ── 날짜 셀렉트 ── */
.ob-date-row { display:flex; gap:8px; }
.gate-select { flex:1; -webkit-appearance:none; appearance:none; border:1.5px solid #f0e8e4; background:#fdfbfa url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22><path d=%22M1 1l4 4 4-4%22 stroke=%22%23b9b0ab%22 stroke-width=%221.6%22 fill=%22none%22 stroke-linecap=%22round%22/></svg>') no-repeat right 12px center; border-radius:14px; padding:13px 14px; font-size:16px; font-family:'Pretendard',sans-serif; color:var(--text); }
.gate-select:focus { outline:none; border-color:var(--coral); }
/* ── 약관 모달 ── */
.legal-ovl { position:fixed; inset:0; background:rgba(30,22,18,0.45); z-index:9999; display:flex; align-items:flex-end; justify-content:center; }
.legal-card { background:#fff; width:100%; max-width:560px; max-height:82vh; border-radius:22px 22px 0 0; padding:20px 20px 28px; display:flex; flex-direction:column; }
.legal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.legal-title { font-family:'Paperlogy',sans-serif; font-size:17px; font-weight:700; color:var(--text); }
.legal-x { border:none; background:#f5efec; border-radius:50%; width:30px; height:30px; font-size:14px; color:var(--text-sub); }
.legal-body { overflow-y:auto; font-size:12.5px; line-height:1.7; color:#4c443f; white-space:pre-line; -webkit-overflow-scrolling:touch; }
/* ── 계정 수정 ── */
.acct-input { width:100%; border:1.5px solid #f0e8e4; background:#fdfbfa; border-radius:14px; padding:12px 14px; font-size:16px; font-family:'Pretendard',sans-serif; color:var(--text); margin-top:6px; }
.acct-input:focus { outline:none; border-color:var(--coral); }
.acct-lbl { font-size:12px; font-weight:600; color:var(--text-sub); margin-top:12px; }
.acct-btns { display:flex; gap:8px; margin-top:14px; }
.acct-save { flex:1; border:none; border-radius:14px; padding:13px; font-size:14px; font-weight:700; color:#fff; background:var(--coral-grad); }
.acct-cancel { flex:1; border:none; border-radius:14px; padding:13px; font-size:14px; font-weight:600; color:var(--text-sub); background:#f5efec; }
.acct-edit-link { border:none; background:none; font-size:12.5px; font-weight:600; color:var(--coral-deep); padding:8px 0 0; text-decoration:underline; text-underline-offset:2px; }
.gate-switch { text-align:center; margin-top:14px; font-size:13px; color:var(--text-sub); line-height:1.6; }
.gate-switch b { color:var(--coral); cursor:pointer; }
body.gated .bottom-tabs { display:none; }
.more-logout-btn { width:100%; padding:12px; margin-top:10px; border:1px solid var(--border); border-radius:12px; background:#fff; color:var(--coral-deep); font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>

<!-- ===== v8: 로그인/온보딩 게이트 ===== -->
<div id="gate-view"><div class="gate-card" id="gate-card"></div></div>

<!-- ===== 홈 탭 ===== -->
<div id="home-view"></div>

<!-- ===== 재고 탭 ===== -->
<div id="stock-view"></div>

<!-- ===== 식단 탭 ===== -->
<div id="meal-view">
  <div class="header">
    <div class="month-nav">
      <button class="nav-arrow" onclick="changeMonth(-1)">‹</button>
      <span id="month-lbl"></span>
      <button class="nav-arrow" onclick="changeMonth(1)">›</button>
      <div class="month-nav-right" style="display:flex;align-items:center;gap:8px;">
        <button class="today-btn" onclick="goToday()">Today</button>
        <button class="meal-print-btn" onclick="openMonthly()">🖨 인쇄</button>
      </div>
    </div>
    <div class="sub" id="sub" style="padding:0 18px 2px;"></div>
    <div class="strip-wrap" id="strip-wrap">
      <div class="strip" id="strip"></div>
    </div>
  </div>
  <div id="meal-content"></div>
</div>

<!-- ===== 기록 탭 ===== -->
<div id="record-view"></div>

<!-- ===== 더보기 탭 ===== -->
<div id="more-view"></div>

<!-- ===== 월간 달력 뷰 (탭 아님 — 인쇄 진입) ===== -->
<div id="cal-view">
  <div class="header">
    <div class="header-top">
      <button class="cal-back-btn" onclick="backFromMonthly()">‹ 뒤로</button>
      <div class="title" style="font-size:18px;">월간 식단표</div>
    </div>
  </div>
  <div id="cal-content"></div>
</div>

<!-- 되돌리기 토스트 -->
<div id="undo-toast" style="display:none;"></div>

<!-- ===== 하단 탭 ===== -->
<div class="bottom-tabs">
  <button class="btab active" id="tab-home" onclick="switchTab('home')">홈</button>
  <button class="btab" id="tab-stock" onclick="switchTab('stock')">재고</button>
  <button class="btab" id="tab-meal" onclick="switchTab('meal')">식단</button>
  <button class="btab" id="tab-record" onclick="switchTab('record')">기록</button>
  <button class="btab" id="tab-more" onclick="switchTab('more')">더보기</button>
</div>

/* v12: "로그인 상태 유지" 체크 여부에 따라 세션을 localStorage(재방문 시 자동 로그인) /
   sessionStorage(브라우저 닫으면 로그아웃)로 분기 저장하는 커스텀 storage 어댑터.
   - 체크박스 값은 로그인 직전 setRememberPref()로 미리 기록해둬야 함
     (supabase가 로그인 성공 즉시 storage.setItem을 호출하기 때문) */
const REMEMBER_KEY = 'cubit-remember-me';
function getRememberPref() {
  try { const v = window.localStorage.getItem(REMEMBER_KEY); return v === null ? true : v === '1'; }
  catch (e) { return true; } /* 기본값: 유지 (기존 동작과 동일) */
}
function setRememberPref(v) {
  try { window.localStorage.setItem(REMEMBER_KEY, v ? '1' : '0'); } catch (e) { console.error('설정 저장 오류:', e); }
}
const hybridAuthStorage = {
  getItem(key) {
    try {
      const local = window.localStorage.getItem(key);
      if (local !== null) return local;
      return window.sessionStorage.getItem(key);
    } catch (e) { return null; }
  },
  setItem(key, value) {
    try {
      if (getRememberPref()) { window.localStorage.setItem(key, value); window.sessionStorage.removeItem(key); }
      else { window.sessionStorage.setItem(key, value); window.localStorage.removeItem(key); }
    } catch (e) { console.error('세션 저장 오류:', e); }
  },
  removeItem(key) {
    try { window.localStorage.removeItem(key); window.sessionStorage.removeItem(key); } catch (e) {}
  },
};
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {

});

/* v8: 단계 전환일의 시작일 대비 오프셋(일). 아기별 재기준화에 사용 */
const PHASE_OFFSETS = PHASES.map(p => v8DayDiff(p.from, BASE_START));

/* v8: 아기 프로필 기준으로 모든 기준 날짜를 재계산 (오너=템플릿과 동일 결과) */
function rebaseDates(startDate, birthDate) {
  START = v8DateOnly(startDate);
  BIRTH = v8DateOnly(birthDate);
  PLAN_YEAR = START.getFullYear();
  MID_START = v8AddDays(START, v8DayDiff(BASE_MID, BASE_START));
  TWO_MEAL_START = v8AddDays(START, v8DayDiff(BASE_TWO, BASE_START));
  PHASES.forEach((p, i) => { p.from = v8AddDays(START, PHASE_OFFSETS[i]); });
}

/* 해당 날짜에 적용되는 단계 반환 (가장 마지막으로 from을 지난 단계) */
function phaseFor(d) {
  let p = PHASES[0];
  for (const ph of PHASES) { if (d >= ph.from) p = ph; }
  return p;
}

let MONTH_MIN = 4, MONTH_MAX = 7;
function recomputeMonthBounds() {
  let mn = 99, mx = -1;
  Object.keys(meals).forEach(k => {
    const m = k.match(/^(\d{1,2})\//); if (!m) return;
    const mi = parseInt(m[1], 10) - 1;
    mn = Math.min(mn, mi); mx = Math.max(mx, mi);
  });
  if (mx >= 0) { MONTH_MIN = mn; MONTH_MAX = mx; }
}

function isToday(d) { return d.toDateString() === TODAY.toDateString(); }
function isPast(d) { return d < TODAY && !isToday(d); }
function isMidPhase(d) { return d >= MID_START; }

}
function weekDays(s) {
  return Array.from({length:7}, (_,i) => { const d=new Date(s); d.setDate(s.getDate()+i); return d; });
}
function weekNumber(d) {
  const f = new Date(PLAN_YEAR, d.getMonth(), 1);
  return Math.ceil((d.getDate() + ((f.getDay() || 7) - 1)) / 7);
}

/* ================================================
   v18: 재료 선호도 기반 식단 로테이션 — 핵심 로직 (순수 함수)
   - 전역 상태(meals/dbStocks/BABY_ID 등)를 참조하지 않고 인자로만 동작 → 테스트 용이
   - rows: [{date:'YYYY-MM-DD', plan:{am,pm,lunch,...}}] 형태(templateRows/오너컷오버 생성 공용)
   - introStatusRows: [{ingredient_name, first_intro_date:'YYYY-MM-DD', observe_days}]
   - prefRows: [{ingredient_name, mode:'weekly_cap'|'category_swap', weekly_max}]
   - "주" 정의 확정: 캘린더 주(월~일), weekStart()/weekDays() 재사용
================================================ */
function introRowOf(introStatusRows, name) {
  return introStatusRows.find(s => s.ingredient_name === name);
}
/* 해당 날짜가 이 재료의 관찰기간(도입일~도입일+observe_days) 내인가 */
function isObservingOn(introStatusRows, name, dateObj) {
  const s = introRowOf(introStatusRows, name);
  if (!s) return false;
  const start = parseDbDateFull(s.first_intro_date);
  const end = v8AddDays(start, s.observe_days);
  return dateObj >= start && dateObj < end;
}
/* 관찰기간이 완전히 끝났는가 (아직 시작 전인 미래 도입 예정 재료는 false) */
function hasPassedObservation(introStatusRows, name, dateObj) {
  const s = introRowOf(introStatusRows, name);
  if (!s) return true; /* 추적 대상이 아닌 기존 정착 재료(쌀·한우 등 관찰기록 없는 재료 포함) */
  const start = parseDbDateFull(s.first_intro_date);
  const end = v8AddDays(start, s.observe_days);
  return dateObj >= end;
}
function weeklyMaxFor(prefRows, name) {
  const p = prefRows.find(x => x.ingredient_name === name && x.mode === 'weekly_cap');
  if (p && p.weekly_max != null) return p.weekly_max;
  return defaultWeeklyMax(name);
}
/* rows(byDate 맵)에서 dateObj가 속한 캘린더 주(월~일) 내 재료 등장 횟수.
   v18 수정: 그 주 "전체"가 아니라 월요일부터 dateObj 당일까지만 집계(누적 캡 방식).
   이유: applyIngredientPreferences는 날짜를 오름차순으로 순회하며 그 자리에서 즉시 치환하므로,
   아직 검사하지 않은 미래 날짜의 원본(치환 전) 값까지 세어버리면 이번 주 초반 날짜가
   실제로는 아직 캡을 넘기지 않았는데도 미리 치환되는 문제가 있었음(테스트로 발견). */
function countInWeek(byDate, name, dateObj) {
  const monday = weekStart(dateObj);
  let c = 0;
  weekDays(monday).forEach(d => {
    if (d > dateObj) return; /* 아직 처리 전인 이번 주의 미래 날짜는 집계하지 않음 */
    const plan = byDate[toDbDateFull(d)];
    if (!plan) return;
    [...(plan.am || []), ...(plan.lunch || []), ...(plan.pm || [])].forEach(raw => {
      if (typeof raw === 'string' && raw.startsWith('반복:')) return; /* 반복노출 프로토콜은 집계 제외 */
      if (parseItem(raw).name === name) c++;
    });
  });
  return c;
}
/* countInWeek의 "오늘 이전까지만" 버전 — 오늘 자기 자신의 칸은 지금 막 결정하는 중이라 카운트에서 제외해야
   "이번 주 2회까지 허용"이 실제로 2회를 허용하게 됨(오늘 것까지 포함해서 세면 1회로 줄어드는 오프바이원 버그가 있었음, 테스트로 발견) */
function countInWeekBefore(byDate, name, dateObj) {
  const monday = weekStart(dateObj);
  let c = 0;
  weekDays(monday).forEach(d => {
    if (d >= dateObj) return;
    const plan = byDate[toDbDateFull(d)];
    if (!plan) return;
    [...(plan.am || []), ...(plan.lunch || []), ...(plan.pm || [])].forEach(raw => {
      if (typeof raw === 'string' && raw.startsWith('반복:')) return;
      if (parseItem(raw).name === name) c++;
    });
  });
  return c;
}
/* 같은 카테고리 내 대체 후보 선정: 관찰중 아님 + 관찰완료 + 주간캡 여유 + 오늘 아직 안 쓴 재료, 최근 빈도 낮은 순 */
function pickSubstitute(byDate, introStatusRows, prefRows, name, dateObj, usedToday) {
  const cat = categoryOf(name);
  if (!cat) return name;
  const candidates = Object.keys(INGREDIENT_CATEGORY).filter(n => INGREDIENT_CATEGORY[n] === cat && n !== name);
  const usable = candidates.filter(n =>
    !isObservingOn(introStatusRows, n, dateObj) &&
    hasPassedObservation(introStatusRows, n, dateObj) &&
    countInWeekBefore(byDate, n, dateObj) < weeklyMaxFor(prefRows, n) &&
    !usedToday.has(n)
  );
  if (!usable.length) return name; /* 대체 불가 → 원본 유지 (콘솔 경고는 호출부에서) */
  usable.sort((a, b) => countInWeekBefore(byDate, a, dateObj) - countInWeekBefore(byDate, b, dateObj));
  return usable[0];
}
/* rows 전체에 선호도 규칙 적용 (in-place). rows는 날짜 오름차순이 아니어도 되며 내부에서 정렬함.
   반환: { rows, warnings } — warnings는 대체 실패(후보 없음) 로그용 */
function applyIngredientPreferences(rows, introStatusRows, prefRows) {
  const byDate = {};
  rows.forEach(r => { byDate[r.date] = r.plan; });
  const warnings = [];
  Object.keys(byDate).sort().forEach(dateKey => {
    const plan = byDate[dateKey];
    const dateObj = parseDbDateFull(dateKey);
    const usedToday = new Set();
    ['am', 'lunch', 'pm'].forEach(slot => {
      if (!plan[slot]) return;
      plan[slot] = plan[slot].map(raw => {
        if (typeof raw !== 'string' || raw.startsWith('반복:')) return raw; /* 반복노출은 항상 고정 */
        const { name } = parseItem(raw);
        if (!name) return raw;
        if (isObservingOn(introStatusRows, name, dateObj)) { usedToday.add(name); return raw; } /* 관찰중 고정 */
        if (countInWeekBefore(byDate, name, dateObj) < weeklyMaxFor(prefRows, name)) { usedToday.add(name); return raw; } /* 캡 이내 */
        const sub = pickSubstitute(byDate, introStatusRows, prefRows, name, dateObj, usedToday);
        usedToday.add(sub);
        if (sub === name) { warnings.push(`${dateKey} ${name}: 대체 후보 없음(카테고리 내 통과재료 부족)`); return raw; }
        return raw.replace(name, sub);
      });
    });
  });
  return { rows, warnings };
}

/* 신규계정 온보딩: INTRO_SCHEDULE_TEMPLATE을 D+오프셋 적용해 ingredient_intro_status 행 생성 */

function esc(v) {
  return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function ageStr(d) {
  const by=BIRTH.getFullYear(),bm=BIRTH.getMonth(),bd=BIRTH.getDate();
  const dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
  let totalM=(dy-by)*12+(dm-bm); if(dd<bd) totalM--;
  const lastB=new Date(BIRTH); lastB.setMonth(lastB.getMonth()+totalM);
  return `생후 ${totalM}개월 ${Math.floor((d-lastB)/86400000)+1}일`;
}

/* item 문자열 파싱 → {name, amount, cube, repeat} */
function parseItem(raw) {
  let repeat=false, s=raw;
  if (s.startsWith('반복:')) { repeat=true; s=s.slice(3); }
  const m = s.match(/^(.*?)\s+(\d+\s*g|\d+\s*팩|\d+\s*개|소량|반복노출|반복)$/);
  let name, amount;
  if (m) { name=m[1]; amount=m[2]; } else { name=s; amount=''; }
  // 해당 재료의 base_g를 dbStocks에서 조회 (없으면 기본값 15)
  const stock = (typeof dbStocks !== 'undefined') ? dbStocks.find(s => s.name === name) : null;
  const base_g = (stock && stock.base_g) ? stock.base_g : 15;
  let cube=0; const g=parseInt(amount);
  if (/g$/.test(amount) && !isNaN(g)) cube=Math.round(g/base_g);
  return { name, amount, cube, repeat };
}

/* amount 문자열 → {num, unit, fixed} 분리 (편집 UI: 숫자만 입력받고 단위는 고정 표시)
   fixed=true면 숫자 입력이 불가능한 값(소량/반복노출/반복)이라 읽기전용으로 그대로 노출 */
function splitAmount(amount) {
  const s = String(amount || '').trim();
  if (!s) return { num: '', unit: 'g', fixed: false };
  if (s === '소량' || s === '반복노출' || s === '반복') return { num: '', unit: s, fixed: true };
  const m = s.match(/^(\d+)\s*(g|팩|개)$/);
  if (m) return { num: m[1], unit: m[2], fixed: false };
  return { num: '', unit: 'g', fixed: false };
}

/* 재료 → 아이콘 매핑 */
function iconFor(name) {

  if (n.includes('쌀')) return ICONS['쌀'];
  if (n.includes('한우') || n.includes('소고기')) return ICONS['소고기'];
  if (n.includes('노른자')) return ICONS['노른자'];

  if (n.includes('고구마')) return ICONS['고구마'];
  if (n.includes('감자')) return ICONS['감자'];
  if (n.includes('애호박')) return ICONS['애호박'];
  if (n.includes('단호박')) return ICONS['단호박'];
  if (n.includes('양배추')) return ICONS['양배추'];
  if (n.includes('당근')) return ICONS['당근'];
  if (n.includes('닭')) return ICONS['닭고기'];

  if (n.includes('땅콩')) return ICONS['땅콩'];
  if (n.includes('청경채')) return ICONS['청경채'];
  return null;
}
/* 아이콘 없는 재료 이모지 폴백 */
function emojiFor(name) {
  if (name.includes('두부')) return '⬜';
  if (name.includes('밀')) return '🌾';
  if (name.includes('새우')) return '🦐';
  if (name.includes('생선')) return '🐟';

  if (name.includes('호두')) return '🌰';
  if (name.includes('메밀')) return '🌾';
  return '🥣';
}

function renderStrip() {
  const ml = document.getElementById('month-lbl');

  const stripEl = document.getElementById('strip');
  if (ml) ml.textContent = `${curMonth + 1}월`;
  if (sb) sb.textContent = ageStr(TODAY);
  if (!stripEl) return;
  let html = "";
  for (let day = 1; day <= 31; day++) {
    const d = new Date(PLAN_YEAR, curMonth, day);
    if (d.getMonth() !== curMonth) break;
    const data = meals[dk(d)];
    let cls = "day-item";
    if (isToday(d)) cls += " today";
    if (d.toDateString() === sel.toDateString()) cls += " selected";
    if (data && isDayDone(data)) cls += " done-day";
    html += `<div class="${cls}" onclick="pick(${d.getFullYear()},${d.getMonth()},${d.getDate()})"><div class="dn">${day}</div></div>`;
  }
  stripEl.innerHTML = html;
  setTimeout(() => {
    const wrap = document.getElementById('strip-wrap');
    if (!wrap) return;
    const items = stripEl.querySelectorAll('.day-item');
    const idx = sel.getDate() - 1;
    if (items[idx]) {
      const il = items[idx].getBoundingClientRect().left;
      const wl = wrap.getBoundingClientRect().left;
      wrap.scrollTo({ left: wrap.scrollLeft + il - wl - wrap.clientWidth/2 + items[idx].clientWidth/2, behavior:'smooth' });

}

/* 오늘 식단의 재고 부족 경고 텍스트 */
function todayWarnHtml(data) {
  // 마감 임박(D-2 이하) 재료가 있으면 최우선으로 헤더에 각인
  const imminent = imminentDeadlineStocks();
  if (imminent.length) {
    return `<span class="deadline-warn"><span class="dw-icon">⚠️</span>마감 임박 재료가 있습니다</span>`;
  }
  if (!data || dbStocks.length === 0) return '';
  const items = [...(data.amEdited || data.am || []), ...(data.pmEdited || data.pm || [])];
  const lowNames = [];
  items.forEach(raw => {
    const { name } = parseItem(raw);
    const st = dbStocks.find(s => s.name === name);
    if (st && isStockLow(st) && !lowNames.includes(name)) lowNames.push(name);
  });
  return lowNames.length ? `<span class="stock-warn">⚠️ ${lowNames.join(' · ')} 부족</span>` : '';
}

/* ================================================
   구매 데드라인 계산
   사용 예정일 = 오늘 이후 해당 재료가 등장하는 가장 가까운 날
   구매 데드라인 = 사용 예정일 - 2일 / D-day = 데드라인 - 오늘
================================================ */
function dateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

/* v17: 향후 2일(오늘~+2일) 식단에서 해당 재료가 필요로 하는 큐브 수 합산.
   - 이미 완료(또는 건너뜀) 처리된 끼니는 재고가 이미 차감됐으므로 수요에서 제외
   - 차감 로직과 동일한 calcUseCount 기준으로 계산해 정합성 유지 */
function projectedNeedCubes(name) {
  let need = 0;
  const st = dbStocks.find(s => s.name === name);
  const base = (st && st.base_g) || 15;
  for (let off = 0; off <= 2; off++) {
    const d = new Date(TODAY); d.setDate(TODAY.getDate() + off);
    const data = meals[dk(d)]; if (!data) continue;
    const slots = [
      { items: data.amEdited || data.am, skip: data.done || data.amSkipped },
      { items: data.lunchEdited || data.lunch, skip: data.lunchDone || data.lunchSkipped },
      { items: data.pmEdited || data.pm, skip: data.pmDone },
    ];
    for (const sl of slots) {
      if (!sl.items || sl.skip) continue;
      for (const raw of sl.items) {
        const p = parseItem(raw);
        if (p.name === name) need += calcUseCount(p.amount, base);
      }
    }
  }
  return need;
}
/* v17: 재고 임박 판정 — 절대 수량이 아니라 향후 2일 식단 수요를 차감한
   "예상 잔여"가 알림 기준(low_alert, 기본 2개) 이하로 떨어질 예정이면 임박.
   수요가 없으면 기존 규칙(amount <= low_alert)과 완전히 동일하게 동작. */
function isStockLow(s) {
  return (s.amount - projectedNeedCubes(s.name)) <= s.low_alert;
}

function nextUseDate(name) {
  const base = dateOnly(TODAY);
  for (let off = 0; off <= 120; off++) {
    const d = new Date(base); d.setDate(base.getDate() + off);
    const data = meals[dk(d)]; if (!data) continue;
    const items = [...(data.amEdited || data.am || []), ...(data.pmEdited || data.pm || [])];
    if (items.some(raw => parseItem(raw).name === name)) return d;
  }
  return null;
}
function deadlineInfo(name) {
  const use = nextUseDate(name); if (!use) return null;
  const deadline = new Date(use); deadline.setDate(use.getDate() - 2);
  const dday = Math.round((dateOnly(deadline) - dateOnly(TODAY)) / 86400000);
  return { use, deadline, dday };
}
/* 마감 임박(데드라인 D-2 이하) 이면서 재고 부족인 재료 목록 */
function imminentDeadlineStocks() {
  if (!dbStocks.length) return [];
  return dbStocks.filter(s => {
    if (!isStockLow(s)) return false;               // 수요 감안해도 여유 있으면 제외
    const info = deadlineInfo(s.name);
    return info && info.dday <= 2;                    // 마감 2일 이내
  });
}
/* D-day 칩 HTML (오늘 할 일 / 장볼 재료 공용) */
function ddayChipHtml(name, cls) {
  const info = deadlineInfo(name);
  if (!info) return '';
  const n = info.dday;
  let colorCls = '', mark = '';
  if (n <= 1) { colorCls = 'dd-urgent'; mark = ' ❗'; }
  else if (n <= 3) { colorCls = 'dd-soon'; }
  const ddText = n >= 1 ? `D-${n}` : (n === 0 ? 'D-day' : '지남');
  const dateText = `${info.deadline.getMonth()+1}/${info.deadline.getDate()}까지`;
  return `<span class="${cls} ${colorCls}">${ddText} · ${dateText}${mark}</span>`;
}

/* ================================================
   재고 요약 배지 (충분 / 임박 / 부족)
================================================ */
function stockSummaryHtml() {
  if (!dbStocks.length) return `<div class="todo-empty">재고 정보를 불러오는 중...</div>`;
  let full = 0, soon = 0, out = 0;
  dbStocks.forEach(s => {
    if (s.amount <= 0) out++;
    else if (isStockLow(s)) soon++;
    else full++;
  });
  return `<div class="sum-badges">
    <div class="sum-badge out"><div class="sum-num">${out}</div><div class="sum-lbl">부족</div></div>
    <div class="sum-badge soon"><div class="sum-num">${soon}</div><div class="sum-lbl">임박</div></div>
    <div class="sum-badge full"><div class="sum-num">${full}</div><div class="sum-lbl">충분</div></div>
  </div>`;
}

/* ================================================
   최근 완료 기록 (아침=meal_log / 저녁=appState, 모두 Supabase)
================================================ */
function allRecords() {
  const recs = [];
  Object.keys(meals).forEach(key => {
    const data = meals[key];
    const [m, d] = key.split('/').map(Number);
    const dateObj = new Date(PLAN_YEAR, m - 1, d);
    if (data.done) {
      const items = (data.amEdited || data.am || []).map(parseItem);
      recs.push({ key, dateObj, slot: (data.pm ? '아침' : '이유식'), memo: data.memo || '섭취완료', items, which: 'am' });
    }
    if (data.lunchDone) {
      const items = (data.lunchEdited || data.lunch || []).map(parseItem);
      recs.push({ key, dateObj, slot: '점심', memo: data.lunchMemo || '섭취완료', items, which: 'lunch' });
    }
    if (data.pmDone) {
      const items = (data.pmEdited || data.pm || []).map(parseItem);
      recs.push({ key, dateObj, slot: '저녁', memo: data.pmMemo || '섭취완료', items, which: 'pm' });
    }
  });
  recs.sort((a, b) => (b.dateObj - a.dateObj) || (a.which < b.which ? 1 : -1));
  return recs;
}
/* memo 문자열에서 반응 이모지 추출 (달력용) */
function reactionEmojiOf(memo) {
  if (!memo) return '';
  const r = REACTIONS.find(x => memo.includes(x.t) || memo.includes(x.e));
  return r ? r.e : '';
}

/* 기록 월간 달력 (아침·저녁 각각 반응 아이콘 + 선택일 하단 상세) */
function recordCalHtml(month) {
  const y = PLAN_YEAR, m = month;
  const first = new Date(y, m, 1).getDay();   // 0=일
  const last = new Date(y, m + 1, 0).getDate();
  const recs = allRecords().filter(r => r.dateObj.getMonth() === m);
  // 날짜별로 아침(am)·저녁(pm) 반응 이모지를 따로 보관
  const byDay = {};
  recs.forEach(r => {
    const d = r.dateObj.getDate();
    if (!byDay[d]) byDay[d] = { am: '', pm: '', amDone: false, pmDone: false };
    const e = reactionEmojiOf(r.memo) || '✓';
    if (r.which === 'am') { byDay[d].am = e; byDay[d].amDone = true; }
    else { byDay[d].pm = e; byDay[d].pmDone = true; }
  });

  const WD = ['일','월','화','수','목','금','토'];
  let html = `<div class="rcal">
    <div class="rcal-wd">${WD.map((w,i)=>`<div class="${i===0?'sun':''}">${w}</div>`).join('')}</div>
    <div class="rcal-grid">`;
  for (let i = 0; i < first; i++) html += `<div class="rcal-cell empty"></div>`;
  for (let d = 1; d <= last; d++) {
    const rec = byDay[d];
    const dObj = new Date(y, m, d);
    const isTod = dObj.toDateString() === TODAY.toDateString();
    let cls = 'rcal-cell';
    if (rec) cls += ' done';
    if (isTod) cls += ' today';
    if (recordSelDay === d) cls += ' selected';
    const click = rec ? ` onclick="recordPickDay(${d})"` : '';
    // 아침·저녁 슬롯 아이콘 (각각 있으면 표시)
    let slots = '';
    if (rec) {
      slots = `<div class="rcal-slots">`;
      if (rec.amDone) slots += `<div class="rcal-slot"><span class="rcal-slot-ic">${rec.am}</span><span class="rcal-slot-tag">아</span></div>`;
      if (rec.pmDone) slots += `<div class="rcal-slot"><span class="rcal-slot-ic">${rec.pm}</span><span class="rcal-slot-tag">저</span></div>`;
      slots += `</div>`;
    }
    html += `<div class="${cls}"${click}>
      <div class="rcal-dn">${d}</div>
      ${slots}
    </div>`;
  }
  const rem = (first + last) % 7;
  if (rem) for (let i = 0; i < 7 - rem; i++) html += `<div class="rcal-cell empty"></div>`;
  html += `</div></div>`;
  html += `<div class="rcal-legend">${REACTIONS.map(r=>`<span>${r.e} ${r.t}</span>`).join('')}<span>✓ 기록 있음 · 아=아침 저=저녁</span></div>`;
  // 선택일 상세 패널
  html += recordDetailHtml(month);
  return html;
}

/* 달력 하단 — 선택한 날짜의 아침/저녁 식단 + 섭취 메모 */
function recordDetailHtml(month) {
  if (recordSelDay == null) return '';
  const y = 2026, m = month, d = recordSelDay;
  const key = `${m + 1}/${d}`;
  const data = meals[key];
  const dObj = new Date(y, m, d);
  const dateLbl = `${m + 1}월 ${d}일 ${dows(dObj)}요일`;
  let html = `<div class="rcal-detail"><div class="rcal-detail-date">${dateLbl}</div>`;
  if (!data) {
    html += `<div class="rcal-detail-empty">이 날은 식단 정보가 없어요</div></div>`;
    return html;
  }
  // 슬롯별 렌더 (아침 → 점심 → 저녁)
  const slots = [
    { key: 'am', lbl: (data.pm || data.lunch) ? '아침' : '이유식', items: data.amEdited || data.am, done: data.done, memo: data.memo },
    ...(data.lunch ? [{ key: 'lunch', lbl: '점심', items: data.lunchEdited || data.lunch, done: data.lunchDone, memo: data.lunchMemo }] : []),
    ...(data.pm ? [{ key: 'pm', lbl: '저녁', items: data.pmEdited || data.pm, done: data.pmDone, memo: data.pmMemo }] : []),
  ];
  slots.forEach(s => {
    if (!s.items) return;
    const itemsTxt = s.items.map(raw => {
      const it = parseItem(raw);
      return `${esc(it.name)}${it.amount ? ` <span class="ri-amt">${esc(it.amount)}</span>` : ''}`;
    }).join(' · ');
    const react = s.done ? reactionTextOf(s.memo) : '';
    const reactHtml = react ? `<span class="rcal-detail-react">${esc(react)}</span>` : (s.done ? '' : `<span class="rcal-detail-none">미기록</span>`);
    let memoHtml = '';
    if (s.done && s.memo && s.memo !== '섭취완료') {
      // 메모에서 반응 텍스트 부분을 빼고 순수 메모만 (있으면)
      const pureMemo = pureMemoOf(s.memo);
      if (pureMemo) memoHtml = `<div class="rcal-detail-memo">📝 ${esc(pureMemo)}</div>`;
    }
    html += `<div class="rcal-detail-slot">
      <div class="rcal-detail-slot-head">
        <span class="rcal-detail-slot-lbl">${esc(s.lbl)}</span>
        ${reactHtml}
      </div>
      <div class="rcal-detail-items">${itemsTxt}</div>
      ${memoHtml}
    </div>`;
  });
  html += `</div>`;
  return html;
}

/* memo 문자열에서 반응(이모지+텍스트) 부분만 추출 */
function reactionTextOf(memo) {
  if (!memo) return '';
  const r = REACTIONS.find(x => memo.includes(x.t));
  return r ? `${r.e} ${r.t}` : '';
}
/* memo에서 반응 부분을 제거한 순수 메모만 추출 (형식: "😊 잘 먹음 · 실제메모") */
function pureMemoOf(memo) {
  if (!memo) return '';
  const r = REACTIONS.find(x => memo.includes(x.t));
  if (!r) return (memo === '섭취완료') ? '' : memo;
  // "이모지 텍스트 · 메모" 에서 뒷부분만
  const idx = memo.indexOf('·');
  return idx >= 0 ? memo.slice(idx + 1).trim() : '';
}

function recordPickDay(d) {

      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

/* 재료 도입 이력: 'New' 배지 기준 첫 도입일 + 그날 반응/메모 */
function introHistoryHtml() {
  const intro = [];
  const seen = new Set();
  Object.keys(meals).forEach(key => {
    const m = meals[key];
    [m.badge, m.newBadge].forEach(b => {
      if (b && b.t === 'new') {
        const name = b.x.replace(/^New\s*/, '').trim();
        if (name && !seen.has(name)) {
          seen.add(name);
          const [mm, dd] = key.split('/').map(Number);
          intro.push({ name, key, dateObj: new Date(PLAN_YEAR, mm - 1, dd), memo: m.memo, done: !!m.done });
        }
      }
    });
  });
  if (!intro.length) return `<div class="intro-empty">아직 도입한 재료가 없어요</div>`;
  intro.sort((a, b) => a.dateObj - b.dateObj);
  return intro.map(it => {
    const past = isPast(it.dateObj) || isToday(it.dateObj);
    const emoji = it.done ? reactionEmojiOf(it.memo) : '';
    const note = it.done && it.memo && it.memo !== '섭취완료'
      ? `<span class="intro-memo">${esc(it.memo)}</span>` : '';
    const status = it.done ? `${emoji ? emoji + ' ' : ''}완료` : (past ? '미기록' : '예정');
    return `<div class="intro-row">
      <span class="intro-name">${esc(it.name)}</span>
      <span class="intro-date">${esc(it.key)} 도입</span>
      <span class="intro-status">${status}</span>
      ${note}
    </div>`;
  }).join('');
}

    const p = ingredientPrefs.find(x => x.ingredient_name === name);

/* 저장: none=행 삭제, weekly_cap=weekly_max 포함 upsert, category_swap=weekly_max null로 upsert */
async function saveIngredientPrefs() {
  const names = [...dbStocks].map(s => s.name);
  try {
    for (const name of names) {
      const modeSel = document.getElementById(`pref-mode-${name}`);
      if (!modeSel) continue;
      const mode = modeSel.value;
      const existing = ingredientPrefs.find(p => p.ingredient_name === name);
      if (mode === 'none') {
        if (existing) {
          const { error } = await sb.from('ingredient_preference').delete().eq('id', existing.id);
          if (error) { console.error('선호도 삭제 오류:', error); alert('저장에 실패했어요: ' + (error.message || error)); return; }
        }
        continue;
      }
      const wmInput = document.getElementById(`pref-wm-${name}`);
      const weekly_max = mode === 'weekly_cap' ? (parseInt(wmInput?.value, 10) || defaultWeeklyMax(name)) : null;
      const row = { user_id: USER_ID, baby_id: BABY_ID, ingredient_name: name, mode, weekly_max };
      if (existing) {
        const { error } = await sb.from('ingredient_preference').update(row).eq('id', existing.id);
        if (error) { console.error('선호도 저장 오류:', error); alert('저장에 실패했어요: ' + (error.message || error)); return; }
      } else {
        const { error } = await sb.from('ingredient_preference').insert(row);
        if (error) { console.error('선호도 저장 오류:', error); alert('저장에 실패했어요: ' + (error.message || error)); return; }
      }
    }
    await loadIngredientPrefs();
    prefEditMode = false;
    renderMore();
  } catch (e) { console.error('선호도 저장 오류:', e); alert('저장 중 오류가 발생했어요.'); }
}

function todoCardHtml() {

    rows = `<div class="todo-empty">재고가 넉넉해요 · 오늘 장볼 건 없어요 ✓</div>`;

async function saveAllStocks() {
  for (let i = 0; i < dbStocks.length; i++) {
    const s = dbStocks[i];
    const input = document.getElementById(`si-${s.id}`);
    const baseEl = document.getElementById(`sb-${s.id}`);
    const newAmt = input ? parseInt(input.value) : (s._tempAmount ?? s.amount);
    const newBase = baseEl ? parseInt(baseEl.value) : (s._tempBase ?? s.base_g ?? 15);
    if (isNaN(newAmt) || newAmt < 0) continue;
    const safeBase = isNaN(newBase) ? 15 : newBase;
    // base_g 컬럼이 없을 수도 있으므로 먼저 base_g 포함 시도 → 실패 시 기본 컬럼만
    let { error } = await sb.from('inventory').update({ amount: newAmt, sort_order: i, base_g: safeBase }).eq('id', s.id);
    if (error) {
      ({ error } = await sb.from('inventory').update({ amount: newAmt, sort_order: i }).eq('id', s.id));
      if (error) { alert(`${s.name} 저장 실패: ${error.message}`); return; }
    } else {
      s.base_g = safeBase;
      delete s._tempBase;
      delete s._tempAmount;
