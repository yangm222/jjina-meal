<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐아 이유식 — 주간카드형</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--sky:#29aaee;--yellow:#f5c800;--green:#2eaa55;--gray:#888;--purple:#9933cc;--border:#e0e0e0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;color:#111;min-height:100vh;max-width:480px;margin:0 auto;}

.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;}
.b-new{background:var(--pink);color:#fff;}.b-직접{background:var(--sky);color:#fff;}.b-시판{background:var(--yellow);color:#fff;}.b-혼합{background:var(--green);color:#fff;}.b-warn{background:#111;color:#fff;}.b-rep{background:var(--gray);color:#fff;}.b-kit{background:var(--purple);color:#fff;}

/* BOTTOM TABS: active=black text, inactive=gray, bg=light gray */
.bottom-tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#f0f0f0;display:flex;z-index:300;border-top:1px solid var(--border);}
.btab{flex:1;background:none;border:none;color:#aaa;font-size:12px;font-weight:700;padding:12px 4px 14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:color 0.2s;}
.btab.active{color:#111;border-top:2px solid #111;}

/* SHARED ACCORDION */
.acc{background:#fff;border-bottom:1px solid var(--border);}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.acc-title{font-size:13px;font-weight:700;color:#111;}
.acc-arrow{font-size:12px;color:#111;font-weight:700;transition:transform 0.2s;}
.acc.open .acc-arrow{transform:rotate(180deg);}
.acc-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);}
.acc.open .acc-body{display:block;}
.stock-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:#111;}
.stock-row:last-child{border-bottom:none;}
.stock-val{font-weight:700;color:var(--sky);}
.stock-low{color:#e65100!important;}
.shop-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:#111;}
.shop-row:last-child{border-bottom:none;}
.shop-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);flex-shrink:0;}
.notice-list{padding-top:8px;}
.notice-list li{font-size:12px;color:#444;line-height:1.8;list-style:none;padding:2px 0;border-bottom:1px solid var(--border);}
.notice-list li:last-child{border-bottom:none;}

/* PC TABLE */
.pc-table{min-width:640px;border-collapse:collapse;table-layout:fixed;width:100%;}
.pc-table th{background:#333;color:#fff;font-size:10px;font-weight:600;padding:5px;text-align:center;}
.pc-table td{border:1px solid #ddd;vertical-align:top;}
.pc-table td.emp{background:#f8f8f8;border-color:#eee;}
.pc-cell{padding:5px;min-height:72px;}
.pc-date{font-size:11px;font-weight:700;margin-bottom:3px;color:#111;}
.pc-items{font-size:9px;color:#333;line-height:1.6;}
.pc-note-sm{font-size:8px;color:#aaa;}
.pc-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
.pc-badge{font-size:7px;font-weight:700;padding:1px 5px;border-radius:10px;}
.pc-done{opacity:0.45;}
.pc-today-cell{outline:2px solid var(--pink);}
.pc-month-lbl{font-size:14px;font-weight:700;padding:12px 16px 6px;color:#111;}
.cal-overflow{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 16px 12px;}

/* TOP BAR */
.topbar{background:#fff;border-bottom:2px solid #111;position:sticky;top:0;z-index:50;}
.topbar-inner{display:flex;align-items:center;justify-content:center;padding:14px 16px 10px;}
.v2-title{font-size:18px;font-weight:800;color:#111;text-align:center;}
.v2-sub{font-size:11px;color:var(--gray);text-align:center;margin-top:2px;}

/* Quick 2-col */
.quick{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.qbtn{background:#fff;border:none;border-right:1px solid var(--border);padding:11px 14px;font-size:12px;font-weight:700;color:#111;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:space-between;}
.qbtn:last-child{border-right:none;}
.qpanel{display:none;border-bottom:1px solid var(--border);padding:0 16px;}
.qpanel.open{display:block;padding:0 16px 4px;}

/* Week nav */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:#fff;}
.week-nav-btn{background:none;border:none;font-size:12px;font-weight:700;cursor:pointer;color:#111;font-family:'Noto Sans KR',sans-serif;padding:0;}
.week-lbl{font-size:12px;font-weight:700;color:#111;}
/* Today 버튼: 핑크 라운드, 헤더 타이틀 우측 */
.today-btn{background:var(--pink);border:none;border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* DAY CARDS */
.v2-main{padding:0;}
.card{border-bottom:1px solid var(--border);background:#fff;}

/* ===== CLOSED CARD: white bg, black text ===== */
.card-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;min-height:68px;
  background:#fff;
}
.big-num{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;color:#111;}
.dow-txt{font-size:13px;font-weight:600;color:var(--gray);}
.card-meta{font-size:10px;color:var(--gray);margin-top:2px;display:none;}
.card-left{display:flex;align-items:baseline;gap:10px;}
.card-right{display:flex;align-items:center;gap:6px;}
.preview{font-size:11px;color:var(--gray);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chevron{font-size:11px;color:#111;font-weight:700;transition:transform 0.2s;}
.card.done-card .big-num{color:#ccc;}
.card.done-card .dow-txt{color:#ccc;}

/* ===== OPEN CARD: black bg, white text ===== */
.card.is-open .card-hd{background:#111;}
.card.is-open .big-num{color:#fff;}
.card.is-open .dow-txt{color:rgba(255,255,255,0.6);}
.card.is-open .card-meta{display:block;color:rgba(255,255,255,0.45);}
.card.is-open .preview{display:none;}
.card.is-open .chevron{transform:rotate(180deg);color:#fff;}

/* ===== TODAY DOT (when today card is closed and not open) ===== */
.today-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);display:inline-block;margin-left:5px;vertical-align:middle;}

/* CARD BODY: always black bg + white text (only shown when is-open) */
.card-body{display:none;padding:12px 16px 16px;border-top:1px solid #333;background:#111;}
.card.is-open .card-body{display:block;}
.meal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;}
.mn{font-weight:600;font-size:15px;color:#fff;}
.ma{font-size:13px;color:rgba(255,255,255,0.5);}
.note-txt{font-size:11px;color:rgba(255,255,255,0.35);margin-top:8px;}
.bdgs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.done-row{text-align:right;margin-top:10px;}
.done-tag{font-size:11px;color:var(--green);font-weight:700;}
.memo-box{margin-top:8px;background:rgba(255,255,255,0.08);padding:8px 10px;font-size:12px;color:rgba(255,255,255,0.65);line-height:1.6;}
.no-data{color:rgba(255,255,255,0.4);font-size:13px;padding:8px 0;}

#main-view{display:block;padding-bottom:56px;min-height:100vh;}
#cal-view{display:none;padding-bottom:56px;min-height:100vh;}
</style>
</head>
<body>

<div id="main-view">
  <div class="topbar">
    <div class="topbar-inner" style="position:relative;">
      <div style="text-align:center;">
        <div class="v2-title">🍚 찐아 이유식</div>
        <div class="v2-sub" id="sub"></div>
      </div>
      <!-- Today 버튼: 헤더 우측 고정 -->
      <button class="today-btn" onclick="goToday()" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);">Today</button>
    </div>
    <div class="quick">
      <button class="qbtn" id="stock-btn" onclick="togglePanel('stock')">📦 재고 현황 <span>▼</span></button>
      <button class="qbtn" id="shop-btn" onclick="togglePanel('shop')">🛒 장볼 재료 <span>▼</span></button>
    </div>
    <div class="qpanel" id="stock-panel"></div>
    <div class="qpanel" id="shop-panel"></div>
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">‹ 이전주</button>
      <span class="week-lbl" id="week-lbl"></span>
      <button class="week-nav-btn" onclick="changeWeek(1)">다음주 ›</button>
    </div>
  </div>
  <div class="v2-main" id="v2-main"></div>
</div>

<div id="cal-view">
  <div class="topbar">
    <div class="topbar-inner">
      <div style="text-align:center;"><div class="v2-title">🍚 찐아 이유식</div><div class="v2-sub">월간 달력</div></div>
    </div>
  </div>
  <div id="cal-content"></div>
</div>

<div class="bottom-tabs">
  <button class="btab active" id="tab-main" onclick="switchTab('main')">주간카드형</button>
  <button class="btab" id="tab-cal" onclick="switchTab('cal')">월간</button>
</div>

<script>
const START=new Date(2025,4,9),TODAY=new Date(2025,4,14),BIRTH=new Date(2024,10,14);
const meals={"5/9":{items:[{n:"쌀미음",a:"45g"}],badges:["시판"],done:true,memo:"섭취완료"},"5/10":{items:[{n:"쌀미음",a:"60g"}],badges:["시판"],done:true,memo:"섭취완료"},"5/11":{items:[{n:"쌀미음",a:"60g"}],badges:["시판"],done:true,memo:"섭취완료"},"5/12":{items:[{n:"한우미음",a:"60g"}],badges:["NEW","시판"],done:true,memo:"섭취완료"},"5/13":{items:[{n:"한우미음",a:"60g"}],badges:["시판"],done:true,memo:"섭취완료"},"5/14":{items:[{n:"쌀미음",a:"45g"},{n:"한우",a:"15g"}],badges:["시판+직접"],note:"물 약간 추가"},"5/15":{items:[{n:"쌀미음",a:"45g"},{n:"한우",a:"15g"}],badges:["시판+직접"],note:"물 약간 추가"},"5/16":{items:[{n:"쌀",a:"60g"},{n:"한우",a:"15g"}],badges:["직접"]},"5/17":{items:[{n:"브로콜리미음",a:"30g"},{n:"한우",a:"15g"}],badges:["NEW","시판+직접"]},"5/18":{items:[{n:"브로콜리미음",a:"45g"},{n:"한우",a:"15g"}],badges:["시판+직접"]},"5/19":{items:[{n:"브로콜리미음",a:"65g"},{n:"한우",a:"15g"}],badges:["시판+직접"]},"5/20":{items:[{n:"감자미음",a:"30g"},{n:"한우",a:"15g"}],badges:["NEW","시판+직접"]},"5/21":{items:[{n:"감자미음",a:"45g"},{n:"한우",a:"15g"}],badges:["시판+직접"]},"5/22":{items:[{n:"감자미음",a:"65g"},{n:"한우",a:"15g"}],badges:["시판+직접"]},"5/23":{items:[{n:"쌀",a:"60g"},{n:"애호박",a:"15g"},{n:"한우",a:"15g"}],badges:["NEW","직접"]},"5/24":{items:[{n:"쌀",a:"45g"},{n:"애호박",a:"30g"},{n:"한우",a:"15g"}],badges:["직접"]},"5/25":{items:[{n:"쌀",a:"30g"},{n:"오트밀",a:"15g"},{n:"한우",a:"15g"}],badges:["NEW","직접"]},"5/26":{items:[{n:"쌀",a:"30g"},{n:"오트밀",a:"15g"},{n:"한우",a:"15g"}],badges:["직접"]},"5/27":{items:[{n:"쌀",a:"30g"},{n:"오트밀",a:"15g"},{n:"한우",a:"15g"}],badges:["직접"]},"5/28":{items:[{n:"오트밀",a:"30g"},{n:"애호박",a:"15g"},{n:"한우",a:"15g"}],badges:["직접"]},"5/29":{items:[{n:"오트밀",a:"30g"},{n:"애호박",a:"15g"},{n:"한우",a:"15g"}],badges:["직접"]},"5/30":{items:[{n:"고구마미음",a:"45g"},{n:"한우",a:"15g"}],badges:["NEW","시판+직접"]},"5/31":{items:[{n:"고구마미음",a:"55g"},{n:"한우",a:"15g"}],badges:["시판+직접"]},"6/1":{items:[{n:"고구마미음",a:"소량"},{n:"오트밀",a:"30g"},{n:"한우",a:"15g"}],badges:["시판+직접"]},"6/2":{items:[{n:"쌀",a:"45g"},{n:"노른자",a:"소량"},{n:"한우",a:"15g"}],badges:["NEW","직접"]},"6/3":{items:[{n:"쌀",a:"45g"},{n:"노른자",a:"5g // 생후 개월+일 계산 (출생일 = 1일째 기준)
function ageStr(d){
  const by=BIRTH.getFullYear(),bm=BIRTH.getMonth(),bd=BIRTH.getDate();
  const dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
  let totalM=(dy-by)*12+(dm-bm);
  if(dd<bd) totalM--;
  const lastB=new Date(BIRTH);
  lastB.setMonth(lastB.getMonth()+totalM);
  const days=Math.floor((d-lastB)/86400000)+1;
  return `생후 ${totalM}개월 ${days}일`;
}

function stockH(){return stocks.map(s=>`<div class="stock-row"><span>${s.n}</span><span class="stock-val${s.low?' stock-low':''}">${s.a}</span></div>`).join('');}
function shopH(){return shops.map(s=>`<div class="shop-row"><div class="shop-dot"></div><span>${s}</span></div>`).join('');}
function noticeH(){return `<ul class="notice-list">${notices.map(n=>`<li>${n}</li>`).join('')}</ul>`;}

function buildPC(){
  const months=[{m:4,label:"5월",days:31,d0:3},{m:5,label:"6월",days:30,d0:6}];
  let h='';
  months.forEach(({m,label,days,d0})=>{
    h+=`<div class="pc-month-lbl">${label}</div><div class="cal-overflow"><table class="pc-table"><thead><tr>${["월","화","수","목","금","토","일"].map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody><tr>`;
    let col=0;
    for(let i=0;i<d0;i++){h+=`<td class="emp"></td>`;col++;}
    for(let day=1;day<=days;day++){
      if(col===7){h+=`</tr><tr>`;col=0;}
      const d=new Date(2025,m,day);const key=dk(d);const data=meals[key];
      h+=`<td class="${isToday(d)?'pc-today-cell':''}"><div class="pc-cell${data&&data.done?' pc-done':''}"><div class="pc-date">${day}${data&&data.done?' ✓':''}</div>`;
      if(data){h+=`<div class="pc-items">${data.items.map(it=>`${it.n}${it.a?' '+it.a:''}`).join('<br>')}</div>`;if(data.note)h+=`<div class="pc-note-sm">${data.note}</div>`;h+=`<div class="pc-badges">${(data.badges||[]).map(b=>`<span class="pc-badge ${bc(b)}">${b}</span>`).join('')}</div>`;}
      h+=`</div></td>`;col++;
    }
    while(col<7){h+=`<td class="emp"></td>`;col++;}
    h+=`</tr></tbody></table></div>`;
  });
  return h;
}

function downloadCal(){
  const w=window.open('','_blank');
  const months=[{m:4,label:"5월",days:31,d0:3},{m:5,label:"6월",days:30,d0:6}];
  let body='<h2 style="margin-bottom:16px;">🍚 찐아 이유식 식단표</h2>';
  months.forEach(({m,label,days,d0})=>{
    body+=`<h3 style="margin:12px 0 6px;">${label}</h3><table style="min-width:600px;border-collapse:collapse;table-layout:fixed;width:100%;"><thead><tr>`;
    ["월","화","수","목","금","토","일"].forEach(x=>{body+=`<th style="background:#333;color:#fff;font-size:10px;padding:5px;text-align:center;">${x}</th>`;});
    body+='</tr></thead><tbody><tr>';let col=0;
    for(let i=0;i<d0;i++){body+=`<td style="border:1px solid #eee;background:#f8f8f8;min-height:70px;"></td>`;col++;}
    for(let day=1;day<=days;day++){
      if(col===7){body+='</tr><tr>';col=0;}
      const d=new Date(2025,m,day);const key=dk(d);const data=meals[key];
      body+=`<td style="border:1px solid #ddd;vertical-align:top;${isToday(d)?'outline:2px solid #ff6eb4;':''}"><div style="padding:5px;min-height:70px;${data&&data.done?'opacity:0.45;':''}"><div style="font-size:11px;font-weight:700;margin-bottom:3px;">${day}${data&&data.done?' ✓':''}</div>`;
      if(data){body+=`<div style="font-size:9px;color:#333;line-height:1.6;">${data.items.map(it=>`${it.n}${it.a?' '+it.a:''}`).join('<br>')}</div>`;if(data.note)body+=`<div style="font-size:8px;color:#aaa;">${data.note}</div>`;(data.badges||[]).forEach(b=>{const bg={NEW:"#ff6eb4",직접:"#29aaee",시판:"#f5c800","시판+직접":"#2eaa55",주의:"#111",반복:"#888",키트:"#9933cc"}[b]||"#888";body+=`<span style="display:inline-block;font-size:7px;font-weight:700;padding:1px 5px;border-radius:10px;background:${bg};color:#fff;margin:1px;">${b}</span>`;});}
      body+=`</div></td>`;col++;
    }
    while(col<7){body+=`<td style="border:1px solid #eee;background:#f8f8f8;"></td>`;col++;}
    body+='</tr></tbody></table>';
  });
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>찐아 이유식</title><style>body{font-family:sans-serif;padding:20px;max-width:900px;margin:0 auto;}@media print{.np{display:none;}}</style></head><body><div class="np" style="margin-bottom:16px;"><button onclick="window.print()" style="padding:10px 20px;background:#111;color:#fff;border:none;cursor:pointer;font-size:14px;">🖨️ 인쇄 / PDF 저장</button></div>${body}</body></html>`);
  w.document.close();w.onload=()=>setTimeout(()=>w.print(),300);
}

// ===== 상태 관리 =====
// openIdx: null = 기본(오늘 자동 열림), -1 = 모두 닫힘, 0~6 = 해당 인덱스 열림
let curWS=weekStartOf(TODAY);
let openIdx=null;

function goToday(){
  curWS=weekStartOf(TODAY);
  openIdx=null; // 오늘로 리셋
  render();
}

function changeWeek(dir){
  const newWS=new Date(curWS);
  newWS.setDate(curWS.getDate()+dir*7);
  curWS=newWS;
  openIdx=null;
  render();
}

function togglePanel(type){
  document.getElementById(`${type}-panel`).classList.toggle('open');
  document.getElementById(`${type}-btn`).classList.toggle('open');
}

function toggleCard(idx){
  // 이미 열려 있으면 닫기, 아니면 해당 인덱스 열기
  if(openIdx===idx){
    openIdx=-1; // 완전 닫힘
  } else {
    openIdx=idx;
  }
  render();
}

function render(){
  const days=weekDays(curWS);
  const end=new Date(curWS);end.setDate(curWS.getDate()+6);

  document.getElementById('sub').textContent=`${dds(TODAY)} · 오늘 ${TODAY.getMonth()+1}/${TODAY.getDate()}`;
  document.getElementById('week-lbl').textContent=`${curWS.getMonth()+1}/${curWS.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;
  document.getElementById('stock-panel').innerHTML=stockH();
  document.getElementById('shop-panel').innerHTML=shopH();

  // 오늘이 이번 주에 있는지 찾기
  const todayIdx=days.findIndex(d=>isToday(d));

  // 실제로 열릴 인덱스 결정
  // null이면 오늘 자동 열림 (오늘이 이번 주에 없으면 -1)
  const effOpen = openIdx===null ? todayIdx : openIdx;

  let h='';
  days.forEach((d,i)=>{
    const key=dk(d);
    const data=meals[key];
    const isTd=isToday(d);
    const isOpenNow=(effOpen===i);
    const dow=dows(d);
    const iyuDay=Math.floor((d-START)/86400000)+1;
    const preview=data?data.items.map(it=>it.n).join(' + '):'식단 없음';

    // 오늘 핑크 점: 오늘인데 다른 카드가 열려있을 때
    const showDot=isTd && !isOpenNow && effOpen>=0 && effOpen!==todayIdx;

    // 카드 클래스: is-open만으로 스타일 제어 (today-card 클래스 제거로 CSS 충돌 방지)
    let cls='card';
    if(data&&data.done)cls+=' done-card';
    if(isOpenNow)cls+=' is-open';

    h+=`<div class="${cls}" id="c${i}">
      <div class="card-hd" onclick="toggleCard(${i})">
        <div class="card-left">
          <div class="big-num">${d.getDate()}${showDot?'<span class="today-dot"></span>':''}</div>
          <div>
            <div class="dow-txt">${isTd?'<strong style="color:var(--pink);font-size:14px;">오늘</strong> ':''} ${dow}요일</div>
            <div class="card-meta">이유식 ${iyuDay}일째 · ${ageStr(d)}</div>
          </div>
        </div>
        <div class="card-right">
          <div class="preview">${preview}</div>
          <div class="chevron">▼</div>
        </div>
      </div>
      <div class="card-body">`;

    if(!data){
      h+=`<div class="no-data">이날은 식단이 없어요</div>`;
    } else {
      if(data.badges&&data.badges.length)h+=`<div class="bdgs">${data.badges.map(b=>`<span class="badge ${bc(b)}">${b}</span>`).join('')}</div>`;
      h+=data.items.map(it=>`<div class="meal-row"><span class="mn">${it.n}</span><span class="ma">${it.a||''}</span></div>`).join('');
      if(data.note)h+=`<div class="note-txt">💧 ${data.note}</div>`;
      if(data.done||data.memo)h+=`<div class="done-row"><span class="done-tag">✓ 섭취 완료</span></div>`;
    }
    h+=`</div></div>`;
  });

  h+=`<div class="acc" id="a-n"><div class="acc-header" onclick="ta('a-n')"><span class="acc-title">⚠️ 알러지 유의사항</span><span class="acc-arrow">▼</span></div><div class="acc-body">${noticeH()}</div></div>`;
  h+='<div style="height:80px;"></div>';
  document.getElementById('v2-main').innerHTML=h;
}

function ta(id){document.getElementById(id).classList.toggle('open');}

function switchTab(tab){
  document.getElementById('main-view').style.display=tab==='main'?'block':'none';
  document.getElementById('cal-view').style.display=tab==='cal'?'block':'none';
  document.getElementById('tab-main').classList.toggle('active',tab==='main');
  document.getElementById('tab-cal').classList.toggle('active',tab==='cal');
  if(tab==='cal'){
    document.getElementById('cal-content').innerHTML=buildPC()+
    `<div style="padding:12px 16px 80px;"><button onclick="downloadCal()" style="width:100%;background:#111;color:#fff;border:none;padding:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">📥 인쇄 / PDF 저장</button></div>`;
  }
}

render();
</script>
</body>
