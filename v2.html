<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐아 이유식 플래너</title>
<!-- =====================================================
  폰트 변경 방법: Paperlogy 사용 시
  1. 아래 Noto Sans KR 링크를 제거하고
  2. Paperlogy 링크 주석을 해제하세요
  3. body의 font-family도 함께 변경하세요 (아래 주석 참고)
  ===================================================== -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/project-neon/PaperlogyFontCDN/PaperlogyAll.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Paperlogy', sans-serif;
  background: #fff;
  color: #3B3333;
  padding: 32px 20px 80px;
}

/* ── 월 헤더 영역 ── */
.month-top {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}
.month-title {
  font-size: 32px;
  font-weight: 900;
  color: #000;
  line-height: 1.15;
}

/* ── 재료 체크리스트 ── */
.checklist-box {
  border: 1px solid #CACACA;
  border-radius: 8px;
  padding: 12px 16px;
  flex: 1;
  min-width: 0;
}
.checklist-title {
  font-size: 11px;
  font-weight: 700;
  color: #F97070;
  margin-bottom: 8px;
  letter-spacing: 0.2px;
}
.checklist-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 5px 12px;
  margin-bottom: 12px;
}
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  cursor: pointer;
  user-select: none;
}
.checklist-item input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 13px;
  height: 13px;
  min-width: 13px;
  border: 1px solid #CACACA;
  border-radius: 3px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  margin-top: 1px;
}
.checklist-item input[type="checkbox"]:checked {
  background: #F97070;
  border-color: #F97070;
}
.checklist-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 2px; top: -1px;
  width: 5px; height: 9px;
  border: 1.5px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg);
}
.checklist-item label {
  font-size: 10.5px;
  color: #3B3333;
  cursor: pointer;
  line-height: 1.35;
}
.checklist-item.checked label {
  text-decoration: line-through;
  color: #CACACA;
}
/* 반복노출 메모 */
.repeat-memo {
  border-top: 1px solid #F0ECEA;
  padding-top: 10px;
  margin-top: 2px;
}
.repeat-memo-title {
  font-size: 10px;
  font-weight: 700;
  color: #F97070;
  margin-bottom: 6px;
}
.repeat-memo-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px 16px;
}
.repeat-memo-item {
  font-size: 10px;
  color: #9D9D9D;
  line-height: 1.4;
}
.repeat-memo-item strong {
  color: #3B3333;
  font-weight: 600;
}

/* ── 요일 헤더 ── */
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border: 1px solid #CACACA;
  border-bottom: none;
  background: #F1F1F1;
}
.wd {
  text-align: center;
  padding: 9px 0;
  font-size: 14px;
  font-weight: 500;
  color: #3B3333;
}

/* ── 날짜 그리드 ── */
.days-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  border-left: 1px solid #CACACA;
  border-top: 1px solid #CACACA;
}
.dc {
  min-height: 115px;
  padding: 7px 6px 6px;
  border-right: 1px solid #CACACA;
  border-bottom: 1px solid #CACACA;
  background: #fff;
}
.dc.empty { background: transparent; border-right: 1px solid #CACACA; border-bottom: 1px solid #CACACA; }

.month-section { margin-bottom: 48px; }

/* ── 날짜 행 ── */
.day-row {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 5px;
}
.dn {
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  color: #3B3333;
}
.dc.today .dn { color: #F97070; }
.meal-day-count {
  font-size: 8.5px;
  color: #CACACA;
  font-weight: 400;
  white-space: nowrap;
}

/* ── 배지들 ── */
.badge {
  display: inline-block;
  font-size: 9.5px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  line-height: 1.4;
  white-space: nowrap;
}
.b-new   { background: #F97070; color: #fff; }
.b-trans { background: #000;    color: #fff; }
.b-grain { background: #BBBBBB; color: #fff; }

/* 오전/오후 배지 */
.time-badge {
  display: inline-block;
  font-size: 8.5px;
  font-weight: 500;
  padding: 1px 5px;
  border-radius: 20px;
  line-height: 1.4;
  white-space: nowrap;
  background: transparent;
  color: #9D9D9D;
  border: 0.2pt solid #9D9D9D;
}

/* ── 끼니 블록 ── */
.meal-block { margin-bottom: 3px; }
.meal-header { margin-bottom: 2px; }
.meal-sep {
  border: none;
  border-top: 1px solid #E8E0DC;
  margin: 4px 0;
}
.meal-items { display: flex; flex-direction: column; gap: 1px; }
.meal-item {
  font-size: 10px;
  font-weight: 400;
  color: #3B3333;
  line-height: 1.45;
}
.meal-item.repeat {
  color: #F97070;
}
</style>

const MEAL_START = new Date(2026, 4, 9); // 2026-05-09

function mealDayCount(y, m, d) {
  const t = new Date(y, m-1, d);
  return Math.round((t - MEAL_START) / 86400000) + 1;
}

/* 월요일 여부 */
function isMonday(y, m, d) {
  return new Date(y, m-1, d).getDay() === 1;
}

    pm: ['반복:메밀 반복', '쌀알갱이죽 60g', '단호박 20g'],
  },
  '2026-07-31': {
    am: ['쌀알갱이죽 60g', '닭고기 20g', '양배추 20g'],
    pm: ['쌀알갱이죽 60g', '한우 20g', '애호박 20g'],
  },
};

/* 월별 재료 체크리스트 */
const CHECKLIST = {
  6: [
    '쌀가루 (아이보리 1단계)',
    '오트밀 파우더 (아이보리)',
    '한우 우둔살 350g',
    '달걀 (노른자용)',
    '땅콩버터 100%',
    '양배추',
    '단호박',
    '두부 (스푼타임 키트)',
    '밀 (스푼타임 키트)',
    '감자',
    '애호박',
  ],
  7: [
    '쌀 (중기용)',
    '한우 우둔살 350g',
    '닭고기',
    '당근',
    '새우 (스푼타임 키트)',
    '흰살생선 (스푼타임 키트)',
    '대게 (스푼타임 키트)',
    '조개 (스푼타임 키트)',
    '참깨 (스푼타임 키트)',
    '호두 (스푼타임 키트)',
    '메밀 (스푼타임 키트)',
    '애호박',
    '단호박',
    '양배추',
  ],
};

const months = [
  { y:2026, m:6 },
  { y:2026, m:7 },
];
const WD = ['일','월','화','수','목','금','토'];

function pad(n){ return String(n).padStart(2,'0'); }
function key(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }

const today = new Date();
const todayKey = key(today.getFullYear(), today.getMonth()+1, today.getDate());

/* 반복노출 재료 제조 메모 */
const REPEAT_MEMO = {
  6: [
    { name:'땅콩', memo:'100% 땅콩버터 1~2g + 물/분유에 희석' },
  ],
  7: [
    { name:'땅콩',     memo:'100% 땅콩버터 1~2g + 쌀죽에 섞기' },
    { name:'새우',     memo:'냉동새우 삶아 곱게 갈아 쌀죽에 섞기' },
    { name:'흰살생선', memo:'대구·명태 삶아 으깨어 쌀죽에 섞기' },
    { name:'대게',     memo:'냉동게살 삶아 잘게 찢어 쌀죽에 섞기' },
    { name:'조개',     memo:'바지락 삶은 육수+살 으깨어 쌀죽에 섞기' },
    { name:'참깨',     memo:'참깨가루 or 참기름 소량 쌀죽에 섞기' },
    { name:'호두',     memo:'호두 삶아 곱게 갈아 쌀죽에 섞기' },
    { name:'메밀',     memo:'메밀가루 소량 쌀죽에 섞어 익히기' },
  ],
};

function buildChecklist(m) {
  const items = CHECKLIST[m] || [];
  const memos = REPEAT_MEMO[m] || [];

  let h = `<div class="checklist-box">`;

  /* 재료 체크리스트 — 4열 그리드 */
  h += `<div class="checklist-title">필요 재료</div>`;
  h += `<div class="checklist-grid">`;
  items.forEach((item, i) => {
    h += `<div class="checklist-item" id="cli-${m}-${i}">`;
    h += `<input type="checkbox" id="chk-${m}-${i}" onchange="toggleCheck(${m},${i})">`;
    h += `<label for="chk-${m}-${i}">${item}</label>`;
    h += `</div>`;
  });
  h += `</div>`;

  /* 반복노출 메모 */
  if(memos.length) {
    h += `<div class="repeat-memo">`;
    h += `<div class="repeat-memo-title">반복노출 재료 제조법</div>`;
    h += `<div class="repeat-memo-grid">`;
    memos.forEach(({name, memo}) => {
      h += `<div class="repeat-memo-item"><strong>${name}</strong> — ${memo}</div>`;
    });
    h += `</div></div>`;
  }

  h += `</div>`;
  return h;
}

function toggleCheck(m, i) {
  const row = document.getElementById(`cli-${m}-${i}`);
  const chk = document.getElementById(`chk-${m}-${i}`);
  if(chk.checked) row.classList.add('checked');
  else row.classList.remove('checked');
}

function buildMonth({y, m}) {
  const first = new Date(y, m-1, 1).getDay();
  const last  = new Date(y, m, 0).getDate();
  const monthName = `${y}년 ${m}월`;

  let h = `<div class="month-section">`;

  /* 월 헤더 + 체크리스트 */
  h += `<div class="month-top">`;
  h += `<div class="month-title">${monthName}</div>`;
  h += buildChecklist(m);
  h += `</div>`;

  /* 요일 헤더 */
  h += `<div class="weekdays">${WD.map(w=>`<div class="wd">${w}</div>`).join('')}</div>`;
  h += `<div class="days-grid">`;

  for(let i=0; i<first; i++) h += `<div class="dc empty"></div>`;

  for(let d=1; d<=last; d++){
    const k = key(y, m, d);
    const ev = D[k] || {};
    const isToday = k === todayKey;
    const mon = isMonday(y, m, d);

    let cls = 'dc';
    if(isToday) cls += ' today';

    h += `<div class="${cls}">`;

    /* 날짜 행 */
    h += `<div class="day-row">`;
    h += `<span class="dn">${d}</span>`;
    if(mon) {
      const cnt = mealDayCount(y, m, d);
      h += `<span class="meal-day-count">이유식 ${cnt}일째</span>`;
    }
    h += `</div>`;

    /* 배지 행 (이벤트/NEW/입자) */
    if(ev.badge || ev.newBadge) {
      h += `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px;">`;
      if(ev.badge) h += `<span class="badge b-${ev.badge.t}">${ev.badge.x}</span>`;
      if(ev.newBadge) h += `<span class="badge b-${ev.newBadge.t}">${ev.newBadge.x}</span>`;
      h += `</div>`;
    }

    /* 오전 */
    if(ev.am) {
      h += `<div class="meal-block">`;
      h += `<div class="meal-header"><span class="time-badge">오전</span></div>`;
      h += `<div class="meal-items">`;
      ev.am.forEach(item => {
        const isRepeat = item.startsWith('반복:');
        const text = isRepeat ? item.slice(3) : item;
        h += `<div class="meal-item${isRepeat?' repeat':''}">${text}</div>`;
      });
      h += `</div></div>`;
    }

    /* 구분선 + 오후 */
    if(ev.pm || ev.pmDash) {
      h += `<hr class="meal-sep">`;
      h += `<div class="meal-block">`;
      h += `<div class="meal-header"><span class="time-badge">오후</span></div>`;
      if(ev.pm) {
        h += `<div class="meal-items">`;
        ev.pm.forEach(item => {
          const isRepeat = item.startsWith('반복:');
          const text = isRepeat ? item.slice(3) : item;
          h += `<div class="meal-item${isRepeat?' repeat':''}">${text}</div>`;
        });
        h += `</div>`;
      } else {
        h += `<div class="meal-item" style="color:#CACACA">-</div>`;
      }
      h += `</div>`;
    }

    h += `</div>`;
  }

  const rem = (first + last) % 7;
  if(rem) for(let i=0; i<7-rem; i++) h += `<div class="dc empty"></div>`;
  h += `</div></div>`;
  return h;
}

const cal = document.getElementById('cal');
months.forEach(mo => { cal.innerHTML += buildMonth(mo); });
</script>
</body>
